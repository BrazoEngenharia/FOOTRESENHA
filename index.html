<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Brasfoot Draft Kings: GOTY</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tone.js (Neural Audio Engine) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

  <!-- Three.js (WebGL 3D Engine) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Firebase Compat (RTDB) -->

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { pitch: '#05180a', accent: '#ffcc00' },
          animation: {
            'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
            'flare': 'flare 1s ease-out forwards',
            'slide-up': 'slideUp 0.3s ease-out forwards',
            'walkout': 'walkout 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite'
          },
          keyframes: {
            shake: { '10%,90%':{transform:'translate3d(-3px,0,0)'},'20%,80%':{transform:'translate3d(4px,0,0)'},'30%,50%,70%':{transform:'translate3d(-8px,0,0)'},'40%,60%':{transform:'translate3d(8px,0,0)'} },
            flare: { '0%': { transform: 'scale(0.8)', opacity: 0 }, '50%': { opacity: 1 }, '100%': { transform: 'scale(1.2)', opacity: 0 } },
            slideUp: { '0%': { opacity: 0, transform: 'translateY(30px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            walkout: { '0%': { opacity: 0, transform: 'scale(0.5) translateY(100px) rotateX(-45deg)' }, '100%': { opacity: 1, transform: 'scale(1) translateY(0) rotateX(0)' } }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #030a04; color: white; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; user-select: none; }
    .glass { background: rgba(5, 24, 10, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(74, 222, 128, 0.2); }
    .pitch-bg { background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; box-shadow: inset 0 0 150px rgba(0,0,0,0.95); }
    .card-3d { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; cursor: pointer; }
    .card-3d:hover { transform: scale(1.08) translateY(-15px) rotateX(15deg); box-shadow: 0 30px 60px rgba(0,0,0,0.8); z-index: 50; }
    .card-flare { background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, transparent 50%); mix-blend-mode: overlay; pointer-events: none; }
    .momentum-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    canvas { display: block; outline: none; border-radius: 12px; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #000; } ::-webkit-scrollbar-thumb { background: #166534; border-radius: 10px; }
  </style>
</head>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const SFX = {
      ready: false, synth: null, kick: null, noise: null, whistleSynth: null,
      init: async () => {
        if(SFX.ready) return;
        await Tone.start();
        SFX.synth = new Tone.PolySynth(Tone.Synth).toDestination();
        SFX.synth.volume.value = -8;
        
        SFX.whistleSynth = new Tone.Synth({ oscillator: { type: "triangle" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.5, release: 1 } }).toDestination();
        SFX.whistleSynth.volume.value = -5;

        SFX.kick = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 10, oscillator: { type: "sine" } }).toDestination();
        SFX.kick.volume.value = 6;
        const filter = new Tone.Filter(1000, "lowpass").toDestination();
        SFX.noise = new Tone.NoiseSynth({ noise: { type: "brown" }, envelope: { attack: 0.5, decay: 0.1, sustain: 1, release: 2 } }).connect(filter);
        SFX.noise.volume.value = -15;
        SFX.ready = true;
      },
      click: () => SFX.ready && SFX.synth.triggerAttackRelease(["C4"], "32n"),
      pick: () => SFX.ready && SFX.synth.triggerAttackRelease(["E4", "G4"], "16n"),
      walkout: () => {
        if(!SFX.ready) return;
        SFX.kick.triggerAttackRelease("C1", "1n");
        SFX.synth.triggerAttackRelease(["C3", "G3", "C4"], "1n");
      },
      whistle: () => { 
        if(!SFX.ready) return;
        SFX.whistleSynth.triggerAttackRelease("C6", "16n"); 
        setTimeout(()=>SFX.whistleSynth.triggerAttackRelease("C6", "8n"), 150); 
      },
      goal: () => { 
        if(!SFX.ready) return;
        SFX.kick.triggerAttackRelease("C1", "2n"); 
        SFX.synth.triggerAttackRelease(["C4","E4","G4","C5"], "2n");
        SFX.noise.triggerAttackRelease("1n");
      }
    };

    const FORMATIONS = {

    const TACTICS = {

    const BOT_NAMES = ["Íbis SC", "Tabajara FC", "Bot Bagre", "Super Campeões", "Time do CPU", "Galácticos FC", "Amigos do Neymar", "Resenha FC"];

    const PlayerCard = ({ player, onClick, hidden = false }) => {
      if (!player) return <div className="w-40 h-56 border-2 border-dashed border-white/20 rounded-xl bg-black/40 flex items-center justify-center text-gray-600 font-bold"><i className="fa-solid fa-user-secret text-4xl"></i></div>;

      if (player.overall >= 95) { rarity = 'from-cyan-400 to-blue-600 border-cyan-300 text-black'; glow = 'shadow-[0_0_35px_rgba(34,211,238,0.8)]'; }

          </div>

          </div>
        </div>
      );
    };

    const MatchViewer3D = ({ match }) => {
      const mountRef = useRef(null);
      const [localMin, setLocalMin] = useState(0);
      const [events, setEvents] = useState([]);
      const [s1, setS1] = useState(0);
      const [s2, setS2] = useState(0);
      const [momentum, setMomentum] = useState(50);
      const [shake, setShake] = useState(false);

      useEffect(() => {
        if (!match || !match.played || !mountRef.current) return;
        if(Date.now() - match.startTime < 1000) SFX.whistle();

        const width = mountRef.current.clientWidth;
        const height = mountRef.current.clientHeight || 300;

        // 1. SETUP DA CENA (PBR)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020804);
        scene.fog = new THREE.Fog(0x020804, 20, 60);

        // Câmera Estilo Transmissão TV (Lateral)
        const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        camera.position.set(0, 20, 35);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(width, height);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        mountRef.current.innerHTML = '';
        mountRef.current.appendChild(renderer.domElement);

        // 2. ILUMINAÇÃO DE ESTÁDIO
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const floodLight = new THREE.DirectionalLight(0xffffff, 0.8);
        floodLight.position.set(10, 30, 15);
        floodLight.castShadow = true;
        floodLight.shadow.mapSize.width = 1024;
        floodLight.shadow.mapSize.height = 1024;
        floodLight.shadow.camera.left = -30;
        floodLight.shadow.camera.right = 30;
        floodLight.shadow.camera.top = 20;
        floodLight.shadow.camera.bottom = -20;
        scene.add(floodLight);

        // 3. GERAÇÃO DO GRAMADO COM LINHAS BRANCAS (Procedural Canvas)
        const fieldCanvas = document.createElement('canvas');
        fieldCanvas.width = 1024;
        fieldCanvas.height = 512;
        const ctx = fieldCanvas.getContext('2d');
        
        // Grama (Listras)
        for(let i=0; i<20; i++) {
            ctx.fillStyle = i % 2 === 0 ? '#115e29' : '#156c31';
            ctx.fillRect(i * (1024/20), 0, 1024/20, 512);
        }
        
        // Linhas do Campo
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        // Bordas
        ctx.rect(20, 20, 984, 472);
        // Meio Campo
        ctx.moveTo(512, 20); ctx.lineTo(512, 492);
        // Círculo Central
        ctx.arc(512, 256, 70, 0, Math.PI * 2);
        // Áreas (Esquerda e Direita)
        ctx.rect(20, 136, 120, 240);
        ctx.rect(884, 136, 120, 240);
        ctx.stroke();

        const fieldTexture = new THREE.CanvasTexture(fieldCanvas);
        fieldTexture.wrapS = THREE.RepeatWrapping;
        fieldTexture.wrapT = THREE.RepeatWrapping;

        const fieldGeo = new THREE.PlaneGeometry(60, 30);
        const fieldMat = new THREE.MeshStandardMaterial({ map: fieldTexture, roughness: 0.8, metalness: 0.1 });
        const field = new THREE.Mesh(fieldGeo, fieldMat);
        field.rotation.x = -Math.PI / 2;
        field.receiveShadow = true;
        scene.add(field);

        // 4. TRAVES (MODELAGEM 3D)
        const createGoal = (xPos) => {
            const goalGroup = new THREE.Group();
            const postGeo = new THREE.CylinderGeometry(0.15, 0.15, 3);
            const crossGeo = new THREE.CylinderGeometry(0.15, 0.15, 8);
            const postMat = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.2});
            
            const p1 = new THREE.Mesh(postGeo, postMat); p1.position.set(0, 1.5, -4); p1.castShadow = true;
            const p2 = new THREE.Mesh(postGeo, postMat); p2.position.set(0, 1.5, 4); p2.castShadow = true;
            const cross = new THREE.Mesh(crossGeo, postMat); cross.rotation.x = Math.PI/2; cross.position.set(0, 3, 0); cross.castShadow = true;
            
            goalGroup.add(p1); goalGroup.add(p2); goalGroup.add(cross);
            goalGroup.position.set(xPos, 0, 0);
            return goalGroup;
        };
        scene.add(createGoal(-29.5)); // Trave Esquerda
        scene.add(createGoal(29.5));  // Trave Direita

        // 5. A BOLA (PBR Sphere)
        const ballGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.5 });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.castShadow = true;
        ball.position.set(0, 0.4, 0);
        scene.add(ball);

        // 6. MOTOR DE ANIMAÇÃO E FÍSICA
        const msPerMin = 333; // 30s match = 90 mins
        let animationId;
        let targetX = 0;
        let targetZ = 0;
        let baseShake = 0;

        const animate = () => {
          animationId = requestAnimationFrame(animate);

          const elapsedMs = Date.now() - match.startTime;
          let currentVirtualMin = (elapsedMs / msPerMin);
          let displayMin = Math.min(90, Math.floor(currentVirtualMin));
          
          if (displayMin <= 90) {
            setLocalMin(displayMin);
            
            const currentEvents = match.events.filter(e => e.minute <= displayMin);
            if (currentEvents.length !== events.length) {
                setEvents(currentEvents.reverse());
                const g1 = currentEvents.filter(e => e.type === 'goal' && e.teamId === match.p1.uid).length;
                const g2 = currentEvents.filter(e => e.type === 'goal' && e.teamId === match.p2.uid).length;
                
                if (g1 > s1 || g2 > s2) { 
                    SFX.goal(); 
                    baseShake = 1.5; 
                    setShake(true); 
                    setTimeout(() => setShake(false), 500);
                } 
                setS1(g1); setS2(g2);
            }

            // Ler Momentum
            const lastMom = match.momentumData?.find(m => m.min <= displayMin);
            let currentMomVal = lastMom ? lastMom.val : 50;
            if (displayMin < 90) setMomentum(currentMomVal);

            const activeEvent = match.events.find(e => Math.abs(e.minute - currentVirtualMin) < 1.5);
            
            if (activeEvent) {
               // Direciona a bola para a área do ataque
               if (activeEvent.teamId === match.p1.uid) { targetX = 25; targetZ = (Math.random()-0.5)*10; } 
               else { targetX = -25; targetZ = (Math.random()-0.5)*10; } 
            } else {
               // Troca de passes baseada no Momentum (Tug of war no eixo X)
               targetX = ((currentMomVal - 50) / 50) * 15; 
               targetZ = Math.sin(currentVirtualMin * 2) * 8; 
            }

            if (currentVirtualMin >= 90) { targetX = 0; targetZ = 0; }

            // Física de LERP + Pulo da bola
            ball.position.x += (targetX - ball.position.x) * 0.08;
            ball.position.z += (targetZ - ball.position.z) * 0.08;
            // Efeito de bola quicando com base na velocidade de deslocamento
            const speed = Math.abs(targetX - ball.position.x) + Math.abs(targetZ - ball.position.z);
            ball.position.y = 0.4 + Math.abs(Math.sin(currentVirtualMin * 5)) * (speed * 0.2);
            ball.rotation.z -= speed * 0.1;

            // Camera Shake (Impacto Visual)
            if (baseShake > 0.01) {
              camera.position.x = (Math.random() - 0.5) * baseShake;
              camera.position.y = 20 + (Math.random() - 0.5) * baseShake;
              baseShake *= 0.9; 
            } else {
              camera.position.x = 0;
              camera.position.y = 20;
            }
          }

          renderer.render(scene, camera);
        };

        animate();

        return () => {
          cancelAnimationFrame(animationId);
          if(mountRef.current) mountRef.current.innerHTML = '';
          renderer.dispose();
        };
      }, [match]);

      if (!match) return null;
      const isFinished = localMin === 90;

      return (
        <div className={`glass rounded-2xl flex flex-col h-[650px] overflow-hidden transition-all duration-300 ${shake ? 'animate-shake border-yellow-500 shadow-[0_0_50px_rgba(250,204,21,0.5)]' : 'border-green-800'}`}>
          <div className={`p-4 border-b border-white/10 text-center relative z-20 transition-colors duration-500 ${shake ? 'bg-yellow-600 text-black' : 'bg-gradient-to-b from-black/90 to-transparent'}`}>
            <div className={`font-black text-xs tracking-widest mb-2 flex justify-center items-center gap-2 ${shake ? 'text-black' : 'text-yellow-400'}`}>
              {isFinished ? <><i className="fa-solid fa-flag-checkered"></i> FIM DE JOGO</> : <><i className="fa-solid fa-satellite-dish animate-pulse"></i> {localMin}' MINUTOS</>}
            </div>
            <div className="flex justify-between items-center px-2 md:px-8">
              <div className="flex-1 text-right font-black text-xl md:text-3xl truncate drop-shadow-lg">{match.p1.name}</div>
              <div className="mx-4 px-6 py-2 bg-black/80 rounded-xl border border-white/20 flex gap-4 text-4xl font-black text-white shadow-inner">
                <span>{s1}</span><span className="text-gray-600 text-2xl self-center">x</span><span>{s2}</span>
              </div>
              <div className="flex-1 text-left font-black text-xl md:text-3xl truncate drop-shadow-lg">{match.p2.name}</div>
            </div>

            {/* Barra de Momentum (Transmissão de TV) */}
            <div className="absolute bottom-0 left-0 w-full h-1.5 bg-gray-900 overflow-hidden flex z-30">
              <div className="h-full bg-blue-500 momentum-bar relative" style={{width: `${100 - momentum}%`}}></div>
              <div className="h-full bg-red-500 momentum-bar relative" style={{width: `${momentum}%`}}></div>
            </div>
          </div>

          <div className="relative flex-1 bg-black/50">
             {/* VISOR 3D DO ESTÁDIO */}
             <div ref={mountRef} className="absolute inset-0 w-full h-full z-0"></div>
             
             {/* FEED DE COMENTÁRIOS COM GRADIENTE SOBREPOSTO */}
             <div className="absolute bottom-0 left-0 w-full h-2/3 bg-gradient-to-t from-black via-black/80 to-transparent pointer-events-none z-10 flex flex-col justify-end p-4">
               <div className="space-y-2 overflow-y-auto max-h-48 scrollbar-hide flex flex-col-reverse pointer-events-auto">
                 {events.length === 0 && <div className="text-center text-green-500/50 mb-4 font-bold text-lg animate-pulse">As equipes estudam o adversário...</div>}
                 {events.slice(0,4).map((ev, i) => {
                   let bg = 'bg-black/60 border-green-900/50 text-gray-300 backdrop-blur-sm';
                   let icon = 'fa-shoe-prints text-green-600';
                   if(ev.type === 'goal') { bg = 'bg-yellow-500/90 text-black border-yellow-400 font-black text-lg shadow-[0_0_15px_rgba(250,204,21,0.6)] backdrop-blur-md'; icon = 'fa-futbol animate-bounce'; }
                   else if(ev.type === 'foul') { bg = 'bg-red-900/80 border-red-700 text-red-100 font-bold backdrop-blur-md'; icon = 'fa-square text-red-500'; }
                   else if(ev.type === 'save') { bg = 'bg-blue-900/80 border-blue-500 text-blue-100 font-bold backdrop-blur-md'; icon = 'fa-hands text-blue-400'; }
                   else if(ev.type === 'attack') { bg = 'bg-green-900/80 border-green-500 text-green-50 font-bold backdrop-blur-md'; icon = 'fa-fire text-orange-500'; }

                   return (
                     <div key={i} className={`p-3 rounded-lg border flex gap-3 items-center animate-slide-up ${bg}`}>
                       {ev.type !== 'info' && <span className="font-black opacity-70 min-w-[30px] text-right text-sm">{ev.minute}'</span>}
                       <i className={`fa-solid ${icon}`}></i>
                       <span className="leading-tight flex-1 text-sm md:text-base">{ev.text}</span>
                     </div>
                   )
                 })}
               </div>
             </div>
          </div>
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [playerName, setPlayerName] = useState('');
      const [appState, setAppState] = useState('INIT');
      const [roomData, setRoomData] = useState(null);
      const [roomId, setRoomId] = useState('');
      const [gameMode, setGameMode] = useState('knockout');
      const [error, setError] = useState('');
      
      const [myFormation, setMyFormation] = useState('4-3-3');
      const [draftOptions, setDraftOptions] = useState([]);
      const [myTeam, setMyTeam] = useState([]);
      const [walkoutPlayer, setWalkoutPlayer] = useState(null);
      const [tactic, setTactic] = useState('Equilibrado');
      const seenIds = useRef(new Set()); 

      useEffect(() => {
        const init = async () => {
          try {
            await auth.signInAnonymously();
          } catch(e) {
            console.error("Auth Fail:", e);
            setError("Erro crítico ao conectar no servidor. Ative o Login Anônimo no Firebase.");
          }
        };
        init();
        
        const unsub = auth.onAuthStateChanged(u => {
          setUser(u);
          setIsAuthLoading(false);
        });
        return () => unsub();
      }, []);

      useEffect(() => {
        if(!user || !roomId || appState === 'INIT' || appState === 'MENU') return;
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const listener = roomRef.on('value', snap => {
          if(snap.exists()) {
            const data = snap.val();
            setRoomData(data);
            
            if(data.status === 'draft_setup' && appState === 'LOBBY') setAppState('DRAFT_SETUP');
            if(data.status === 'drafting' && appState === 'DRAFT_SETUP') setAppState('DRAFTING');
            if(data.status === 'tactics' && appState === 'DRAFTING') setAppState('TACTICS');
            if(data.status === 'tournament' && appState !== 'TOURNAMENT') setAppState('TOURNAMENT');
          } else {
            setAppState('MENU');
            setError('A sala foi encerrada pelo Host.');
          }
        });
        return () => roomRef.off('value', listener);
      }, [user, roomId, appState]);

      const initEngine = async () => {
        await SFX.init();
        SFX.click();
        setAppState('MENU');
      };

      const handleCreateRoom = async () => {
        SFX.click();
        if(!playerName || !roomId) return setError("Preencha Nome e Sala.");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(snap.exists()) return setError("Sala já existe. Escolha outro código.");

        await roomRef.set({
          hostUid: user.uid, status: 'lobby', stage: 0, mode: gameMode,
          players: { [user.uid]: { name: playerName, team: [], overall: 0, isReady: false, isBot: false, tactic: 'Equilibrado' } }
        });
        setAppState('LOBBY');
      };

      const handleJoinRoom = async () => {
        SFX.click();
        if(!playerName || !roomId) return setError("Preencha Nome e Sala.");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(!snap.exists()) return setError("Sala não encontrada.");
        const data = snap.val();
        if(data.status !== 'lobby') return setError("A partida já começou.");
        
        await roomRef.update({ [`players/${user.uid}`]: { name: playerName, team: [], overall: 0, isReady: false, isBot: false, tactic: 'Equilibrado' } });
        setAppState('LOBBY');
      };

      const pullPacks = (currentTeamLength) => {
        if (currentTeamLength >= 11) return;
        
        const requiredPos = FORMATIONS[myFormation][currentTeamLength];
        
        // Filtro Posicional com Proteção de Array
        let pool = RAW_DB.filter(p => p.pos === requiredPos && !seenIds.current.has(p.baseId));
        let options = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
        
        // Fallback procedural de segurança caso o DB esvazie para a posição
        let botIndex = 0;
        while (options.length < 3) {
           const mockId = `gen_${requiredPos}_${Date.now()}_${botIndex}`;
           options.push({
             id: mockId, baseId: mockId, name: `Talento da Base`, year: 2024, team: 'Academy', 
             overall: 70 + Math.floor(Math.random()*12), pos: requiredPos
           });
           botIndex++;
        }

        options.forEach(p => seenIds.current.add(p.baseId));
        setDraftOptions(options);
      };

      const startDrafting = () => {
        SFX.click();
        setAppState('DRAFTING');
        pullPacks(0); 
      };

      const calculateChemistry = (team) => {
        let chemBoost = 0;
        const teamCounts = {};
        team.forEach(p => { teamCounts[p.team] = (teamCounts[p.team] || 0) + 1; });
        Object.values(teamCounts).forEach(count => {
           if(count >= 2) chemBoost += (count - 1) * 2; 
        });
        return chemBoost;
      };

      const pickPlayer = async (player) => {
        const currentLength = myTeam.length;
        if (currentLength >= 11) return; // Trava de segurança
        
        if (player.overall >= 93) {
          SFX.walkout();
          setWalkoutPlayer(player);
          setTimeout(() => setWalkoutPlayer(null), 3000);
        } else {
          SFX.pick();
        }
        
        const newTeam = [...myTeam, player];
        setMyTeam(newTeam);
        
        // Se ainda não formou os 11, puxa próximo pacote. Se formou, fecha.
        if (newTeam.length < 11) {
          pullPacks(newTeam.length);
        } else {
          setDraftOptions([]); 
          const baseOvr = newTeam.reduce((acc, p) => acc + p.overall, 0) / 11;
          const chemOvr = calculateChemistry(newTeam);
          const finalOvr = Math.min(99, Math.round(baseOvr + chemOvr));
          
          try {
            await db.ref(`games/${APP_ID}/${roomId}/players/${user.uid}`).update({
              team: newTeam, overall: finalOvr, isReady: true
            });
          } catch(e) { console.error("Save error", e); }
        }
      };

      const confirmTactic = async () => {
        SFX.click();
        await db.ref(`games/${APP_ID}/${roomId}/players/${user.uid}`).update({ tactic, isReady: true });
      };

      const generateTournamentBracket = async () => {
        SFX.click();
        const players = Object.entries(roomData?.players || {}).map(([uid, p]) => ({uid, ...p}));
        
        let targetSize = 8;
        if (roomData?.mode === '1v1') targetSize = 2;
        else if (players.length <= 4 && roomData?.mode !== 'league') targetSize = 4;
        
        let bracketPlayers = [...players];
        let b = 0;
        while(bracketPlayers.length < targetSize) {
          bracketPlayers.push({ uid: `bot_${b}`, name: BOT_NAMES[b%BOT_NAMES.length], overall: 75 + Math.floor(Math.random()*15), isBot: true, tactic: 'Equilibrado' });
          b++;
        }
        bracketPlayers.sort(() => 0.5 - Math.random());

        const updates = { status: 'tournament' };

        if (roomData?.mode === 'league') {
           let standings = {};
           bracketPlayers.forEach(p => standings[p.uid] = { name: p.name, pts: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0 });
           
           let matches = [];
           for(let i=0; i<targetSize; i+=2) {
             matches.push({ p1: bracketPlayers[i], p2: bracketPlayers[i+1], played: false, events: [] });
           }
           updates.stage = 1;
           updates['bracket/league_matches'] = matches;
           updates['bracket/standings'] = standings;
        } else {
           let matches = [];
           for(let i=0; i<targetSize; i+=2) {
             matches.push({ p1: bracketPlayers[i], p2: bracketPlayers[i+1], played: false, events: [] });
           }
           let stageName = targetSize === 8 ? 'quarters' : targetSize === 4 ? 'semis' : 'final';
           updates.stage = targetSize === 8 ? 1 : targetSize === 4 ? 2 : 3;
           updates[`bracket/${stageName}`] = matches;
        }

        players.forEach(p => { updates[`players/${p.uid}/isReady`] = false; });
        await db.ref(`games/${APP_ID}/${roomId}`).update(updates);
      };

      const simulateMatches = async () => {
        SFX.click();
        const startTime = Date.now() + 1500; 
        
        let stageKey = '';
        if (roomData?.mode === 'league') stageKey = 'league_matches';
        else stageKey = roomData?.stage === 1 ? 'quarters' : roomData?.stage === 2 ? 'semis' : 'final';
        
        const matchesToSim = roomData?.bracket?.[stageKey] || [];
        if (matchesToSim.length === 0) return;

        const simulatedMatches = matchesToSim.map(match => {
           let events = [];
           let momentumData = [];
           let s1=0, s2=0;
           let currentMom = 50;
           
           const t1 = TACTICS[match.p1.tactic] || TACTICS['Equilibrado'];
           const t2 = TACTICS[match.p2.tactic] || TACTICS['Equilibrado'];

           const luck1 = (Math.random() * 20 - 10);
           const luck2 = (Math.random() * 20 - 10);
           const ovr1 = (match.p1.overall * t1.atkMod) + luck1; 
           const ovr2 = (match.p2.overall * t2.atkMod) + luck2;
           
           const prob1 = Math.max(0.2, Math.min(0.8, ovr1 / (ovr1 + ovr2)));

           for(let min=1; min<=90; min++) {
             if(min % 5 === 0) {
                currentMom += (Math.random() > prob1 ? 15 : -15);
                currentMom = Math.max(10, Math.min(90, currentMom));
                momentumData.push({min, val: currentMom});
             }

             let actionProb = 0.12; 
             if (currentMom < 30) actionProb = 0.18; 
             if (currentMom > 70) actionProb = 0.18; 

             if(Math.random() < actionProb) { 
               const isP1 = Math.random() < (currentMom < 50 ? 0.7 : 0.3);
               const att = isP1 ? match.p1 : match.p2;
               const def = isP1 ? match.p2 : match.p1;
               
               const roll = Math.random();
               if(roll < 0.20) { 
                 s1 += isP1 ? 1 : 0; s2 += isP1 ? 0 : 1;
                 const goalTexts = [`GOLAÇO! ${att.name} fuzila pro fundo das redes!`, `É GOL! Troca de passes envolvente do ${att.name}!`, `QUE PINTURA! ${att.name} encobre o goleiro!`, `Pênalti cobrado com frieza. Gol do ${att.name}!`];
                 events.push({ minute: min, type: 'goal', teamId: att.uid, text: goalTexts[Math.floor(Math.random()*goalTexts.length)] });
                 currentMom = 50;
               } else if(roll < 0.45) {
                 events.push({ minute: min, type: 'save', teamId: def.uid, text: `MILAGRE! Goleiro do ${def.name} espalma na gaveta.` });
               } else if(roll < 0.65) {
                 events.push({ minute: min, type: 'foul', teamId: def.uid, text: `Falta dura da defesa do ${def.name}. O juiz dá amarelo!` });
               } else {
                 events.push({ minute: min, type: 'attack', teamId: att.uid, text: `UHH! ${att.name} enche o pé e a bola tira tinta da trave.` });
               }
             }
           }

           if (s1 === s2 && roomData?.mode !== 'league') {
             events.push({ minute: 90, type: 'info', text: 'Tudo igual. Vamos para as cobranças de pênaltis!' });
             if(Math.random() > 0.5) { s1++; events.push({ minute: 90, type: 'goal', teamId: match.p1.uid, text: `${match.p1.name} VENCE NOS PÊNALTIS!` }); }
             else { s2++; events.push({ minute: 90, type: 'goal', teamId: match.p2.uid, text: `${match.p2.name} VENCE NOS PÊNALTIS!` }); }
           }
           
           events.push({ minute: 90, type: 'info', text: 'Apita o árbitro! Fim de papo.' });
           
           let winner = null;
           if (s1 > s2) winner = match.p1;
           else if (s2 > s1) winner = match.p2;
           
           return { ...match, startTime, played: true, events, momentumData, s1, s2, winner };
        });

        await db.ref(`games/${APP_ID}/${roomId}/bracket/${stageKey}`).set(simulatedMatches);
        
        setTimeout(async () => {
           if (roomData?.mode === 'league') {
              // Engine Liga (Round Robin Update)
              const std = roomData.bracket.standings || {};
              simulatedMatches.forEach(m => {
                 if(m.s1 > m.s2) { std[m.p1.uid].pts+=3; std[m.p1.uid].w++; std[m.p2.uid].l++; }
                 else if(m.s2 > m.s1) { std[m.p2.uid].pts+=3; std[m.p2.uid].w++; std[m.p1.uid].l++; }
                 else { std[m.p1.uid].pts++; std[m.p2.uid].pts++; std[m.p1.uid].d++; std[m.p2.uid].d++; }
                 
                 std[m.p1.uid].gf += m.s1; std[m.p1.uid].ga += m.s2; std[m.p1.uid].gd = std[m.p1.uid].gf - std[m.p1.uid].ga;
                 std[m.p2.uid].gf += m.s2; std[m.p2.uid].ga += m.s1; std[m.p2.uid].gd = std[m.p2.uid].gf - std[m.p2.uid].ga;
              });
              await db.ref(`games/${APP_ID}/${roomId}`).update({ ['bracket/standings']: std, stage: 4 }); 
           } else {
             // Engine Mata-Mata
             const nextStage = roomData?.stage === 1 ? 'semis' : roomData?.stage === 2 ? 'final' : 'campeao';
             if (nextStage !== 'campeao') {
               let nextMatches = [];
               for(let i=0; i<simulatedMatches.length; i+=2) {
                 nextMatches.push({ p1: simulatedMatches[i].winner, p2: simulatedMatches[i+1].winner, played: false, events: [] });
               }
               await db.ref(`games/${APP_ID}/${roomId}`).update({ [`bracket/${nextStage}`]: nextMatches, stage: (roomData?.stage || 1) + 1 });
             } else {
               await db.ref(`games/${APP_ID}/${roomId}`).update({ stage: 4 }); 
             }
           }
        }, 33000); 
      };

      if (isAuthLoading) return <div className="min-h-screen flex items-center justify-center bg-black text-green-500 font-black text-2xl animate-pulse"><i className="fa-solid fa-satellite-dish mr-3"></i> Conectando à Rede Neural...</div>;
      
      if (appState === 'INIT') return <div className="min-h-screen flex items-center justify-center bg-black"><button onClick={initEngine} className="glass p-16 rounded-[3rem] flex flex-col items-center hover:scale-105 transition-all shadow-[0_0_80px_rgba(250,204,21,0.3)] border-2 border-yellow-500/50 group"><i className="fa-solid fa-power-off text-8xl text-yellow-500 mb-8 group-hover:animate-pulse"></i><h1 className="text-6xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600 drop-shadow-lg">INICIALIZAR ENGINE 3D</h1><p className="text-gray-400 mt-6 font-bold uppercase tracking-widest text-sm">Habilita Som, GPU e Firebase Seguros</p></button></div>;
      
      if (appState === 'MENU') return (
        <div className="min-h-screen flex items-center justify-center pitch-bg p-4"><div className="glass p-10 rounded-3xl w-full max-w-md shadow-2xl animate-slide-up border border-green-500/30 relative overflow-hidden"><div className="text-center mb-10"><i className="fa-solid fa-trophy text-7xl text-yellow-400 drop-shadow-[0_0_30px_rgba(250,204,21,0.6)] mb-4 animate-pulse-fast"></i><h1 className="text-5xl font-black italic tracking-tighter text-white">DRAFT KINGS</h1></div><div className="space-y-5"><input className="w-full p-4 bg-black/60 rounded-xl text-white outline-none border-2 border-green-900 focus:border-yellow-400 font-bold transition text-lg" placeholder="Seu Nome" value={playerName} onChange={e=>setPlayerName(e.target.value)} /><div className="flex gap-3"><input className="w-full p-4 bg-black/60 rounded-xl text-white outline-none border-2 border-green-900 uppercase focus:border-yellow-400 font-black transition text-lg" placeholder="SALA" value={roomId} onChange={e=>setRoomId(e.target.value.toUpperCase())} /><select className="p-4 bg-black/60 rounded-xl text-white outline-none border-2 border-green-900 font-bold" value={gameMode} onChange={e=>setGameMode(e.target.value)}><option value="knockout">MATA-MATA</option><option value="league">LIGA</option><option value="1v1">DUELO X1</option></select></div>{error && <div className="text-red-400 font-black text-sm text-center bg-red-950/80 border border-red-500 p-3 rounded-xl shadow-lg">{error}</div>}<div className="pt-4 space-y-3"><button onClick={handleCreateRoom} className="w-full bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-black py-4 rounded-xl shadow-[0_0_20px_rgba(250,204,21,0.4)] hover:scale-[1.03] transition text-lg">FUNDAR LIGA</button><button onClick={handleJoinRoom} className="w-full border-2 border-green-600 text-green-400 hover:bg-green-600 hover:text-white font-black py-4 rounded-xl transition text-lg">ENTRAR NA LIGA</button></div></div></div></div>
      );
      
      if (!roomData && appState !== 'MENU') return <div className="min-h-screen flex items-center justify-center pitch-bg text-yellow-500 font-black text-2xl"><div className="glass p-8 rounded-2xl flex items-center animate-pulse"><i className="fa-solid fa-network-wired mr-4 text-4xl"></i> Sincronizando Rede...</div></div>;

      if (appState === 'LOBBY') return (
        <div className="min-h-screen p-4 md:p-10 bg-green-950 flex flex-col items-center justify-center pitch-bg"><div className="glass p-8 md:p-12 rounded-[2rem] w-full max-w-5xl shadow-2xl animate-slide-up border border-green-800"><div className="flex flex-col md:flex-row justify-between items-center border-b-2 border-green-800/50 pb-6 mb-10"><div><h2 className="text-4xl md:text-5xl font-black">LOBBY <span className="text-yellow-400 font-mono tracking-tighter">{roomId}</span></h2><p className="text-green-400 mt-2 font-bold uppercase tracking-widest">MODO: {roomData?.mode}</p></div><div className="bg-black/40 px-6 py-3 rounded-xl border border-green-900 mt-4 md:mt-0 font-bold">{Object.keys(roomData?.players||{}).length} / {roomData?.mode === '1v1' ? 2 : 8} Treinadores</div></div><div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-12">{Object.entries(roomData?.players||{}).map(([uid, p]) => (<div key={uid} className="bg-gradient-to-b from-green-900/50 to-black/50 p-6 rounded-2xl border border-green-700 flex flex-col items-center gap-4 shadow-lg"><div className={`w-16 h-16 rounded-full flex items-center justify-center shadow-inner text-2xl ${uid === roomData?.hostUid ? 'bg-yellow-500/20 border-2 border-yellow-500 text-yellow-400' : 'bg-green-800 border-2 border-green-600 text-green-300'}`}>{uid === roomData?.hostUid ? <i className="fa-solid fa-crown"></i> : <i className="fa-solid fa-user"></i>}</div><span className="font-black text-lg truncate w-full text-center tracking-tight">{p.name}</span></div>))}</div><div className="text-center bg-black/30 p-8 rounded-2xl border border-white/5">{isHost ? (<button onClick={()=>db.ref(`games/${APP_ID}/${roomId}`).update({status:'draft_setup'})} className="bg-yellow-500 text-black font-black px-12 py-5 rounded-xl text-2xl shadow-[0_0_30px_rgba(250,204,21,0.5)] hover:scale-105 transition w-full md:w-auto">PRANCHETA TÁTICA</button>) : (<div className="text-yellow-400 font-bold text-xl animate-pulse">Aguardando Host...</div>)}</div></div></div>
      );

      if (appState === 'DRAFT_SETUP') return (
        <div className="min-h-screen bg-pitch p-6 flex flex-col items-center justify-center pitch-bg"><div className="glass p-12 rounded-[2rem] w-full max-w-2xl text-center shadow-2xl border border-green-600"><i className="fa-solid fa-pen-ruler text-7xl text-green-400 mb-6"></i><h1 className="text-5xl font-black mb-4 tracking-tighter">Esquema Tático</h1><div className="grid grid-cols-2 gap-4 mb-10">{Object.keys(FORMATIONS).map(form => (<button key={form} onClick={()=>{SFX.click(); setMyFormation(form);}} className={`py-6 rounded-2xl font-black text-3xl border-4 transition-all duration-200 ${myFormation === form ? 'bg-green-700 border-green-400 shadow-[0_0_20px_rgba(74,222,128,0.6)] scale-[1.02]' : 'bg-black/60 border-green-900 text-gray-500 hover:border-green-600 hover:text-white'}`}>{form}</button>))}</div><button onClick={startDrafting} className="w-full bg-yellow-500 text-black font-black py-5 rounded-xl text-2xl shadow-[0_0_20px_rgba(250,204,21,0.4)] hover:bg-yellow-400 transition">ABRIR PACOTES</button></div></div>
      );

      if (appState === 'DRAFTING') {
        const isDraftFinished = myTeam.length === 11;
        const currentReqPos = !isDraftFinished ? FORMATIONS[myFormation][myTeam.length] : '---';
        return (
          <div className="min-h-screen bg-green-950 flex flex-col lg:flex-row overflow-hidden font-sans pitch-bg">
             {walkoutPlayer && (<div className="fixed inset-0 z-50 bg-black/90 flex items-center justify-center animate-walkout backdrop-blur-md"><div className="scale-150 relative z-10"><PlayerCard player={walkoutPlayer} /></div><div className="absolute bottom-20 text-yellow-400 font-black text-5xl tracking-widest animate-pulse drop-shadow-[0_0_20px_rgba(250,204,21,0.8)] uppercase">LENDA DRAFTADA!</div></div>)}
             <div className="w-full lg:w-[350px] border-r-2 border-green-800 p-6 flex flex-col z-20 shadow-2xl relative bg-black/60 backdrop-blur-md"><h2 className="text-2xl font-black mb-6 flex items-center justify-between border-b-2 border-green-800 pb-4"><span className="flex items-center gap-3"><i className="fa-solid fa-shield-halved text-yellow-400 text-3xl"></i> Esquadrão</span><span className="text-sm font-black bg-green-900 px-3 py-1 rounded text-green-300 border border-green-600 shadow-inner">{myFormation}</span></h2><div className="flex-1 overflow-y-auto space-y-2 pr-2">{FORMATIONS[myFormation].map((pos, i) => { const p = myTeam[i]; const isActive = i === myTeam.length && !isDraftFinished; let boxStyle = "bg-black/30 border-green-900/50 text-gray-500 border-dashed border-2"; if (p) boxStyle = "bg-green-900/40 border-green-700 text-white border-solid border"; if (isActive) boxStyle = "bg-green-800 border-yellow-400 shadow-[0_0_20px_rgba(250,204,21,0.3)] border-solid border-2 scale-105 z-10"; return (<div key={i} className={`flex justify-between items-center p-3 rounded-xl transition-all duration-300 relative ${boxStyle}`}>{isActive && <div className="absolute -left-2 w-1 h-8 bg-yellow-400 rounded-full"></div>}<div className="flex items-center gap-4"><span className={`w-12 text-center font-black text-sm px-1 py-1.5 rounded ${isActive ? 'bg-yellow-500 text-black' : p ? 'bg-black/60 text-green-400' : 'bg-black/40'}`}>{pos}</span><span className={`font-bold text-sm truncate max-w-[150px] ${p ? 'opacity-100' : 'opacity-40 italic'}`}>{p ? p.name : 'Aguardando...'}</span></div>{p && <i className="fa-solid fa-check text-green-500 font-bold"></i>}</div>) })}</div></div>
             <div className="flex-1 flex items-center justify-center p-6 relative">
                {!isDraftFinished ? (
                  <div className="z-10 text-center w-full max-w-4xl animate-slide-up"><div className="mb-14"><span className="bg-yellow-500 text-black font-black px-6 py-2 rounded-full text-sm tracking-widest uppercase shadow-[0_0_15px_rgba(250,204,21,0.4)]">RODADA {myTeam.length + 1}/11</span><h1 className="text-5xl md:text-6xl font-black mt-6 drop-shadow-lg">Procurando <span className="text-green-400 underline decoration-yellow-500 decoration-4 underline-offset-8">{currentReqPos}</span></h1></div><div className="flex justify-center gap-6 md:gap-12 flex-wrap perspective-1000">{draftOptions.map(p => <PlayerCard key={p.id} player={p} onClick={pickPlayer} />)}</div></div>
                ) : (
                  <div className="z-10 text-center glass p-16 rounded-[3rem] border-2 border-green-500 animate-slide-up max-w-2xl w-full relative"><i className="fa-solid fa-circle-check text-8xl text-green-400 drop-shadow-[0_0_40px_rgba(74,222,128,0.6)] mb-8"></i><h2 className="text-5xl font-black mb-4 tracking-tight">Equipe Assinada!</h2><p className="text-2xl text-gray-300 font-medium mb-10 flex items-center justify-center gap-4">OVR Final c/ Entrosamento: <span className="text-yellow-400 font-black text-5xl drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]">{myPlayerStatus?.overall || '--'}</span></p><div className="bg-black/40 p-6 rounded-2xl border border-white/10 mb-8 text-left"><h3 className="text-green-500 font-bold uppercase tracking-widest text-xs mb-4">Status da Sala</h3>{Object.entries(roomData?.players||{}).map(([uid, p]) => (<div key={uid} className="flex justify-between items-center border-b border-white/5 py-2 last:border-0"><span className="font-semibold text-gray-300">{p.name}</span>{p.isReady ? <span className="text-green-400 font-bold text-sm"><i className="fa-solid fa-check mr-1"></i> Pronto</span> : <span className="text-yellow-500 font-bold text-sm animate-pulse">Draftando...</span>}</div>))}</div>{isHost && allReady ? (<button onClick={()=>db.ref(`games/${APP_ID}/${roomId}`).update({status:'tactics'})} className="w-full bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-black py-5 rounded-xl text-2xl shadow-[0_0_30px_rgba(250,204,21,0.5)] hover:scale-105 transition"><i className="fa-solid fa-brain mr-3"></i> DEFINIR POSTURA TÁTICA</button>) : isHost ? (<div className="p-4 border border-dashed border-gray-600 rounded-xl text-gray-400 font-bold">Aguardando...</div>) : (<div className="text-yellow-400 font-bold text-xl animate-pulse">Aguardando Host...</div>)}</div>
                )}
             </div>
          </div>
        )
      }

      if (appState === 'TACTICS') return (
        <div className="min-h-screen p-6 flex flex-col items-center justify-center pitch-bg"><div className="glass p-12 rounded-[2rem] w-full max-w-3xl text-center shadow-2xl border border-blue-600"><i className="fa-solid fa-chess-knight text-7xl text-blue-400 mb-6 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]"></i><h1 className="text-5xl font-black mb-4 tracking-tighter">Postura do Treinador</h1><div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">{Object.entries(TACTICS).map(([name, data]) => (<div key={name} onClick={()=>{SFX.click(); setTactic(name);}} className={`p-6 rounded-2xl cursor-pointer border-4 transition-all duration-200 flex flex-col justify-center items-center ${tactic === name ? 'bg-blue-900 border-blue-400 shadow-[0_0_20px_rgba(59,130,246,0.6)] scale-105' : 'bg-black/60 border-blue-950 text-gray-500 hover:border-blue-700 hover:text-white'}`}><h3 className="font-black text-2xl mb-2">{name}</h3></div>))}</div>{!myPlayerStatus?.isReady ? (<button onClick={confirmTactic} className="w-full bg-blue-500 text-white font-black py-5 rounded-xl text-2xl shadow-[0_0_20px_rgba(59,130,246,0.4)] hover:bg-blue-400 transition"><i className="fa-solid fa-lock mr-3"></i> TRAVAR TÁTICA</button>) : isHost && allReady ? (<button onClick={generateTournamentBracket} className="w-full bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-black py-5 rounded-xl text-2xl shadow-[0_0_30px_rgba(250,204,21,0.5)] hover:scale-105 transition"><i className="fa-solid fa-play mr-3"></i> INICIAR CAMPEONATO</button>) : (<div className="text-yellow-400 font-bold text-xl animate-pulse mt-6">Aguardando todos travarem...</div>)}</div></div>
      );

      if (appState === 'TOURNAMENT') {
        const isLeague = roomData?.mode === 'league';
        const stageKey = isLeague ? 'league_matches' : roomData?.stage === 1 ? 'quarters' : roomData?.stage === 2 ? 'semis' : 'final';
        const activeMatches = roomData?.bracket ? roomData?.bracket[stageKey] || [] : [];
        const myMatch = activeMatches.find(m => m.p1.uid === user.uid || m.p2.uid === user.uid);

        return (
          <div className="min-h-screen bg-[#020803] p-4 md:p-8 text-white relative font-sans pitch-bg">
            <div className="max-w-7xl mx-auto relative z-10">
              <div className="flex flex-col md:flex-row justify-between items-center mb-8 glass p-6 rounded-2xl border border-green-800/50 shadow-2xl">
                <div className="text-center md:text-left mb-4 md:mb-0"><h1 className="text-3xl font-black text-yellow-400 flex items-center gap-3 tracking-tighter uppercase"><i className="fa-solid fa-trophy text-4xl"></i> {isLeague ? 'LIGA DE PONTOS' : roomData?.mode === '1v1' ? 'DUELO X1' : 'COPA ELIMINATÓRIA'}</h1><p className="text-green-500 font-bold tracking-widest text-sm mt-1 uppercase">FASE: {stageKey}</p></div>
                {isHost && roomData?.stage < 4 && !activeMatches[0]?.played && (<button onClick={simulateMatches} className="bg-red-600 hover:bg-red-500 text-white font-black py-4 px-10 rounded-xl shadow-[0_0_30px_rgba(220,38,38,0.5)] transition-all hover:scale-105 border border-red-400 text-xl"><i className="fa-solid fa-bolt mr-2"></i> INICIAR SIMULAÇÃO</button>)}
                {!isHost && roomData?.stage < 4 && !activeMatches[0]?.played && (<div className="bg-black/50 px-6 py-3 rounded-lg border border-yellow-500/30 text-yellow-400 font-bold animate-pulse">Aguardando Host...</div>)}
              </div>

              {roomData?.stage === 4 ? (
                <div className="text-center mt-32 animate-slide-up"><i className="fa-solid fa-crown text-[150px] text-yellow-400 drop-shadow-[0_0_50px_rgba(250,204,21,0.8)] relative z-10 animate-bounce" style={{animationDuration:'3s'}}></i><h1 className="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 to-yellow-600 mt-8 tracking-tighter uppercase">{isLeague ? 'FIM DA LIGA' : roomData.bracket.final[0].winner.name}</h1></div>
              ) : (
                <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                  <div className="lg:col-span-3">{myMatch ? <MatchViewer3D match={myMatch} /> : activeMatches[0] ? <MatchViewer3D match={activeMatches[0]} /> : null}</div>
                  
                  <div className="flex flex-col gap-4">
                    {/* LEAGUE STANDINGS */}
                    {isLeague && roomData.bracket.standings && (
                      <div className="glass p-4 rounded-xl border border-blue-800/50 mb-4">
                        <h3 className="text-blue-400 font-black text-center mb-2 uppercase tracking-widest text-sm">Classificação</h3>
                        <div className="space-y-1">
                          {Object.values(roomData.bracket.standings).sort((a,b) => b.pts - a.pts || b.gd - a.gd).map((t, i) => (
                             <div key={i} className="flex justify-between text-sm bg-black/40 p-1 px-2 rounded">
                                <span className="truncate w-24 font-bold">{i+1}. {t.name}</span>
                                <span className="text-yellow-400 font-black">{t.pts}</span>
                             </div>
                          ))}
                        </div>
                      </div>
                    )}
                  
                    <h3 className="text-green-500 font-black mb-2 uppercase text-sm tracking-widest bg-green-900/30 p-3 rounded-lg border border-green-800/50 text-center"><i className="fa-solid fa-list-ol mr-2"></i> Visão Geral da Fase</h3>
                    <div className="space-y-4 overflow-y-auto max-h-[500px] pr-2">
                      {activeMatches.map((m, i) => {
                         const isMatchOver = m.played && (Date.now() - m.startTime > 30000);
                         return (<div key={i} className="glass p-4 rounded-xl border border-green-800/50 flex flex-col justify-center shadow-lg relative overflow-hidden group">{isMatchOver && m.winner?.uid === m.p1.uid && <div className="absolute top-0 left-0 w-1.5 h-full bg-yellow-400 shadow-[0_0_10px_rgba(250,204,21,1)]"></div>}<div className="flex justify-between items-center mb-2"><span className={`font-bold text-sm truncate pr-2 ${isMatchOver && m.winner?.uid===m.p1.uid ? 'text-white' : 'text-gray-400'}`}>{m.p1.name}</span><span className="font-black bg-black/80 px-3 py-1 rounded text-lg min-w-[36px] text-center border border-white/5">{isMatchOver ? m.s1 : '-'}</span></div>{isMatchOver && m.winner?.uid === m.p2.uid && <div className="absolute top-0 left-0 w-1.5 h-full bg-yellow-400 shadow-[0_0_10px_rgba(250,204,21,1)]"></div>}<div className="flex justify-between items-center"><span className={`font-bold text-sm truncate pr-2 ${isMatchOver && m.winner?.uid===m.p2.uid ? 'text-white' : 'text-gray-400'}`}>{m.p2.name}</span><span className="font-black bg-black/80 px-3 py-1 rounded text-lg min-w-[36px] text-center border border-white/5">{isMatchOver ? m.s2 : '-'}</span></div></div>)
                      })}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
