  <style>
    body { background-color: #0B1319; color: #E1E8ED; font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow-x: hidden; user-select: none; }

    .badge-v { background-color: #00E676; color: #000; font-weight: 900; }
    .badge-e { background-color: #FFD54F; color: #000; font-weight: 900; }
    .badge-d { background-color: #FF5252; color: #FFF; font-weight: 900; }
    ::-webkit-scrollbar { width: 6px; } 
    ::-webkit-scrollbar-track { background: #0B1319; } 
    ::-webkit-scrollbar-thumb { background: #38444D; border-radius: 10px; }
  </style>
</head>
<body>

              </div>

        }
        return this.props.children; 
      }
    }

    `.trim().split('\n').map(line => {
      const [baseId, name, year, team, overall, pos] = line.trim().split('|');
      return { id: baseId + '_' + year, baseId, name, year: parseInt(year), team, overall: parseInt(overall), pos };
    });

    const CPU_TEAMS = [
      "Palmeiras 1999", "São Paulo 2005", "Flamengo 2019", "Corinthians 2012", 
      "Vasco 2000", "Cruzeiro 2003", "Santos 2011", "Grêmio 2017", 
      "Atlético-MG 2013", "Internacional 2006", "Fluminense 2012", "Athletico-PR 2001",
      "Botafogo 1995", "Sport 1987", "Guarani 1978", "Coritiba 1978",
      "Bahia 2001", "Goiás 1990", "São Caetano 2002"
    ];

    //    function generateRoundRobin(playersObj) {
      const uids = Object.keys(playersObj);
      if (uids.length % 2 !== 0) uids.push('BYE'); // Prevenção de bug se o número for ímpar
      
      const numRounds = uids.length - 1;
      const half = uids.length / 2;
      const schedule = [];

      let tournamentUids = [...uids];

      // Turno (19 rodadas)
      for (let round = 0; round < numRounds; round++) {
        const roundMatches = [];
        for (let i = 0; i < half; i++) {
          const p1 = tournamentUids[i];
          const p2 = tournamentUids[uids.length - 1 - i];
          if (p1 !== 'BYE' && p2 !== 'BYE') {
            roundMatches.push({ p1: p1, p2: p2, s1: null, s2: null, played: false });
          }
        }
        schedule.push(roundMatches);
        tournamentUids.splice(1, 0, tournamentUids.pop());
      }

      // Returno (inverte mandos de campo para mais 19 rodadas)
      const returno = schedule.map(round => round.map(match => ({ p1: match.p2, p2: match.p1, s1: null, s2: null, played: false })));
      
      return [...schedule, ...returno]; // Total 38 Rodadas
    }

    //    const ManagerDashboard = ({ roomData, user, roomId }) => {
       const [view, setView] = useState('campanha'); // campanha, tabela
       
       if (!roomData || !roomData.standings || !roomData.schedule) {
          return <div className="min-h-screen flex items-center justify-center text-[#00E676] font-black text-2xl animate-pulse">Sincronizando Tabelas da Confederação...</div>;
       }

       // Ordena Tabela
       const standingsArr = Object.entries(roomData.standings).map(([uid, stats]) => ({ uid, ...stats }))
         .sort((a,b) => b.pts - a.pts || (b.gp - b.gc) - (a.gp - a.gc) || b.gp - a.gp);
       
       const myStats = roomData.standings[user.uid] || {pts:0, j:0, v:0, e:0, d:0, gp:0, gc:0};
       const myPos = standingsArr.findIndex(s => s.uid === user.uid) + 1;
       
       const currentRoundIndex = roomData.currentRound || 0;
       const currentMatches = roomData.schedule[currentRoundIndex] || [];
       const isLeagueOver = currentRoundIndex >= 38;

       const myMatch = currentMatches.find(m => m.p1 === user.uid || m.p2 === user.uid);
       const myNextOpponentId = myMatch ? (myMatch.p1 === user.uid ? myMatch.p2 : myMatch.p1) : null;
       const myNextOpponentName = myNextOpponentId ? roomData.players[myNextOpponentId]?.name : '---';

       // Histórico do Jogador
       const myHistory = [];
       roomData.schedule.forEach((round, idx) => {
         if (idx >= currentRoundIndex) return;
         const match = round.find(m => m.p1 === user.uid || m.p2 === user.uid);
         if (match) {
            const isP1 = match.p1 === user.uid;
            const myScore = isP1 ? match.s1 : match.s2;
            const oppScore = isP1 ? match.s2 : match.s1;
            const result = myScore > oppScore ? 'V' : myScore < oppScore ? 'D' : 'E';
            const oppName = roomData.players[isP1 ? match.p2 : match.p1]?.name || 'Bot';
            myHistory.push({ round: idx + 1, oppName, myScore, oppScore, result, isHome: isP1 });
         }
       });

       const winStreak = () => {
         let count = 0;
         for (let i = myHistory.length - 1; i >= 0; i--) {
           if (myHistory[i].result === 'V') count++; else break;
         }
         return count;
       };

       // Lógica de Simulação de TODOS os jogos da Rodada
       const simulateRound = async () => {
          if (user.uid !== roomData.hostUid || isLeagueOver) return;

          const roundMatches = roomData.schedule[currentRoundIndex];
          const newStandings = JSON.parse(JSON.stringify(roomData.standings));
          let newArtilharia = roomData.artilharia ? JSON.parse(JSON.stringify(roomData.artilharia)) : {};

          const updatedMatches = roundMatches.map(match => {
             const t1 = roomData.players[match.p1];
             const t2 = roomData.players[match.p2];

             const ovr1 = (t1?.overall || 75) + 3; // +3 Fator Casa
             const ovr2 = (t2?.overall || 75);
             
             let s1 = 0; let s2 = 0;
             const power1 = ovr1 / (ovr1 + ovr2);
             
             // 5 a 6 chances de gol no jogo
             const chances = 5 + Math.floor(Math.random() * 2);
             for(let i=0; i<chances; i++) {
               if(Math.random() < 0.35) continue; // Chance errada/Goleiro defendeu
               if(Math.random() < power1) s1++; else s2++;
             }

             // Atualiza Classificação
             newStandings[match.p1].j++; newStandings[match.p2].j++;
             newStandings[match.p1].gp += s1; newStandings[match.p1].gc += s2;
             newStandings[match.p2].gp += s2; newStandings[match.p2].gc += s1;
             
             if(s1 > s2) { newStandings[match.p1].pts += 3; newStandings[match.p1].v++; newStandings[match.p2].d++; }
             else if(s2 > s1) { newStandings[match.p2].pts += 3; newStandings[match.p2].v++; newStandings[match.p1].d++; }
             else { newStandings[match.p1].pts += 1; newStandings[match.p2].pts += 1; newStandings[match.p1].e++; newStandings[match.p2].e++; }

             // Atualiza Artilharia
             const assignGoal = (teamId, teamObj, goals) => {
               if(!teamObj || !teamObj.team) return;
               for(let g=0; g<goals; g++) {
                  const scorers = teamObj.team.filter(p => p.pos === 'ATA' || p.pos === 'PON' || p.pos === 'MEI');
                  const p = scorers.length > 0 ? scorers[Math.floor(Math.random() * scorers.length)] : teamObj.team[0];
                  
                  if(!newArtilharia[p.id]) newArtilharia[p.id] = { name: p.name, team: teamObj.name, goals: 0 };
                  newArtilharia[p.id].goals += 1;
               }
             };

             assignGoal(match.p1, t1, s1);
             assignGoal(match.p2, t2, s2);

             return { ...match, s1, s2, played: true };
          });

          const updates = {};
          updates[`schedule/${currentRoundIndex}`] = updatedMatches;
          updates[`standings`] = newStandings;
          updates[`artilharia`] = newArtilharia;
          updates[`currentRound`] = currentRoundIndex + 1;

          await db.ref(`games/${APP_ID}/${roomId}`).update(updates);
       };

       const topScorers = Object.values(roomData.artilharia || {}).sort((a,b) => b.goals - a.goals).slice(0, 10);

       return (
         <div className="min-h-screen p-4 md:p-8 flex flex-col md:flex-row gap-6 max-w-[1600px] mx-auto animate-slide-up">
            
            {/* Esquerda: Campanha Widget */}
            <div className="w-full md:w-[300px] flex flex-col gap-6 shrink-0">
               <div className="manager-card p-6 flex flex-col gap-6">
                 <h3 className="text-[#00E676] font-black text-xs tracking-widest uppercase">Sua Campanha</h3>
                 
                 <div className="flex justify-between items-end border-b border-white/10 pb-4">
                   <div>
                     <div className="text-4xl md:text-5xl font-black text-[#00E676]">{myPos}º</div>
                     <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Posição</div>
                   </div>
                   <div className="text-right">
                     <div className="text-4xl md:text-5xl font-black text-white">{myStats.pts}</div>
                     <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Pontos</div>
                   </div>
                 </div>

                 <div className="border-b border-white/10 pb-4">
                   <div className="font-black text-lg">{myStats.v}V {myStats.e}E {myStats.d}D</div>
                   <div className="text-xs text-gray-400 font-medium mt-1">GP {myStats.gp} / GC {myStats.gc} / SG {myStats.gp - myStats.gc}</div>
                 </div>

                 <div className="pb-2">
                   <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Sequência</div>
                   <div className="font-black text-2xl text-white">{winStreak()} vitórias</div>
                 </div>
               </div>
            </div>

            {/* Centro: Painel Principal */}
            <div className="flex-1 flex flex-col gap-6">
               <div className="manager-card p-6 md:p-8">
                 <h3 className="text-[#00E676] font-black text-xs tracking-widest uppercase mb-2">Brasileirão Jogo a Jogo</h3>
                 <h1 className="text-4xl md:text-5xl font-black text-white mb-2">Campanha</h1>
                 <p className="text-gray-400 font-medium mb-6">Rodada {Math.min(38, currentRoundIndex + 1)}/38</p>

                 <div className="bg-[#0B1319] border border-white/5 rounded-xl p-4 flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                    <span className="font-bold text-gray-300">{myStats.v}V {myStats.e}E {myStats.d}D</span>
                    <span className="font-bold text-gray-300 hidden md:block">GP {myStats.gp} / GC {myStats.gc}</span>
                    <span className="font-bold text-white text-center md:text-right">Próximo Jogo:<br/><span className="text-[#00E676]">{myNextOpponentName}</span></span>
                 </div>

                 <div className="flex justify-between items-center bg-[#0B1319] border border-white/5 rounded-xl p-4">
                    <div className="hidden md:flex flex-col gap-2">
                       <span className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Controle de Tempo</span>
                       <div className="flex gap-2">
                         <span className="bg-[#00E676] text-black font-black text-xs px-4 py-1.5 rounded-full">Turbo</span>
                       </div>
                    </div>
                    {user.uid === roomData.hostUid && !isLeagueOver ? (
                      <button onClick={simulateRound} className="w-full md:w-auto bg-transparent border border-white/20 text-white font-bold px-8 py-3 rounded-lg hover:bg-white/10 transition flex justify-center items-center gap-2">
                         <i className="fa-solid fa-rotate"></i> Simular Rodada
                      </button>
                    ) : isLeagueOver ? (
                      <div className="text-[#00E676] font-black uppercase text-xl w-full text-center"><i className="fa-solid fa-trophy mr-2"></i> Brasileirão Encerrado</div>
                    ) : (
                      <div className="text-yellow-500 font-bold text-sm w-full text-center"><i className="fa-solid fa-spinner fa-spin mr-2"></i> Aguardando Host Simular...</div>
                    )}
                 </div>
               </div>

               {/* Abas */}
               <div className="flex gap-4 border-b border-white/10 pb-2 px-2">
                 <button onClick={()=>setView('campanha')} className={`font-black uppercase tracking-widest text-xs pb-2 border-b-2 transition-colors ${view==='campanha'?'text-white border-[#00E676]':'text-gray-500 border-transparent hover:text-gray-300'}`}>Meus Jogos</button>
                 <button onClick={()=>setView('tabela')} className={`font-black uppercase tracking-widest text-xs pb-2 border-b-2 transition-colors ${view==='tabela'?'text-white border-[#00E676]':'text-gray-500 border-transparent hover:text-gray-300'}`}>Classificação</button>
               </div>

               <div className="flex-1 overflow-y-auto pr-2 space-y-4 pb-10">
                  {view === 'campanha' && myHistory.length === 0 && <div className="text-gray-500 text-center mt-10 font-bold">Nenhuma partida jogada ainda.</div>}
                  {view === 'campanha' && myHistory.slice().reverse().map((m, i) => {
                     const badgeClass = m.result === 'V' ? 'badge-v' : m.result === 'E' ? 'badge-e' : 'badge-d';
                     return (
                        <div key={i} className="manager-card p-4 md:p-5 flex justify-between items-center group hover:border-[#00E676]/50 transition-colors">
                           <div className="flex-1">
                             <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">RODADA {m.round}</div>
                             <div className="font-black text-sm md:text-lg flex flex-col md:flex-row gap-2 md:gap-3 items-start md:items-center">
                               <span className="truncate max-w-[150px]">{m.isHome ? 'Seu Esquadrão' : m.oppName}</span>
                               <span className="text-xl md:text-2xl text-[#00E676] font-mono bg-[#0B1319] px-3 rounded shadow-inner">{m.isHome ? m.myScore : m.oppScore} x {m.isHome ? m.oppScore : m.myScore}</span>
                               <span className="truncate max-w-[150px]">{!m.isHome ? 'Seu Esquadrão' : m.oppName}</span>
                             </div>
                           </div>
                           <div className={`w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center text-sm md:text-lg shadow-lg shrink-0 ${badgeClass}`}>
                             {m.result}
                           </div>
                        </div>
                     );
                  })}

                  {view === 'tabela' && (
                     <div className="manager-card p-2 md:p-4 overflow-x-auto">
                        <table className="w-full text-left text-xs md:text-sm">
                           <thead className="text-gray-500 text-[9px] md:text-[10px] uppercase tracking-widest border-b border-white/10">
                              <tr><th className="pb-3 pl-2">Pos</th><th className="pb-3">Clube</th><th className="pb-3 text-center">Pts</th><th className="pb-3 text-center">J</th><th className="pb-3 text-center hidden md:table-cell">V</th><th className="pb-3 text-center hidden md:table-cell">E</th><th className="pb-3 text-center hidden md:table-cell">D</th><th className="pb-3 text-center">SG</th></tr>
                           </thead>
                           <tbody className="font-medium text-gray-300">
                              {standingsArr.map((t, i) => (
                                 <tr key={t.uid} className={`border-b border-white/5 last:border-0 hover:bg-white/5 transition ${t.uid === user.uid ? 'bg-green-900/20 text-white font-bold' : ''}`}>
                                    <td className={`p-2 md:p-3 pl-2 font-black ${i < 4 ? 'text-blue-400' : i > 15 ? 'text-red-500' : ''}`}>{i+1}</td>
                                    <td className="p-2 md:p-3 truncate max-w-[100px] md:max-w-[200px]">{t.uid === user.uid ? <span className="text-[#00E676]">Você <i className="fa-solid fa-star text-[10px]"></i></span> : t.name}</td>
                                    <td className="p-2 md:p-3 text-center font-black text-white">{t.pts}</td>
                                    <td className="p-2 md:p-3 text-center">{t.j}</td>
                                    <td className="p-2 md:p-3 text-center hidden md:table-cell">{t.v}</td>
                                    <td className="p-2 md:p-3 text-center hidden md:table-cell">{t.e}</td>
                                    <td className="p-2 md:p-3 text-center hidden md:table-cell">{t.d}</td>
                                    <td className="p-2 md:p-3 text-center">{t.gp - t.gc}</td>
                                 </tr>
                              ))}
                           </tbody>
                        </table>
                     </div>
                  )}
               </div>
            </div>

            {/* Direita: Artilharia */}
            <div className="w-full md:w-[320px] shrink-0 flex flex-col gap-4">
               <h3 className="text-[#00E676] font-black text-xs tracking-widest uppercase pl-2">Artilharia</h3>
               <div className="space-y-3">
                  {topScorers.length === 0 && <div className="text-gray-500 text-sm font-bold pl-2">Nenhum gol marcado ainda.</div>}
                  {topScorers.map((s, i) => (
                     <div key={i} className="bg-[#00E676] rounded-xl p-3 flex justify-between items-center shadow-lg relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-white/20 blur-2xl rounded-full -translate-y-1/2 translate-x-1/2"></div>
                        <div className="flex gap-3 items-center relative z-10 w-[70%]">
                           <div className="w-6 h-6 shrink-0 bg-black/20 rounded-full flex items-center justify-center font-black text-black text-xs">{i+1}</div>
                           <div className="truncate">
                             <div className="font-black text-black leading-tight truncate">{s.name}</div>
                             <div className="text-[9px] font-bold text-black/60 uppercase tracking-widest truncate">{s.team}</div>
                           </div>
                        </div>
                        <div className="w-10 h-10 shrink-0 bg-[#0B1319] text-white rounded-full flex items-center justify-center font-black text-lg shadow-inner relative z-10">
                          {s.goals}
                        </div>
                     </div>
                  ))}
               </div>
            </div>
         </div>
       );
    };

    //    function App() {
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [playerName, setPlayerName] = useState('');
      const [appState, setAppState] = useState('MENU'); 
      const [roomData, setRoomData] = useState(null);
      const [roomId, setRoomId] = useState('');
      const [error, setError] = useState('');
      
      const [myTeam, setMyTeam] = useState([]);
      const [draftOptions, setDraftOptions] = useState([]);
      
      // OBRIGATÓRIO: Formação Fixa para simplificar o Draft
      const formation = ['GOL', 'LAT', 'ZAG', 'ZAG', 'LAT', 'VOL', 'MEI', 'MEI', 'PON', 'ATA', 'ATA'];

      useEffect(() => {
        const init = async () => {
          try { await auth.signInAnonymously(); } catch(e) { console.error(e); }
        };
        init();
        const unsub = auth.onAuthStateChanged(u => { setUser(u); setIsAuthLoading(false); });
        return () => unsub();
      }, []);

      useEffect(() => {
        if(!user || !roomId || appState === 'MENU') return;
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const listener = roomRef.on('value', snap => {
          if(snap.exists()) {
            const data = snap.val();
            setRoomData(data);
            
            // Máquina de Estados de Transição
            if(data.status === 'drafting' && appState === 'LOBBY') {
               setAppState('DRAFTING');
               generatePacks([], data); // Inicia pacotes para quem estava no lobby
            }
            if(data.status === 'tournament' && appState !== 'TOURNAMENT') setAppState('TOURNAMENT');
          } else {
            setError("Sala não encontrada ou foi encerrada.");
            setAppState('MENU');
          }
        });
        return () => roomRef.off('value', listener);
      }, [user, roomId, appState]);

      // Cria a Sala como LOBBY (Sem Bots ainda, esperando os amigos)
      const handleCreateRoom = async () => {
        if(!playerName || !roomId) return setError("Digite seu Nome e uma Sala.");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(snap.exists()) return setError("Esta sala já existe.");

        await roomRef.set({
          hostUid: user.uid, status: 'lobby', currentRound: 0,
          players: { [user.uid]: { name: playerName, team: [], overall: 0, isReady: false, isBot: false } }
        });
        setAppState('LOBBY');
        setError('');
      };

      // Entrar em uma sala existente
      const handleJoinRoom = async () => {
        if(!playerName || !roomId) return setError("Digite seu Nome e a Sala.");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(!snap.exists()) return setError("Sala não encontrada.");
        
        const data = snap.val();
        if(data.status !== 'lobby') return setError("O Draft já começou nesta sala.");
        if(Object.keys(data.players || {}).length >= 20) return setError("Sala lotada (Máx 20).");

        await roomRef.update({
           [`players/${user.uid}`]: { name: playerName, team: [], overall: 0, isReady: false, isBot: false }
        });
        setAppState('LOBBY');
        setError('');
      };

      // HOST: Iniciar o Draft (Preenche os slots vazios com BOTS)
      const startDraft = async () => {
         if (user.uid !== roomData.hostUid) return;
         
         const currentPlayers = Object.keys(roomData.players || {});
         const botsNeeded = 20 - currentPlayers.length; // Brasileirão tem 20 times
         
         const updates = {};
         updates['status'] = 'drafting';
         
         for(let i=0; i<botsNeeded; i++) {
            const teamName = CPU_TEAMS[i % CPU_TEAMS.length];
            const botTeam = formation.map((pos, idx) => ({
               id: `bot_${i}_${idx}`, name: `Jogador ${idx+1}`, team: teamName,
               pos: pos, overall: 75 + Math.floor(Math.random()*12)
            }));
            const botOvr = Math.round(botTeam.reduce((acc, p) => acc + p.overall, 0) / 11);
            
            updates[`players/bot_${i}`] = {
               name: teamName, team: botTeam, overall: botOvr, isReady: true, isBot: true
            };
         }
         
         await db.ref(`games/${APP_ID}/${roomId}`).update(updates);
      };

      // Gerador de Pacotes do Draft Local
      const generatePacks = (currentTeam, currentRoomData) => {
         if (currentTeam.length >= 11) return;
         const reqPos = formation[currentTeam.length];
         
         let pool = RAW_DB.filter(p => p.pos === reqPos);
         let options = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
         
         // Fallback se faltar jogador no DB
         while(options.length < 3) {
            options.push({ id: `gen_${Date.now()}_${options.length}`, name: "Base", team: "Academy", year: 2024, overall: 75, pos: reqPos });
         }
         setDraftOptions(options);
      };

      const pickPlayer = async (player) => {
         const newTeam = [...myTeam, player];
         setMyTeam(newTeam);
         
         if (newTeam.length < 11) {
            generatePacks(newTeam, roomData);
         } else {
            setDraftOptions([]);
            const finalOvr = Math.round(newTeam.reduce((acc, p) => acc + p.overall, 0) / 11);
            await db.ref(`games/${APP_ID}/${roomId}/players/${user.uid}`).update({
               team: newTeam, overall: finalOvr, isReady: true
            });
         }
      };

      // HOST: Após todos draftarem, gera a Tabela e vai pro Torneio
      const startTournament = async () => {
         if (user.uid !== roomData.hostUid) return;
         
         const schedule = generateRoundRobin(roomData.players);
         const standings = {};
         Object.keys(roomData.players).forEach(uid => {
            standings[uid] = { name: roomData.players[uid].name, pts: 0, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0 };
         });

         await db.ref(`games/${APP_ID}/${roomId}`).update({
            status: 'tournament', schedule, standings, artilharia: {}
         });
      };

      // RENDERS
      if (appState === 'MENU') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
             <div className="manager-card p-10 w-full max-w-md animate-slide-up text-center border-t-4 border-[#00E676]">
                <h1 className="text-4xl font-black text-white tracking-tight mb-2">DRAFT KINGS</h1>
                <p className="text-[#00E676] font-bold text-xs tracking-widest uppercase mb-8">Brasileirão Manager (Online)</p>
                
                <div className="space-y-4">
                  <input className="w-full p-4 bg-[#0B1319] rounded-xl text-white outline-none border border-white/10 focus:border-[#00E676] font-bold transition" placeholder="Nome do Treinador" value={playerName} onChange={e=>setPlayerName(e.target.value)} />
                  <input className="w-full p-4 bg-[#0B1319] rounded-xl text-white outline-none border border-white/10 focus:border-[#00E676] font-black uppercase text-center transition" placeholder="SALA (Ex: BRASIL)" value={roomId} onChange={e=>setRoomId(e.target.value.toUpperCase())} />
                  
                  {error && <div className="text-red-400 text-sm font-bold bg-red-900/30 p-2 rounded">{error}</div>}
                  
                  <button onClick={handleCreateRoom} className="w-full bg-[#00E676] text-black font-black py-4 rounded-xl hover:scale-[1.02] transition">CRIAR LIGA (HOST)</button>
                  <button onClick={handleJoinRoom} className="w-full bg-transparent border border-[#00E676] text-[#00E676] font-black py-4 rounded-xl hover:bg-[#00E676]/10 transition">ENTRAR NA LIGA</button>
                </div>
             </div>
          </div>
        );
      }

      // Sync Gate de Segurança
      if (!roomData) return <div className="min-h-screen flex items-center justify-center text-[#00E676] font-black animate-pulse">Sincronizando Rede...</div>;

      const isHost = roomData.hostUid === user.uid;
      const allReady = Object.values(roomData.players || {}).every(p => p.isReady);

      if (appState === 'LOBBY') {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4">
             <div className="manager-card p-10 text-center max-w-lg w-full animate-slide-up">
                <h2 className="text-3xl font-black mb-2 text-white">Sala de Espera</h2>
                <p className="text-[#00E676] font-mono mb-8 text-xl">SALA: {roomId}</p>
                
                <div className="bg-[#0B1319] p-4 rounded-xl border border-white/5 mb-8">
                   <h3 className="text-xs text-gray-400 uppercase tracking-widest mb-3">Treinadores Conectados</h3>
                   {Object.entries(roomData.players).map(([uid, p]) => (
                     <div key={uid} className="text-white font-bold py-2 border-b border-white/5 last:border-0">{p.name} {uid === user.uid && <span className="text-[#00E676]">(Você)</span>}</div>
                   ))}
                </div>

                {isHost ? (
                  <button onClick={startDraft} className="w-full bg-[#00E676] text-black font-black py-4 rounded-xl hover:bg-green-400 transition shadow-lg">INICIAR DRAFT (COMPLETAR C/ BOTS)</button>
                ) : (
                  <div className="text-yellow-500 font-bold animate-pulse">Aguardando Host iniciar o Draft...</div>
                )}
             </div>
          </div>
        );
      }

      if (appState === 'DRAFTING') {
         const reqPos = formation[myTeam.length];
         return (
           <div className="min-h-screen flex flex-col items-center p-8">
             {myTeam.length < 11 ? (
               <div className="text-center w-full max-w-3xl animate-slide-up">
                 <h1 className="text-3xl font-black mb-2">Sua vez! Escolha seu {reqPos}</h1>
                 <p className="text-[#00E676] font-bold text-xs uppercase tracking-widest mb-10">Jogador {myTeam.length + 1} de 11</p>
                 
                 <div className="flex flex-wrap justify-center gap-6">
                   {draftOptions.map(p => (
                     <div key={p.id} onClick={() => pickPlayer(p)} className="manager-card w-48 p-4 cursor-pointer hover:border-[#00E676] hover:-translate-y-2 transition-all flex flex-col items-center text-center">
                       <div className="font-black text-4xl text-[#00E676] mb-2">{p.overall}</div>
                       <div className="font-black text-lg text-white leading-tight mb-1">{p.name}</div>
                       <div className="text-[10px] bg-black/50 px-2 py-1 rounded font-bold uppercase tracking-widest">{p.pos}</div>
                       <div className="text-xs text-gray-500 mt-2">{p.team}</div>
                     </div>
                   ))}
                 </div>
               </div>
             ) : (
               <div className="manager-card p-10 text-center max-w-md w-full animate-slide-up">
                 <i className="fa-solid fa-check-circle text-6xl text-[#00E676] mb-6"></i>
                 <h2 className="text-2xl font-black text-white mb-2">Esquadrão Fechado!</h2>
                 <p className="text-gray-400 mb-8 font-bold">Aguardando os outros treinadores terminarem...</p>
                 
                 {isHost && allReady && (
                   <button onClick={startTournament} className="w-full bg-[#00E676] text-black font-black py-4 rounded-xl shadow-lg hover:scale-105 transition">GERAR TABELA DO BRASILEIRÃO</button>
                 )}
               </div>
             )}
           </div>
         )
      }

      if (appState === 'TOURNAMENT') {
         return <ManagerDashboard roomData={roomData} user={user} roomId={roomId} />;
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
