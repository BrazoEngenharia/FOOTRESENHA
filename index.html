            'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',

            'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite'
          },
          keyframes: {
            shake: { '10%,90%':{transform:'translate3d(-3px,0,0)'},'20%,80%':{transform:'translate3d(4px,0,0)'},'30%,50%,70%':{transform:'translate3d(-8px,0,0)'},'40%,60%':{transform:'translate3d(8px,0,0)'} },
            flare: { '0%': { transform: 'scale(0.8)', opacity: 0 }, '50%': { opacity: 1 }, '100%': { transform: 'scale(1.2)', opacity: 0 } },
            slideUp: { '0%': { opacity: 0, transform: 'translateY(30px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            walkout: { '0%': { opacity: 0, transform: 'scale(0.5) translateY(100px) rotateX(-45deg)' }, '100%': { opacity: 1, transform: 'scale(1) translateY(0) rotateX(0)' } }

    const SFX = {
      ready: false, synth: null, kick: null, noise: null,
      init: async () => {
        if(SFX.ready) return;
        await Tone.start();
        SFX.synth = new Tone.PolySynth(Tone.Synth).toDestination();
        SFX.synth.volume.value = -8;
        SFX.kick = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 10, oscillator: { type: "sine" } }).toDestination();
        SFX.kick.volume.value = 6;
        const filter = new Tone.Filter(1000, "lowpass").toDestination();
        SFX.noise = new Tone.NoiseSynth({ noise: { type: "brown" }, envelope: { attack: 0.5, decay: 0.1, sustain: 1, release: 2 } }).connect(filter);
        SFX.noise.volume.value = -15;
        SFX.ready = true;
      },
      click: () => SFX.ready && SFX.synth.triggerAttackRelease(["C4"], "32n"),
      pick: () => SFX.ready && SFX.synth.triggerAttackRelease(["E4", "G4"], "16n"),
      walkout: () => {
        if(!SFX.ready) return;
        SFX.kick.triggerAttackRelease("C1", "1n");
        SFX.synth.triggerAttackRelease(["C3", "G3", "C4"], "1n");
      },
      whistle: () => { if(SFX.ready){ SFX.synth.triggerAttackRelease("C6", "8n"); setTimeout(()=>SFX.synth.triggerAttackRelease("C6", "4n"), 200); } },
      goal: () => { 
        if(!SFX.ready) return;
        SFX.kick.triggerAttackRelease("C1", "2n");

    const MatchViewer = ({ match }) => {
      const [localMin, setLocalMin] = useState(0);
      const [events, setEvents] = useState([]);
      const [s1, setS1] = useState(0);
      const [s2, setS2] = useState(0);
      const [momentum, setMomentum] = useState(50); // 0 = Domínio P1, 100 = Domínio P2
      const [shake, setShake] = useState(false);

      useEffect(() => {
        if (!match || !match.played) return;
        if(Date.now() - match.startTime < 1000) SFX.whistle();

        // Engine de tempo real cravada: 30 segundos exatos (333ms por minuto virtual)
        const msPerMin = 333; 

        const timer = setInterval(() => {
          const elapsed = Date.now() - match.startTime;
          let min = Math.floor(elapsed / msPerMin);
          if (min > 90) { min = 90; clearInterval(timer); }
          setLocalMin(min);

          // Puxa eventos até o minuto atual
          const currentEvents = match.events.filter(e => e.minute <= min);
          setEvents(currentEvents.reverse()); 

          // Gols e Placar
          const goals1 = currentEvents.filter(e => e.type === 'goal' && e.teamId === match.p1.uid).length;
          const goals2 = currentEvents.filter(e => e.type === 'goal' && e.teamId === match.p2.uid).length;
          
          if (goals1 > s1 || goals2 > s2) {
            SFX.goal();
            setShake(true);
            setTimeout(() => setShake(false), 500);
          }
          setS1(goals1); setS2(goals2);

          // Momentum Simulation UI
          if (min < 90 && min % 3 === 0) {
            // Acha o último momento no array pré-calculado ou faz ruído aleatório
            const lastMom = match.momentumData?.find(m => m.min <= min);
            let targetMom = lastMom ? lastMom.val : 50 + (Math.random() * 20 - 10);
            setMomentum(targetMom);
          }

        }, 100);
        return () => clearInterval(timer);
      }, [match]);

      if (!match) return null;
      const isFinished = localMin === 90;

      return (
        <div className={`glass rounded-2xl flex flex-col h-[600px] overflow-hidden transition-all duration-300 ${shake ? 'animate-shake border-yellow-500 shadow-[0_0_50px_rgba(250,204,21,0.5)]' : 'border-green-800'}`}>
          <div className={`p-4 border-b border-white/10 text-center relative transition-colors duration-500 ${shake ? 'bg-yellow-600 text-black' : 'bg-gradient-to-b from-black/80 to-transparent'}`}>
            <div className={`font-black text-xs tracking-widest mb-2 flex justify-center items-center gap-2 ${shake ? 'text-black' : 'text-yellow-400'}`}>
              {isFinished ? <><i className="fa-solid fa-flag-checkered"></i> FIM DE JOGO</> : <><i className="fa-solid fa-satellite-dish animate-pulse"></i> {localMin}' MINUTOS</>}
            </div>
            <div className="flex justify-between items-center px-2 md:px-8 relative z-10">
              <div className="flex-1 text-right font-black text-xl md:text-3xl truncate drop-shadow-lg">{match.p1.name}</div>
              <div className="mx-4 px-6 py-2 bg-black/80 rounded-xl border border-white/20 flex gap-4 text-4xl font-black text-white shadow-inner">
                <span>{s1}</span><span className="text-gray-600 text-2xl self-center">x</span><span>{s2}</span>
              </div>
              <div className="flex-1 text-left font-black text-xl md:text-3xl truncate drop-shadow-lg">{match.p2.name}</div>
            </div>
            
            {/* Momentum Bar (Tug of War) */}
            <div className="absolute bottom-0 left-0 w-full h-2 bg-gray-900 overflow-hidden flex">
              <div className="h-full bg-blue-500 momentum-bar relative" style={{width: `${100 - momentum}%`}}>
                <div className="absolute right-0 top-0 w-10 h-full bg-gradient-to-l from-white/50 to-transparent"></div>
              </div>
              <div className="h-full bg-red-500 momentum-bar relative" style={{width: `${momentum}%`}}>
                 <div className="absolute left-0 top-0 w-10 h-full bg-gradient-to-r from-white/50 to-transparent"></div>
              </div>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-gradient-to-b from-black/20 to-black/80">
            {events.length === 0 && <div className="text-center text-green-500/50 mt-20 font-bold text-xl animate-pulse">A bola rola e o cronômetro dispara...</div>}
            {events.map((ev, i) => {
              let bg = 'bg-black/50 border-green-900/50 text-gray-300';
              let icon = 'fa-shoe-prints text-green-600';
              if(ev.type === 'goal') { bg = 'bg-yellow-500 text-black border-yellow-400 font-black text-xl scale-[1.02] shadow-[0_0_20px_rgba(250,204,21,0.4)]'; icon = 'fa-futbol animate-bounce'; }
              else if(ev.type === 'foul') { bg = 'bg-red-950/80 border-red-700 text-red-100 font-bold'; icon = 'fa-square text-red-500'; }
              else if(ev.type === 'save') { bg = 'bg-blue-950/80 border-blue-700 text-blue-100 font-bold'; icon = 'fa-hands text-blue-400'; }
              else if(ev.type === 'attack') { bg = 'bg-green-900/80 border-green-500 text-green-50 font-bold'; icon = 'fa-fire text-orange-500'; }
              else if(ev.type === 'info') { bg = 'bg-gray-800 border-gray-600 text-white font-black text-center justify-center'; icon = 'fa-info-circle text-gray-400'; }

              return (
                <div key={i} className={`p-4 rounded-xl border-2 flex gap-4 items-center animate-slide-up ${bg}`}>
                  {ev.type !== 'info' && <span className="font-black opacity-60 min-w-[35px] text-right">{ev.minute}'</span>}
                  <i className={`fa-solid ${icon} text-xl`}></i>
                  <span className="leading-tight flex-1">{ev.text}</span>
                </div>
              )
            })}
          </div>
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [playerName, setPlayerName] = useState('');
      const [appState, setAppState] = useState('INIT'); // INIT, MENU, LOBBY, DRAFT_SETUP, DRAFTING, TACTICS, TOURNAMENT
      const [roomData, setRoomData] = useState(null);
      const [roomId, setRoomId] = useState('');
      const [gameMode, setGameMode] = useState('knockout'); // knockout, league, 1v1
      const [error, setError] = useState('');
      
      // Local Draft State
      const [myFormation, setMyFormation] = useState('4-3-3');
      const [draftOptions, setDraftOptions] = useState([]);
      const [myTeam, setMyTeam] = useState([]);
      const [walkoutPlayer, setWalkoutPlayer] = useState(null);
      const [tactic, setTactic] = useState('Equilibrado');
      const seenIds = useRef(new Set()); 

      // 1. Auth Loop
      useEffect(() => {
        const init = async () => {
          try {
            await auth.signInAnonymously();
          } catch(e) {
            console.error("Auth Fail:", e);
            setError("Erro crítico ao conectar no servidor. Ative o Login Anônimo no Firebase.");
          }
        };
        init();
        
        const unsub = auth.onAuthStateChanged(u => {
          setUser(u);
          setIsAuthLoading(false);
        });
        return () => unsub();
      }, []);

      // 2. Realtime Database Sync Loop
      useEffect(() => {
        if(!user || !roomId || appState === 'INIT' || appState === 'MENU') return;
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const listener = roomRef.on('value', snap => {
          if(snap.exists()) {
            const data = snap.val();
            setRoomData(data);
            
            // Máquina de Estados Global -> Local
            if(data.status === 'draft_setup' && appState === 'LOBBY') setAppState('DRAFT_SETUP');
            if(data.status === 'drafting' && appState === 'DRAFT_SETUP') setAppState('DRAFTING');
            if(data.status === 'tactics' && appState === 'DRAFTING') setAppState('TACTICS');
            if(data.status === 'tournament' && appState !== 'TOURNAMENT') setAppState('TOURNAMENT');
          } else {
            setAppState('MENU');
            setError('A sala foi encerrada pelo Host.');
          }
        });
        return () => roomRef.off('value', listener);
      }, [user, roomId, appState]);

      const initEngine = async () => {
        await SFX.init();
        SFX.click();
        setAppState('MENU');
      };

      const handleCreateRoom = async () => {
        SFX.click();
        if(!playerName || !roomId) return setError("Preencha Nome e Sala.");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(snap.exists()) return setError("Sala já existe. Escolha outro código.");

        await roomRef.set({
          hostUid: user.uid, status: 'lobby', stage: 0, mode: gameMode,
          players: { [user.uid]: { name: playerName, team: [], overall: 0, isReady: false, isBot: false, tactic: 'Equilibrado' } }
        });
        setAppState('LOBBY');
      };

      const handleJoinRoom = async () => {
        SFX.click();
        if(!playerName || !roomId) return setError("Preencha Nome e Sala.");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(!snap.exists()) return setError("Sala não encontrada.");
        const data = snap.val();
        if(data.status !== 'lobby') return setError("A partida já começou.");
        
        await roomRef.update({ [`players/${user.uid}`]: { name: playerName, team: [], overall: 0, isReady: false, isBot: false, tactic: 'Equilibrado' } });
        setAppState('LOBBY');
      };

      const pullPacks = (currentTeamLength) => {
        if (currentTeamLength >= 11) return;
        
        const requiredPos = FORMATIONS[myFormation][currentTeamLength];
        
        // Filtra estritamente por posição da prancheta
        let pool = RAW_DB.filter(p => p.pos === requiredPos && !seenIds.current.has(p.baseId));
        
        let options = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
        
        // Fallback: Se não achar jogadores reais da posição, gera lendas locais na hora (Proteção contra crash)
        let botIndex = 0;
        while (options.length < 3) {
           const mockId = `gen_${requiredPos}_${Date.now()}_${botIndex}`;
           options.push({
             id: mockId, baseId: mockId, name: `Base Talent`, year: 2024, team: 'Academy', 
             overall: 70 + Math.floor(Math.random()*12), pos: requiredPos
           });
           botIndex++;
        }

        options.forEach(p => seenIds.current.add(p.baseId));
        setDraftOptions(options);
      };

      const startDrafting = () => {
        SFX.click();
        setAppState('DRAFTING');
        pullPacks(0); 
      };

      const calculateChemistry = (team) => {
        let chemBoost = 0;
        const teamCounts = {};
        team.forEach(p => { teamCounts[p.team] = (teamCounts[p.team] || 0) + 1; });
        Object.values(teamCounts).forEach(count => {
           if(count >= 2) chemBoost += (count - 1) * 2; // +2 de OVR extra por dupla/trio do mesmo time
        });
        return chemBoost;
      };

      const pickPlayer = async (player) => {
        if (myTeam.length >= 11) return;
        
        // Walkout VFX check
        if (player.overall >= 93) {
          SFX.walkout();
          setWalkoutPlayer(player);
          setTimeout(() => setWalkoutPlayer(null), 3000);
        } else {
          SFX.pick();
        }
        
        const newTeam = [...myTeam, player];
        setMyTeam(newTeam);
        
        if (newTeam.length < 11) {
          pullPacks(newTeam.length);
        } else {
          setDraftOptions([]); 
          // Calcula OVR base + Entrosamento (Chemistry)
          const baseOvr = newTeam.reduce((acc, p) => acc + p.overall, 0) / 11;
          const chemOvr = calculateChemistry(newTeam);
          const finalOvr = Math.min(99, Math.round(baseOvr + chemOvr));
          
          try {
            await db.ref(`games/${APP_ID}/${roomId}/players/${user.uid}`).update({
              team: newTeam, overall: finalOvr, isReady: true
            });
          } catch(e) { console.error("Save error", e); }
        }
      };

      const confirmTactic = async () => {
        SFX.click();
        await db.ref(`games/${APP_ID}/${roomId}/players/${user.uid}`).update({ tactic, isReady: true });
      };

      const generateTournamentBracket = async () => {
        SFX.click();
        const players = Object.entries(roomData.players).map(([uid, p]) => ({uid, ...p}));
        
        let targetSize = 8;
        if (roomData.mode === '1v1') targetSize = 2;
        else if (players.length <= 4) targetSize = 4;
        
        let bracketPlayers = [...players];
        let b = 0;
        while(bracketPlayers.length < targetSize) {
          bracketPlayers.push({ uid: `bot_${b}`, name: BOT_NAMES[b%BOT_NAMES.length], overall: 75 + Math.floor(Math.random()*15), isBot: true, tactic: 'Equilibrado' });
          b++;
        }
        bracketPlayers.sort(() => 0.5 - Math.random());

        let matches = [];
        for(let i=0; i<targetSize; i+=2) {
           matches.push({ p1: bracketPlayers[i], p2: bracketPlayers[i+1], played: false, events: [] });
        }
        let stageName = targetSize === 8 ? 'quarters' : targetSize === 4 ? 'semis' : 'final';
        
        // Reset readiness for next phase
        const updates = { status: 'tournament', stage: targetSize === 8 ? 1 : targetSize === 4 ? 2 : 3, [`bracket/${stageName}`]: matches };
        players.forEach(p => { updates[`players/${p.uid}/isReady`] = false; });
        await db.ref(`games/${APP_ID}/${roomId}`).update(updates);
      };

      const simulateMatches = async () => {
        SFX.click();
        const startTime = Date.now() + 1500; 
        const stageKey = roomData.stage === 1 ? 'quarters' : roomData.stage === 2 ? 'semis' : 'final';
        const matchesToSim = roomData.bracket[stageKey];

        const simulatedMatches = matchesToSim.map(match => {
           let events = [];
           let momentumData = [];
           let s1=0, s2=0;
           let currentMom = 50;
           
           // Aplica Buff/Nerf de Tática do Manager
           const t1 = TACTICS[match.p1.tactic] || TACTICS['Equilibrado'];
           const t2 = TACTICS[match.p2.tactic] || TACTICS['Equilibrado'];

           // Fator Zebra + Tática
           const luck1 = (Math.random() * 20 - 10);
           const luck2 = (Math.random() * 20 - 10);
           const ovr1 = (match.p1.overall * t1.atkMod) + luck1; 
           const ovr2 = (match.p2.overall * t2.atkMod) + luck2;
           
           const prob1 = Math.max(0.2, Math.min(0.8, ovr1 / (ovr1 + ovr2)));

           for(let min=1; min<=90; min++) {
             // Atualiza Momento (Tug of War)
             if(min % 5 === 0) {
                currentMom += (Math.random() > prob1 ? 15 : -15);
                currentMom = Math.max(10, Math.min(90, currentMom));
                momentumData.push({min, val: currentMom});
             }

             // Multiplicador de Pressão: Se mom < 30 (P1 dominando), P1 tem mais chance
             let actionProb = 0.12; // 12% chance base de lance perigoso por minuto
             if (currentMom < 30) actionProb = 0.18; // P1 abafa
             if (currentMom > 70) actionProb = 0.18; // P2 abafa

             if(Math.random() < actionProb) { 
               // Quem ataca depende do momentum
               const isP1 = Math.random() < (currentMom < 50 ? 0.7 : 0.3);
               const att = isP1 ? match.p1 : match.p2;
               const def = isP1 ? match.p2 : match.p1;
               
               const roll = Math.random();
               if(roll < 0.20) { 
                 s1 += isP1 ? 1 : 0; s2 += isP1 ? 0 : 1;
                 const goalTexts = [
                   `GOLAÇO! ${att.name} fuzila pro fundo das redes!`,
                   `É GOL! Troca de passes envolvente do ${att.name}!`,
                   `QUE PINTURA! ${att.name} encobre o goleiro!`,
                   `Pênalti cobrado com frieza. Gol do ${att.name}!`
                 ];
                 events.push({ minute: min, type: 'goal', teamId: att.uid, text: goalTexts[Math.floor(Math.random()*goalTexts.length)] });
                 currentMom = 50; // Reseta pressão após gol
               } else if(roll < 0.45) {
                 events.push({ minute: min, type: 'save', teamId: def.uid, text: `MILAGRE! Goleiro do ${def.name} espalma na gaveta.` });
               } else if(roll < 0.65) {
                 events.push({ minute: min, type: 'foul', teamId: def.uid, text: `Falta dura da defesa do ${def.name}. O juiz dá amarelo!` });
               } else {
                 events.push({ minute: min, type: 'attack', teamId: att.uid, text: `UHH! ${att.name} enche o pé e a bola tira tinta da trave.` });
               }
             }
           }

           if (s1 === s2) {
             events.push({ minute: 90, type: 'info', text: 'Tudo igual. Vamos para as cobranças de pênaltis!' });
             if(Math.random() > 0.5) { s1++; events.push({ minute: 90, type: 'goal', teamId: match.p1.uid, text: `${match.p1.name} VENCE NOS PÊNALTIS!` }); }
             else { s2++; events.push({ minute: 90, type: 'goal', teamId: match.p2.uid, text: `${match.p2.name} VENCE NOS PÊNALTIS!` }); }
           }
           
           events.push({ minute: 90, type: 'info', text: 'Apita o árbitro! Fim de papo.' });
           return { ...match, startTime, played: true, events, momentumData, s1, s2, winner: s1>s2 ? match.p1 : match.p2 };
        });

        await db.ref(`games/${APP_ID}/${roomId}/bracket/${stageKey}`).set(simulatedMatches);
        
        setTimeout(async () => {
           const nextStage = roomData.stage === 1 ? 'semis' : roomData.stage === 2 ? 'final' : 'campeao';
           if (nextStage !== 'campeao') {
             let nextMatches = [];
             for(let i=0; i<simulatedMatches.length; i+=2) {
               nextMatches.push({ p1: simulatedMatches[i].winner, p2: simulatedMatches[i+1].winner, played: false, events: [] });
             }
             await db.ref(`games/${APP_ID}/${roomId}`).update({ [`bracket/${nextStage}`]: nextMatches, stage: roomData.stage + 1 });
           } else {
             await db.ref(`games/${APP_ID}/${roomId}`).update({ stage: 4 }); 
           }
        }, 33000); // 30s match + 3s margin
      };

      // --- UI RENDERERS ---
      if (isAuthLoading) return <div className="min-h-screen flex items-center justify-center bg-black text-green-500 font-black text-2xl animate-pulse"><i className="fa-solid fa-satellite-dish mr-3"></i> Conectando à Rede Neural...</div>;

      if (appState === 'INIT') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-black bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]">
            <button onClick={initEngine} className="glass p-16 rounded-[3rem] flex flex-col items-center hover:scale-105 transition-all shadow-[0_0_80px_rgba(250,204,21,0.3)] border-2 border-yellow-500/50 group">
              <i className="fa-solid fa-power-off text-8xl text-yellow-500 mb-8 group-hover:animate-pulse"></i>
              <h1 className="text-6xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600 drop-shadow-lg">INICIALIZAR ENGINE GOTY</h1>
              <p className="text-gray-400 mt-6 font-bold uppercase tracking-widest text-sm bg-black/50 px-4 py-2 rounded-full border border-white/10">Desbloqueia Audio Neural e Aceleração GPU</p>
            </button>
          </div>
        );
      }

      const isHost = roomData?.hostUid === user?.uid;
      const myPlayerStatus = roomData?.players?.[user?.uid];
      const allReady = roomData?.players && Object.values(roomData.players).every(p => p.isReady);

      if (appState === 'MENU') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-pitch bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] p-4">
            <div className="glass p-10 rounded-3xl w-full max-w-md shadow-2xl animate-slide-up border border-green-500/30 relative overflow-hidden">
              <div className="absolute -top-20 -right-20 w-64 h-64 bg-green-500/20 blur-[100px] rounded-full pointer-events-none"></div>
              
              <div className="text-center mb-10 relative z-10">
                <i className="fa-solid fa-trophy text-7xl text-yellow-400 drop-shadow-[0_0_30px_rgba(250,204,21,0.6)] mb-4 animate-pulse-fast"></i>
                <h1 className="text-5xl font-black italic tracking-tighter text-white">DRAFT KINGS</h1>
                <p className="text-green-400 font-bold text-xs tracking-widest uppercase mt-2">The Ultimate Football Simulator</p>
              </div>
              
              <div className="space-y-5 relative z-10">
                <input className="w-full p-4 bg-black/60 rounded-xl text-white outline-none border-2 border-green-900 focus:border-yellow-400 font-bold transition text-lg placeholder-gray-600" placeholder="Seu Nome (Ex: Tite)" value={playerName} onChange={e=>setPlayerName(e.target.value)} />
                <div className="flex gap-3">
                   <input className="w-full p-4 bg-black/60 rounded-xl text-white outline-none border-2 border-green-900 uppercase focus:border-yellow-400 font-black transition text-lg placeholder-gray-600 text-center" placeholder="SALA" value={roomId} onChange={e=>setRoomId(e.target.value.toUpperCase())} />
                   <select className="p-4 bg-black/60 rounded-xl text-white outline-none border-2 border-green-900 font-bold cursor-pointer" value={gameMode} onChange={e=>setGameMode(e.target.value)}>
                     <option value="knockout">MATA-MATA</option>
                     <option value="1v1">DUELO X1</option>
                   </select>
                </div>
                {error && <div className="text-red-400 font-black text-sm text-center bg-red-950/80 border border-red-500 p-3 rounded-xl shadow-lg animate-shake"><i className="fa-solid fa-triangle-exclamation mr-2"></i>{error}</div>}
                <div className="pt-4 space-y-3">
                  <button onClick={handleCreateRoom} className="w-full bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-black py-4 rounded-xl shadow-[0_0_20px_rgba(250,204,21,0.4)] hover:scale-[1.03] transition text-lg"><i className="fa-solid fa-crown mr-2"></i> FUNDAR LIGA</button>
                  <button onClick={handleJoinRoom} className="w-full border-2 border-green-600 text-green-400 hover:bg-green-600 hover:text-white font-black py-4 rounded-xl transition text-lg"><i className="fa-solid fa-right-to-bracket mr-2"></i> ENTRAR NA LIGA</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (appState === 'LOBBY') {
        return (
          <div className="min-h-screen p-4 md:p-10 bg-green-950 flex flex-col items-center justify-center bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]">
            <div className="glass p-8 md:p-12 rounded-[2rem] w-full max-w-5xl shadow-2xl animate-slide-up border border-green-800">
              <div className="flex flex-col md:flex-row justify-between items-center border-b-2 border-green-800/50 pb-6 mb-10">
                <div>
                  <h2 className="text-4xl md:text-5xl font-black">LOBBY <span className="text-yellow-400 font-mono tracking-tighter">{roomId}</span></h2>
                  <p className="text-green-400 font-bold uppercase tracking-widest text-sm mt-2"><i className="fa-solid fa-gamepad mr-2"></i> MODO: {roomData.mode}</p>
                </div>
                <div className="bg-black/40 px-6 py-3 rounded-xl border border-green-900 mt-4 md:mt-0 font-bold">
                  {Object.keys(roomData?.players||{}).length} / {roomData.mode === '1v1' ? 2 : 8} Treinadores
                </div>
              </div>
              
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-12">
                {Object.entries(roomData?.players||{}).map(([uid, p]) => (
                  <div key={uid} className="bg-gradient-to-b from-green-900/50 to-black/50 p-6 rounded-2xl border border-green-700 flex flex-col items-center gap-4 hover:-translate-y-2 transition shadow-lg">
                    <div className={`w-16 h-16 rounded-full flex items-center justify-center shadow-inner text-2xl ${uid === roomData.hostUid ? 'bg-yellow-500/20 border-2 border-yellow-500 text-yellow-400' : 'bg-green-800 border-2 border-green-600 text-green-300'}`}>
                      {uid === roomData.hostUid ? <i className="fa-solid fa-crown"></i> : <i className="fa-solid fa-user"></i>}
                    </div>
                    <span className="font-black text-lg truncate w-full text-center tracking-tight">{p.name}</span>
                  </div>
                ))}
              </div>
              
              <div className="text-center bg-black/30 p-8 rounded-2xl border border-white/5">
                {isHost ? (
                  <button onClick={()=>db.ref(`games/${APP_ID}/${roomId}`).update({status:'draft_setup'})} className="bg-yellow-500 text-black font-black px-12 py-5 rounded-xl text-2xl shadow-[0_0_30px_rgba(250,204,21,0.5)] hover:scale-105 transition w-full md:w-auto"><i className="fa-solid fa-chess-board mr-3"></i> PRANCHETA TÁTICA</button>
                ) : (
                  <div className="text-yellow-400 font-bold text-xl animate-pulse"><i className="fa-solid fa-circle-notch fa-spin mr-3"></i> O Host está configurando a mesa...</div>
                )}
              </div>
            </div>
          </div>
        )
      }

      if (appState === 'DRAFT_SETUP') {
        return (
          <div className="min-h-screen bg-pitch p-6 flex flex-col items-center justify-center pitch-bg">
            <div className="glass p-12 rounded-[2rem] w-full max-w-2xl text-center shadow-2xl border border-green-600 relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-green-400 to-yellow-400"></div>
              <i className="fa-solid fa-pen-ruler text-7xl text-green-400 mb-6 drop-shadow-[0_0_15px_rgba(74,222,128,0.5)]"></i>
              <h1 className="text-5xl font-black mb-4 tracking-tighter">Esquema Tático</h1>
              <p className="text-gray-300 mb-10 font-medium text-lg">A fundação do seu império ditará os jogadores que aparecerão no Draft.</p>
              
              <div className="grid grid-cols-2 gap-4 mb-10">
                {Object.keys(FORMATIONS).map(form => (
                  <button key={form} onClick={()=>{SFX.click(); setMyFormation(form);}} className={`py-6 rounded-2xl font-black text-3xl border-4 transition-all duration-200 ${myFormation === form ? 'bg-green-700 border-green-400 shadow-[0_0_20px_rgba(74,222,128,0.6)] scale-[1.02]' : 'bg-black/60 border-green-900 text-gray-500 hover:border-green-600 hover:text-white'}`}>
                    {form}
                  </button>
                ))}
              </div>
              <button onClick={startDrafting} className="w-full bg-yellow-500 text-black font-black py-5 rounded-xl text-2xl shadow-[0_0_20px_rgba(250,204,21,0.4)] hover:bg-yellow-400 transition"><i className="fa-solid fa-box-open mr-3"></i> ABRIR PACOTES</button>
            </div>
          </div>
        )
      }

      if (appState === 'DRAFTING') {
        const isDraftFinished = myTeam.length === 11;
        const currentReqPos = !isDraftFinished ? FORMATIONS[myFormation][myTeam.length] : '---';

        return (
          <div className="min-h-screen bg-green-950 flex flex-col lg:flex-row overflow-hidden font-sans">
             
             {/* Walkout VFX */}
             {walkoutPlayer && (
               <div className="fixed inset-0 z-50 bg-black/90 flex items-center justify-center animate-walkout backdrop-blur-md">
                 <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-yellow-500/20 via-black to-black"></div>
                 <div className="scale-150 relative z-10"><PlayerCard player={walkoutPlayer} /></div>
                 <div className="absolute bottom-20 text-yellow-400 font-black text-5xl tracking-widest animate-pulse drop-shadow-[0_0_20px_rgba(250,204,21,0.8)] uppercase">LENDA DRAFTADA!</div>
               </div>
             )}

             {/* PAINEL LATERAL TÁTICO */}
             <div className="w-full lg:w-[350px] pitch-bg border-r-2 border-green-800 p-6 flex flex-col z-20 shadow-2xl relative">
               <div className="absolute inset-0 bg-black/40 pointer-events-none"></div>
               <div className="relative z-10 flex flex-col h-full">
                 <h2 className="text-2xl font-black mb-6 flex items-center justify-between border-b-2 border-green-800 pb-4">
                   <span className="flex items-center gap-3"><i className="fa-solid fa-shield-halved text-yellow-400 text-3xl"></i> Esquadrão</span>
                   <span className="text-sm font-black bg-green-900 px-3 py-1 rounded text-green-300 border border-green-600 shadow-inner">{myFormation}</span>
                 </h2>
                 <div className="flex-1 overflow-y-auto space-y-2 pr-2">
                   {FORMATIONS[myFormation].map((pos, i) => {
                     const p = myTeam[i];
                     const isActive = i === myTeam.length && !isDraftFinished; 
                     let boxStyle = "bg-black/30 border-green-900/50 text-gray-500 border-dashed border-2";
                     if (p) boxStyle = "bg-green-900/40 border-green-700 text-white border-solid border";
                     if (isActive) boxStyle = "bg-green-800 border-yellow-400 shadow-[0_0_20px_rgba(250,204,21,0.3)] border-solid border-2 scale-105 z-10";

                     return (
                       <div key={i} className={`flex justify-between items-center p-3 rounded-xl transition-all duration-300 relative ${boxStyle}`}>
                         {isActive && <div className="absolute -left-2 w-1 h-8 bg-yellow-400 rounded-full"></div>}
                         <div className="flex items-center gap-4">
                           <span className={`w-12 text-center font-black text-sm px-1 py-1.5 rounded ${isActive ? 'bg-yellow-500 text-black' : p ? 'bg-black/60 text-green-400' : 'bg-black/40'}`}>{pos}</span>
                           <span className={`font-bold text-sm truncate max-w-[150px] ${p ? 'opacity-100' : 'opacity-40 italic'}`}>{p ? p.name : 'Aguardando...'}</span>
                         </div>
                         {p && <i className="fa-solid fa-check text-green-500 font-bold"></i>}
                       </div>
                     )
                   })}
                 </div>
               </div>
             </div>

             {/* PALCO CENTRAL DE PACK OPENING */}
             <div className="flex-1 flex items-center justify-center p-6 pitch-bg relative">
                <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-green-900/40 via-black/80 to-black z-0 pointer-events-none"></div>
                
                {!isDraftFinished ? (
                  <div className="z-10 text-center w-full max-w-4xl animate-slide-up">
                    <div className="mb-14">
                      <span className="bg-yellow-500 text-black font-black px-6 py-2 rounded-full text-sm tracking-widest uppercase shadow-[0_0_15px_rgba(250,204,21,0.4)]">RODADA {myTeam.length + 1}/11</span>
                      <h1 className="text-5xl md:text-6xl font-black mt-6 drop-shadow-lg">Procurando <span className="text-green-400 underline decoration-yellow-500 decoration-4 underline-offset-8">{currentReqPos}</span></h1>
                      <p className="text-gray-400 mt-4 text-lg font-medium">Bônus de OVR escondido para jogadores do mesmo clube.</p>
                    </div>
                    <div className="flex justify-center gap-6 md:gap-12 flex-wrap perspective-1000">
                      {draftOptions.map(p => <PlayerCard key={p.id} player={p} onClick={pickPlayer} />)}
                    </div>
                  </div>
                ) : (
                  <div className="z-10 text-center glass p-16 rounded-[3rem] border-2 border-green-500 animate-slide-up max-w-2xl w-full relative overflow-hidden">
                    <i className="fa-solid fa-circle-check text-8xl text-green-400 drop-shadow-[0_0_40px_rgba(74,222,128,0.6)] mb-8"></i>
                    <h2 className="text-5xl font-black mb-4 tracking-tight">Equipe Assinada!</h2>
                    <p className="text-2xl text-gray-300 font-medium mb-10 flex items-center justify-center gap-4">
                      OVR c/ Entrosamento: 
                      <span className="text-yellow-400 font-black text-5xl drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]">{myPlayerStatus?.overall || '--'}</span>
                    </p>

                    <div className="bg-black/40 p-6 rounded-2xl border border-white/10 mb-8 text-left">
                       <h3 className="text-green-500 font-bold uppercase tracking-widest text-xs mb-4">Status da Sala</h3>
                       {Object.entries(roomData?.players||{}).map(([uid, p]) => (
                         <div key={uid} className="flex justify-between items-center border-b border-white/5 py-2 last:border-0">
                           <span className="font-semibold text-gray-300">{p.name}</span>
                           {p.isReady ? <span className="text-green-400 font-bold text-sm"><i className="fa-solid fa-check mr-1"></i> Pronto</span> : <span className="text-yellow-500 font-bold text-sm animate-pulse">Draftando...</span>}
                         </div>
                       ))}
                    </div>

                    {isHost && allReady ? (
                      <button onClick={()=>db.ref(`games/${APP_ID}/${roomId}`).update({status:'tactics'})} className="w-full bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-black py-5 rounded-xl text-2xl shadow-[0_0_30px_rgba(250,204,21,0.5)] hover:scale-105 transition"><i className="fa-solid fa-brain mr-3"></i> DEFINIR POSTURA TÁTICA</button>
                    ) : isHost ? (
                      <div className="p-4 border border-dashed border-gray-600 rounded-xl text-gray-400 font-bold">Aguardando os outros terminarem...</div>
                    ) : (
                      <div className="text-yellow-400 font-bold text-xl animate-pulse"><i className="fa-solid fa-spinner fa-spin mr-3"></i> Aguardando Host avançar...</div>
                    )}
                  </div>
                )}
             </div>
          </div>
        )
      }

      if (appState === 'TACTICS') {
        return (
          <div className="min-h-screen bg-pitch p-6 flex flex-col items-center justify-center pitch-bg">
            <div className="glass p-12 rounded-[2rem] w-full max-w-3xl text-center shadow-2xl border border-blue-600 relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 to-cyan-400"></div>
              <i className="fa-solid fa-chess-knight text-7xl text-blue-400 mb-6 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]"></i>
              <h1 className="text-5xl font-black mb-4 tracking-tighter">Postura do Treinador</h1>
              <p className="text-gray-300 mb-10 font-medium text-lg">Defina a mentalidade da sua equipe para o torneio.</p>
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                {Object.entries(TACTICS).map(([name, data]) => (
                  <div key={name} onClick={()=>{SFX.click(); setTactic(name);}} className={`p-6 rounded-2xl cursor-pointer border-4 transition-all duration-200 flex flex-col justify-center items-center ${tactic === name ? 'bg-blue-900 border-blue-400 shadow-[0_0_20px_rgba(59,130,246,0.6)] scale-105' : 'bg-black/60 border-blue-950 text-gray-500 hover:border-blue-700 hover:text-white'}`}>
                    <h3 className="font-black text-2xl mb-2">{name}</h3>
                    <p className="text-xs font-semibold opacity-80">{data.desc}</p>
                  </div>
                ))}
              </div>
              
              {!myPlayerStatus?.isReady ? (
                <button onClick={confirmTactic} className="w-full bg-blue-500 text-white font-black py-5 rounded-xl text-2xl shadow-[0_0_20px_rgba(59,130,246,0.4)] hover:bg-blue-400 transition"><i className="fa-solid fa-lock mr-3"></i> TRAVAR TÁTICA</button>
              ) : isHost && allReady ? (
                <button onClick={generateTournamentBracket} className="w-full bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-black py-5 rounded-xl text-2xl shadow-[0_0_30px_rgba(250,204,21,0.5)] hover:scale-105 transition"><i className="fa-solid fa-play mr-3"></i> INICIAR CAMPEONATO</button>
              ) : (
                <div className="text-yellow-400 font-bold text-xl animate-pulse mt-6"><i className="fa-solid fa-spinner fa-spin mr-3"></i> Aguardando todos travarem as táticas...</div>
              )}
            </div>
          </div>
        )
      }

      if (appState === 'TOURNAMENT') {
        const stageKey = roomData.stage === 1 ? 'quarters' : roomData.stage === 2 ? 'semis' : 'final';
        const activeMatches = roomData.bracket ? roomData.bracket[stageKey] || [] : [];
        const myMatch = activeMatches.find(m => m.p1.uid === user.uid || m.p2.uid === user.uid);

        return (
          <div className="min-h-screen bg-[#020803] p-4 md:p-8 text-white relative font-sans">
            <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-30 pointer-events-none"></div>
            
            <div className="max-w-7xl mx-auto relative z-10">
              <div className="flex flex-col md:flex-row justify-between items-center mb-8 glass p-6 rounded-2xl border border-green-800/50 shadow-2xl">
                <div className="text-center md:text-left mb-4 md:mb-0">
                  <h1 className="text-3xl font-black text-yellow-400 flex items-center gap-3 tracking-tighter uppercase"><i className="fa-solid fa-trophy text-4xl"></i> {roomData.mode === '1v1' ? 'DUELO' : 'COPA DRAFT KINGS'}</h1>
                  <p className="text-green-500 font-bold tracking-widest text-sm mt-1 uppercase">FASE: {stageKey}</p>
                </div>
                
                {isHost && roomData.stage < 4 && !activeMatches[0]?.played && (
                  <button onClick={simulateMatches} className="bg-red-600 hover:bg-red-500 text-white font-black py-4 px-10 rounded-xl shadow-[0_0_30px_rgba(220,38,38,0.5)] transition-all hover:scale-105 border border-red-400 text-xl"><i className="fa-solid fa-bolt mr-2"></i> INICIAR SIMULAÇÃO</button>
                )}
                {!isHost && roomData.stage < 4 && !activeMatches[0]?.played && (
                  <div className="bg-black/50 px-6 py-3 rounded-lg border border-yellow-500/30 text-yellow-400 font-bold animate-pulse">Aguardando Host...</div>
                )}
              </div>

              {roomData.stage === 4 ? (
                <div className="text-center mt-32 animate-slide-up">
                  <div className="relative inline-block">
                    <div className="absolute inset-0 bg-yellow-400 blur-[100px] opacity-30 rounded-full"></div>
                    <i className="fa-solid fa-crown text-[150px] text-yellow-400 drop-shadow-[0_0_50px_rgba(250,204,21,0.8)] relative z-10 animate-bounce" style={{animationDuration:'3s'}}></i>
                  </div>
                  <h1 className="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 to-yellow-600 mt-8 tracking-tighter uppercase">{roomData.bracket.final[0].winner.name}</h1>
                  <h2 className="text-3xl text-white font-bold mt-4 tracking-widest">É O GRANDE CAMPEÃO!</h2>
                </div>
              ) : (
                <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                  <div className="lg:col-span-3">
                    {/* FOCO CENTRAL */}
                    {myMatch ? <MatchViewer match={myMatch} /> : activeMatches[0] ? <MatchViewer match={activeMatches[0]} /> : null}
                  </div>
                  
                  <div className="flex flex-col gap-4">
                    <h3 className="text-green-500 font-black mb-2 uppercase text-sm tracking-widest bg-green-900/30 p-3 rounded-lg border border-green-800/50 text-center"><i className="fa-solid fa-list-ol mr-2"></i> Visão Geral da Fase</h3>
                    <div className="space-y-4 overflow-y-auto max-h-[500px] pr-2">
                      {activeMatches.map((m, i) => {
                         // Anti-Spoiler Híbrido: Esconde placar até o jogo virtual "acabar" pra valer (30s)
                         const isMatchOver = m.played && (Date.now() - m.startTime > 30000);
                         
                         return (
                          <div key={i} className="glass p-4 rounded-xl border border-green-800/50 flex flex-col justify-center shadow-lg relative overflow-hidden group">
                            {isMatchOver && m.winner.uid === m.p1.uid && <div className="absolute top-0 left-0 w-1.5 h-full bg-yellow-400 shadow-[0_0_10px_rgba(250,204,21,1)]"></div>}
                            <div className="flex justify-between items-center mb-2">
                              <span className={`font-bold text-sm truncate pr-2 ${isMatchOver && m.winner.uid===m.p1.uid ? 'text-white' : 'text-gray-400'}`}>{m.p1.name} <span className="text-[10px] opacity-50">({m.p1.tactic.slice(0,3)})</span></span>
                              <span className="font-black bg-black/80 px-3 py-1 rounded text-lg min-w-[36px] text-center border border-white/5">{isMatchOver ? m.s1 : '-'}</span>
                            </div>
                            
                            {isMatchOver && m.winner.uid === m.p2.uid && <div className="absolute top-0 left-0 w-1.5 h-full bg-yellow-400 shadow-[0_0_10px_rgba(250,204,21,1)]"></div>}
                            <div className="flex justify-between items-center">
                              <span className={`font-bold text-sm truncate pr-2 ${isMatchOver && m.winner.uid===m.p2.uid ? 'text-white' : 'text-gray-400'}`}>{m.p2.name} <span className="text-[10px] opacity-50">({m.p2.tactic.slice(0,3)})</span></span>
                              <span className="font-black bg-black/80 px-3 py-1 rounded text-lg min-w-[36px] text-center border border-white/5">{isMatchOver ? m.s2 : '-'}</span>
                            </div>
                          </div>
                         )
                      })}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
