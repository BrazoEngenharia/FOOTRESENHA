          keyframes: {
            shake: { '10%,90%':{transform:'translate3d(-5px,0,0)'},'20%,80%':{transform:'translate3d(6px,0,0)'},'30%,50%,70%':{transform:'translate3d(-10px,0,0)'},'40%,60%':{transform:'translate3d(10px,0,0)'} },

    class ErrorBoundary extends Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex flex-col items-center justify-center bg-red-950 text-white p-8">
              <i className="fa-solid fa-triangle-exclamation text-7xl text-red-500 mb-6 animate-pulse"></i>
              <h1 className="text-4xl font-sports font-bold mb-4 uppercase">Pane no Sistema!</h1>
              <p className="text-xl text-red-300 mb-8">A engine colidiu com um erro, mas nós seguramos o crash.</p>
              <div className="bg-black/50 p-4 rounded-xl border border-red-500/30 text-sm font-mono max-w-2xl overflow-auto text-left mb-8 text-red-400">
                {this.state.error?.toString()}
              </div>
              <button onClick={() => window.location.reload()} className="bg-red-600 hover:bg-red-500 px-8 py-4 rounded-xl font-bold font-sports text-2xl shadow-lg transition">REINICIAR ENGINE</button>
            </div>
          );
        }
        return this.props.children; 
      }

    const SFX = {
      ready: false, synth: null, kick: null, noise: null, whistleSynth: null,
      init: async () => {
        if(SFX.ready) return;
        await Tone.start();
        SFX.synth = new Tone.PolySynth(Tone.Synth).toDestination();
        SFX.synth.volume.value = -8;
        SFX.whistleSynth = new Tone.Synth({ oscillator: { type: "triangle" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.5, release: 1 } }).toDestination();
        SFX.whistleSynth.volume.value = -5;
        SFX.kick = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 10, oscillator: { type: "sine" } }).toDestination();
        SFX.kick.volume.value = 8;
        const filter = new Tone.Filter(800, "lowpass").toDestination();
        SFX.noise = new Tone.NoiseSynth({ noise: { type: "brown" }, envelope: { attack: 0.5, decay: 0.1, sustain: 1, release: 2 } }).connect(filter);
        SFX.noise.volume.value = -12;
        SFX.ready = true;
      },
      click: () => SFX.ready && SFX.synth.triggerAttackRelease(["C4"], "32n"),
      pick: () => SFX.ready && SFX.synth.triggerAttackRelease(["E4", "G4"], "16n"),
      walkout: () => {
        if(!SFX.ready) return;
        SFX.kick.triggerAttackRelease("C1", "1n");
        SFX.synth.triggerAttackRelease(["C3", "G3", "C4"], "1n");

      whistle: () => { 
        if(!SFX.ready) return;

    const MatchViewer3D = ({ match }) => {
      const mountRef = useRef(null);
      const [localMin, setLocalMin] = useState(0);
      const [events, setEvents] = useState([]);
      const [s1, setS1] = useState(0);
      const [s2, setS2] = useState(0);

      const [shake, setShake] = useState(false);

      useEffect(() => {
        if (!match || !match.played || !mountRef.current) return;
        if(Date.now() - match.startTime < 1000) SFX.whistle();

        const width = mountRef.current.clientWidth;
        const height = mountRef.current.clientHeight || 250;

        // THREE.JS SETUP (PBR Stadium)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020804);
        scene.fog = new THREE.FogExp2(0x020804, 0.02);

        const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        camera.position.set(0, 30, 40);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        renderer.shadowMap.enabled = true;
        mountRef.current.innerHTML = '';
        mountRef.current.appendChild(renderer.domElement);

        // ILUMINAÇÃO
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // GRAMADO PROCEDURAL
        const canvas = document.createElement('canvas');
        canvas.width = 1024; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        for(let i=0; i<20; i++) {
            ctx.fillStyle = i%2===0 ? '#0f4d1e' : '#115923';
            ctx.fillRect(i*(1024/20), 0, 1024/20, 512);
        }
        ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.rect(20, 20, 984, 472); ctx.moveTo(512, 20); ctx.lineTo(512, 492); ctx.arc(512, 256, 70, 0, Math.PI*2); ctx.stroke();
        
        const texture = new THREE.CanvasTexture(canvas);
        const fieldMat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.8 });
        const field = new THREE.Mesh(new THREE.PlaneGeometry(80, 40), fieldMat);
        field.rotation.x = -Math.PI / 2; field.receiveShadow = true;
        scene.add(field);

        // BOLA NEON

        ball.castShadow = true; ball.position.y = 0.6;
        const ballLight = new THREE.PointLight(0x4ade80, 1, 10);
        ball.add(ballLight);
        scene.add(ball);

        // VFX PARTICLES (Object Pool)
        const partGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
        const partMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
        const particles = new THREE.InstancedMesh(partGeo, partMat, 50);
        const dummy = new THREE.Object3D();
        for(let i=0; i<50; i++) { dummy.scale.set(0,0,0); dummy.updateMatrix(); particles.setMatrixAt(i, dummy.matrix); }
        scene.add(particles);

        // ENGINE LOOP
        let animId, targetX = 0, targetZ = 0, baseShake = 0, partVel = [];
        const msPerMin = 333; // 30s match = 90 mins virtuais

        const animate = () => {
          animId = requestAnimationFrame(animate);
          const elapsed = Date.now() - match.startTime;
          let min = Math.floor(elapsed / msPerMin);
          
          if (min <= 90) {
            setLocalMin(min);
            
            const currentEvents = match.events.filter(e => e.minute <= min);
            if (currentEvents.length !== events.length) {
                setEvents(currentEvents.reverse());
                const g1 = currentEvents.filter(e => e.type === 'goal' && e.teamId === match.p1.uid).length;
                const g2 = currentEvents.filter(e => e.type === 'goal' && e.teamId === match.p2.uid).length;
                
                // EVENTO DE GOL (JUICINESS)
                if (g1 > s1 || g2 > s2) { 
                    SFX.goal(); baseShake = 2; setShake(true); setFlash(true);
                    setTimeout(() => { setShake(false); setFlash(false); }, 500);
                    // Ativa partículas
                    for(let i=0; i<50; i++) {
                      dummy.position.copy(ball.position);
                      dummy.scale.set(1,1,1);
                      dummy.updateMatrix();
                      particles.setMatrixAt(i, dummy.matrix);
                      partVel[i] = new THREE.Vector3((Math.random()-0.5)*1.5, Math.random()*2, (Math.random()-0.5)*1.5);
                    }
                    particles.instanceMatrix.needsUpdate = true;
                } else {
                    const lastEv = currentEvents[0];
                    if(lastEv && lastEv.type === 'foul') SFX.foul();
                    else if(lastEv && lastEv.type === 'attack') SFX.post();
                }
                setS1(g1); setS2(g2);
            }

            const lastMom = match.momentumData?.find(m => m.min <= min);
            let mom = lastMom ? lastMom.val : 50;
            if (min < 90) setMomentum(mom);

            targetX = ((mom - 50) / 50) * 30; // -30 a 30 no campo
            targetZ = Math.sin(elapsed * 0.005) * 10; 

            // Física da Bola LERP
            ball.position.x += (targetX - ball.position.x) * 0.1;
            ball.position.z += (targetZ - ball.position.z) * 0.1;
            ball.rotation.x += 0.1;

            // Física de Partículas
            for(let i=0; i<50; i++) {
              if(partVel[i]) {
                particles.getMatrixAt(i, dummy.matrix);
                dummy.position.setFromMatrixPosition(dummy.matrix);
                dummy.scale.setFromMatrixScale(dummy.matrix);
                dummy.position.add(partVel[i]);
                partVel[i].y -= 0.1; // Gravidade
                dummy.scale.multiplyScalar(0.9); // Shrink
                dummy.updateMatrix();
                particles.setMatrixAt(i, dummy.matrix);
              }
            }
            particles.instanceMatrix.needsUpdate = true;

            // Camera Shake
            if (baseShake > 0.01) {
              camera.position.x = (Math.random() - 0.5) * baseShake;
              camera.position.y = 30 + (Math.random() - 0.5) * baseShake;
              baseShake *= 0.9; 
            } else {
              camera.position.x = ball.position.x * 0.2;
              camera.position.y = 30;
            }
            camera.lookAt(ball.position.x * 0.5, 0, 0);
          }
          renderer.render(scene, camera);
        };
        animate();

        return () => { cancelAnimationFrame(animId); if(mountRef.current) mountRef.current.innerHTML = ''; renderer.dispose(); };
      }, [match]);

      if (!match) return null;

      return (
        <div className={`glass rounded-2xl flex flex-col h-[700px] overflow-hidden transition-all duration-100 ${shake ? 'animate-shake shadow-[0_0_80px_rgba(250,204,21,0.6)] border-yellow-500' : 'border-green-800'} ${flash ? 'animate-flash-goal' : ''}`}>
          
          {/* Header Placar */}
          <div className="p-4 border-b border-white/10 bg-black/60 relative z-20">
            <div className="font-sports text-sm tracking-widest mb-2 flex justify-center items-center gap-2 text-yellow-400">
              {localMin === 90 ? <><i className="fa-solid fa-flag-checkered"></i> FIM DE JOGO</> : <><i className="fa-solid fa-circle text-red-500 animate-pulse"></i> AO VIVO - {localMin}' MIN</>}
            </div>
            <div className="flex justify-between items-center px-4">
              <div className="flex-1 text-right font-sports font-bold text-2xl md:text-4xl truncate uppercase">{match.p1.name}</div>
              <div className="mx-6 px-8 py-2 bg-black/80 rounded-xl border border-white/20 flex gap-4 text-5xl font-sports font-bold text-white shadow-inner">
                <span>{s1}</span><span className="text-gray-600 text-3xl self-center font-sans">x</span><span>{s2}</span>
              </div>
              <div className="flex-1 text-left font-sports font-bold text-2xl md:text-4xl truncate uppercase">{match.p2.name}</div>
            </div>
          </div>

          {/* Área 3D + Feed Ovarlay */}
          <div className="relative flex-1 bg-black">
             <div ref={mountRef} className="absolute inset-0 w-full h-full z-0"></div>
             
             {/* Momentum Bar */}
             <div className="absolute top-0 left-0 w-full h-1.5 bg-gray-900 z-10 flex">
                <div className="h-full bg-blue-500 transition-all duration-300" style={{width: `${100 - momentum}%`}}></div>
                <div className="h-full bg-red-500 transition-all duration-300" style={{width: `${momentum}%`}}></div>
             </div>

             {/* Live Commentary Feed */}
             <div className="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-black via-black/80 to-transparent pointer-events-none z-10 flex flex-col justify-end p-4">
               <div className="space-y-2 overflow-y-auto max-h-48 scrollbar-hide flex flex-col-reverse pointer-events-auto">
                 {events.length === 0 && <div className="text-center text-white/50 font-sports text-xl animate-pulse">A bola vai rolar... Tensão máxima!</div>}
                 {events.slice(0,5).map((ev, i) => {
                   let bg = 'bg-black/60 border-green-900/50 text-gray-300 font-medium';
                   let icon = 'fa-shoe-prints text-green-500';
                   if(ev.type === 'goal') { bg = 'bg-yellow-500 text-black border-yellow-400 font-bold text-xl shadow-[0_0_20px_rgba(250,204,21,0.5)]'; icon = 'fa-futbol animate-bounce'; }
                   else if(ev.type === 'foul') { bg = 'bg-red-950/90 border-red-700 text-red-100 font-bold'; icon = 'fa-square text-red-500'; }
                   else if(ev.type === 'save') { bg = 'bg-blue-900/80 border-blue-600 text-blue-100 font-bold'; icon = 'fa-hands text-blue-400'; }
                   else if(ev.type === 'attack') { bg = 'bg-orange-950/80 border-orange-700 text-orange-100 font-bold'; icon = 'fa-fire text-orange-500'; }
                   else if(ev.type === 'red_card') { bg = 'bg-red-600 text-white font-black border-red-400 animate-pulse'; icon = 'fa-square text-white'; }

                   return (
                     <div key={i} className={`p-3 rounded-lg border flex gap-3 items-center animate-slide-up ${bg}`}>
                       {ev.type !== 'info' && <span className="font-sports font-bold opacity-70 min-w-[30px] text-right text-lg">{ev.minute}'</span>}
                       <i className={`fa-solid ${icon}`}></i>
                       <span className="leading-tight flex-1 text-sm md:text-base">{ev.text}</span>
                     </div>
                   )
                 })}
               </div>
             </div>
          </div>
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [playerName, setPlayerName] = useState('');
      const [appState, setAppState] = useState('INIT');
      const [roomData, setRoomData] = useState(null);
      const [roomId, setRoomId] = useState('');
      const [gameMode, setGameMode] = useState('knockout');
      const [error, setError] = useState('');
      
      const [myFormation, setMyFormation] = useState('4-3-3');
      const [draftOptions, setDraftOptions] = useState([]);
      const [myTeam, setMyTeam] = useState([]);
      const [walkoutPlayer, setWalkoutPlayer] = useState(null);
      const [tactic, setTactic] = useState('Equilibrado');
      const seenIds = useRef(new Set()); 

      useEffect(() => {
        auth.signInAnonymously().catch(e => setError("Erro: Ative o Login Anônimo no Firebase."));
        const unsub = auth.onAuthStateChanged(u => { setUser(u); setIsAuthLoading(false); });
        return () => unsub();
      }, []);

      useEffect(() => {
        if(!user || !roomId || appState === 'INIT' || appState === 'MENU') return;
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const listener = roomRef.on('value', snap => {
          if(snap.exists()) {
            const data = snap.val();
            setRoomData(data);
            if(data.status === 'draft_setup' && appState === 'LOBBY') setAppState('DRAFT_SETUP');
            if(data.status === 'drafting' && appState === 'DRAFT_SETUP') setAppState('DRAFTING');
            if(data.status === 'tactics' && appState === 'DRAFTING') setAppState('TACTICS');
            if(data.status === 'tournament' && appState !== 'TOURNAMENT') setAppState('TOURNAMENT');
          } else {
            setAppState('MENU'); setError('Sala encerrada.');
          }
        });
        return () => roomRef.off('value', listener);
      }, [user, roomId, appState]);

      const handleCreateRoom = async () => {
        SFX.click();
        if(!playerName || !roomId) return setError("Preencha os campos!");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(snap.exists()) return setError("Sala já existe.");
        await roomRef.set({ hostUid: user.uid, status: 'lobby', stage: 0, mode: gameMode, players: { [user.uid]: { name: playerName, team: [], overall: 0, isReady: false, tactic: 'Equilibrado' } } });
        setAppState('LOBBY'); setError('');
      };

      const handleJoinRoom = async () => {
        SFX.click();
        if(!playerName || !roomId) return setError("Preencha os campos!");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(!snap.exists()) return setError("Sala não encontrada.");
        if(snap.val().status !== 'lobby') return setError("Jogo em andamento.");
        await roomRef.update({ [`players/${user.uid}`]: { name: playerName, team: [], overall: 0, isReady: false, tactic: 'Equilibrado' } });
        setAppState('LOBBY'); setError('');
      };

      const pullPacks = (currentLength) => {
        if (currentLength >= 11) return;
        const reqPos = FORMATIONS[myFormation][currentLength];
        let pool = RAW_DB.filter(p => p.pos === reqPos && !seenIds.current.has(p.baseId));
        let options = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
        
        let b=0; while(options.length < 3) { options.push({ id: `gen_${Date.now()}_${b}`, baseId: `gen_${Date.now()}_${b}`, name: `Talento Base`, year: 2024, team: 'Academy', overall: 75+Math.floor(Math.random()*10), pos: reqPos }); b++; }
        options.forEach(p => seenIds.current.add(p.baseId));
        setDraftOptions(options);
      };

      const pickPlayer = async (player) => {
        if (myTeam.length >= 11) return;
        if (player.overall >= 93) { SFX.walkout(); setWalkoutPlayer(player); setTimeout(() => setWalkoutPlayer(null), 3000); } else { SFX.pick(); }
        
        const newTeam = [...myTeam, player];
        setMyTeam(newTeam);
        
        if (newTeam.length < 11) {
          pullPacks(newTeam.length);
        } else {
          setDraftOptions([]); 
          const baseOvr = newTeam.reduce((acc, p) => acc + p.overall, 0) / 11;
          const chem = newTeam.reduce((acc, p, _, arr) => acc + (arr.filter(x=>x.team===p.team).length > 1 ? 0.5 : 0), 0);
          await db.ref(`games/${APP_ID}/${roomId}/players/${user.uid}`).update({ team: newTeam, overall: Math.min(99, Math.round(baseOvr + chem)), isReady: true });
        }
      };

      const generateTournament = async () => {
        SFX.click();
        const players = Object.entries(roomData?.players || {}).map(([uid, p]) => ({uid, ...p}));
        let target = roomData?.mode === '1v1' ? 2 : 8;
        let b=0; while(players.length < target) { players.push({ uid: `bot_${b}`, name: BOT_NAMES[b%BOT_NAMES.length], overall: 70+Math.floor(Math.random()*15), isBot: true, tactic: 'Equilibrado' }); b++; }
        players.sort(() => 0.5 - Math.random());
        let matches = []; for(let i=0; i<target; i+=2) matches.push({ p1: players[i], p2: players[i+1], played: false, events: [] });
        
        const updates = { status: 'tournament', stage: target === 8 ? 1 : target === 4 ? 2 : 3, [`bracket/${target === 8 ? 'quarters' : target === 4 ? 'semis' : 'final'}`]: matches };
        Object.keys(roomData.players).forEach(uid => updates[`players/${uid}/isReady`] = false);
        await db.ref(`games/${APP_ID}/${roomId}`).update(updates);
      };

      const simulateMatches = async () => {
        SFX.click();
        const startTime = Date.now() + 1500; 
        const stageKey = roomData?.stage === 1 ? 'quarters' : roomData?.stage === 2 ? 'semis' : 'final';
        const matchesToSim = roomData?.bracket?.[stageKey] || [];

        const simMatches = matchesToSim.map(match => {
           let events=[], momData=[], s1=0, s2=0, currentMom=50;
           const t1 = TACTICS[match.p1.tactic] || TACTICS['Equilibrado'], t2 = TACTICS[match.p2.tactic] || TACTICS['Equilibrado'];
           const luck1 = (Math.random() * 20 - 10), luck2 = (Math.random() * 20 - 10); // Fator Zebra Absurdo
           const o1 = (match.p1.overall * t1.atkMod) + luck1, o2 = (match.p2.overall * t2.atkMod) + luck2;
           const prob1 = Math.max(0.1, Math.min(0.9, o1 / (o1 + o2)));

           for(let min=1; min<=90; min++) {
             if(min%5===0) { currentMom += (Math.random()>prob1 ? 20 : -20); currentMom = Math.max(10, Math.min(90, currentMom)); momData.push({min, val: currentMom}); }
             
             let actProb = (currentMom < 30 || currentMom > 70) ? 0.25 : 0.10; // Cenas tensas!
             if(Math.random() < actProb) { 
               const isP1 = Math.random() < (currentMom < 50 ? 0.8 : 0.2);
               const att = isP1 ? match.p1 : match.p2, def = isP1 ? match.p2 : match.p1;
               const roll = Math.random();
               
               if(roll < 0.25) { 
                 s1 += isP1 ? 1 : 0; s2 += isP1 ? 0 : 1;
                 const goalTxt = DIALOGS.goal[Math.floor(Math.random()*DIALOGS.goal.length)].replace('{att}', att.name);
                 events.push({ minute: min, type: 'goal', teamId: att.uid, text: goalTxt }); currentMom = 50;
               } else if(roll < 0.50) { events.push({ minute: min, type: 'save', teamId: def.uid, text: DIALOGS.save[Math.floor(Math.random()*DIALOGS.save.length)].replace('{def}', def.name) });
               } else if(roll < 0.70) { events.push({ minute: min, type: 'foul', teamId: def.uid, text: DIALOGS.foul[Math.floor(Math.random()*DIALOGS.foul.length)].replace('{def}', def.name) });
               } else if(roll < 0.75) { events.push({ minute: min, type: 'red_card', teamId: def.uid, text: DIALOGS.red_card[Math.floor(Math.random()*DIALOGS.red_card.length)].replace('{def}', def.name) });
               } else { events.push({ minute: min, type: 'attack', teamId: att.uid, text: DIALOGS.attack[Math.floor(Math.random()*DIALOGS.attack.length)].replace('{att}', att.name) }); }
             }
           }

           if (s1 === s2) {
             events.push({ minute: 90, type: 'info', text: 'TENSÃO! Decisão por Pênaltis!' });
             if(Math.random() > 0.5) { s1++; events.push({ minute: 90, type: 'goal', teamId: match.p1.uid, text: `${match.p1.name} consagra-se nas penalidades!` }); }
             else { s2++; events.push({ minute: 90, type: 'goal', teamId: match.p2.uid, text: `${match.p2.name} consagra-se nas penalidades!` }); }
           }
           events.push({ minute: 90, type: 'info', text: 'FIM DE PAPO!' });
           return { ...match, startTime, played: true, events, momentumData: momData, s1, s2, winner: s1>s2 ? match.p1 : match.p2 };
        });

        await db.ref(`games/${APP_ID}/${roomId}/bracket/${stageKey}`).set(simMatches);
        setTimeout(async () => {
           const nextStage = roomData?.stage === 1 ? 'semis' : roomData?.stage === 2 ? 'final' : 'campeao';
           if (nextStage !== 'campeao') {
             let nextMatches = []; for(let i=0; i<simMatches.length; i+=2) nextMatches.push({ p1: simMatches[i].winner, p2: simMatches[i+1].winner, played: false, events: [] });
             await db.ref(`games/${APP_ID}/${roomId}`).update({ [`bracket/${nextStage}`]: nextMatches, stage: (roomData?.stage || 1) + 1 });
           } else { await db.ref(`games/${APP_ID}/${roomId}`).update({ stage: 4 }); }
        }, 33000); 
      };

      // RENDERIZADORES DE TELA (Sync Gates aplicados)
      if (isAuthLoading) return <div className="min-h-screen flex items-center justify-center bg-black text-green-500 font-sports text-3xl animate-pulse">Iniciando Servidores...</div>;
      if (appState === 'INIT') return <div className="min-h-screen flex items-center justify-center bg-pitch"><button onClick={()=>{SFX.init(); setAppState('MENU');}} className="glass p-16 rounded-[3rem] border-2 border-yellow-500 shadow-[0_0_80px_rgba(250,204,21,0.4)] hover:scale-105 transition"><i className="fa-solid fa-power-off text-8xl text-yellow-500 mb-6 animate-pulse"></i><h1 className="text-6xl font-sports font-bold text-yellow-400">INICIAR RESENHA</h1><p className="mt-4 text-gray-400 font-bold uppercase">Ativa Audio Engine 3D</p></button></div>;
      
      if (appState === 'MENU') return (
        <div className="min-h-screen flex items-center justify-center pitch-bg p-4"><div className="glass p-10 rounded-3xl w-full max-w-md shadow-2xl border border-green-500/30"><div className="text-center mb-10"><i className="fa-solid fa-trophy text-7xl text-yellow-400 drop-shadow-[0_0_30px_rgba(250,204,21,0.6)] mb-4 animate-bounce"></i><h1 className="text-6xl font-sports font-bold text-white uppercase">DRAFT KINGS</h1><p className="text-green-400 font-bold tracking-widest uppercase mt-2">A Resenha Definitiva</p></div><div className="space-y-4"><input className="w-full p-4 bg-black/80 rounded-xl text-white outline-none border-2 border-green-900 focus:border-yellow-400 font-sports text-2xl placeholder-gray-600" placeholder="Nome do Treinador" value={playerName} onChange={e=>setPlayerName(e.target.value)} /><div className="flex gap-2"><input className="w-2/3 p-4 bg-black/80 rounded-xl text-white outline-none border-2 border-green-900 uppercase focus:border-yellow-400 font-sports text-2xl text-center placeholder-gray-600" placeholder="CÓDIGO" value={roomId} onChange={e=>setRoomId(e.target.value.toUpperCase())} /><select className="w-1/3 p-4 bg-black/80 rounded-xl text-white outline-none border-2 border-green-900 font-bold cursor-pointer" value={gameMode} onChange={e=>setGameMode(e.target.value)}><option value="knockout">COPA</option><option value="1v1">X1</option></select></div>{error && <div className="text-red-400 font-bold bg-red-950 p-3 rounded-xl border border-red-500 animate-shake">{error}</div>}<div className="pt-2"><button onClick={handleCreateRoom} className="w-full mb-3 bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-sports text-2xl py-4 rounded-xl shadow-[0_0_20px_rgba(250,204,21,0.4)] hover:scale-105 transition"><i className="fa-solid fa-crown mr-2"></i> CRIAR SALA</button><button onClick={handleJoinRoom} className="w-full border-2 border-green-600 text-green-400 hover:bg-green-600 hover:text-white font-sports text-2xl py-4 rounded-xl transition"><i className="fa-solid fa-right-to-bracket mr-2"></i> ENTRAR</button></div></div></div></div>
      );

      if (!roomData) return <div className="min-h-screen flex items-center justify-center pitch-bg text-yellow-500 font-sports text-4xl animate-pulse">Sincronizando com o VAR...</div>;

      const isHost = roomData.hostUid === user.uid;
      const myPlayerStatus = roomData.players?.[user.uid];
      const allReady = Object.values(roomData.players).every(p => p.isReady);

      if (appState === 'LOBBY') return (
        <div className="min-h-screen p-6 bg-pitch flex flex-col items-center justify-center"><div className="glass p-12 rounded-[2rem] w-full max-w-4xl border border-green-800"><div className="flex justify-between items-center border-b-2 border-green-800 pb-6 mb-8"><div><h2 className="text-5xl font-sports font-bold text-white">SALA <span className="text-yellow-400">{roomId}</span></h2><p className="text-green-400 font-bold uppercase tracking-widest mt-2">{roomData.mode === '1v1' ? 'DUELO X1' : 'COPA MATA-MATA'}</p></div><div className="bg-black/60 px-6 py-3 rounded-xl border border-green-900 font-sports text-2xl text-white">{Object.keys(roomData.players).length} / {roomData.mode==='1v1'?2:8}</div></div><div className="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">{Object.entries(roomData.players).map(([uid, p]) => (<div key={uid} className="bg-black/40 p-6 rounded-2xl border border-green-700 flex flex-col items-center gap-4"><i className={`fa-solid ${uid===roomData.hostUid?'fa-crown text-yellow-400':'fa-user text-green-400'} text-4xl`}></i><span className="font-sports text-xl truncate">{p.name}</span></div>))}</div><div className="text-center">{isHost ? <button onClick={()=>db.ref(`games/${APP_ID}/${roomId}`).update({status:'draft_setup'})} className="bg-yellow-500 text-black font-sports text-3xl px-12 py-5 rounded-xl shadow-[0_0_30px_rgba(250,204,21,0.5)] hover:scale-105 transition w-full">IR PARA A PRANCHETA</button> : <div className="text-yellow-400 font-sports text-2xl animate-pulse">Aguardando o Host...</div>}</div></div></div>
      );

      if (appState === 'DRAFT_SETUP') return (
        <div className="min-h-screen pitch-bg flex flex-col items-center justify-center p-6"><div className="glass p-12 rounded-[2rem] w-full max-w-2xl text-center border border-green-600"><i className="fa-solid fa-clipboard-list text-7xl text-green-400 mb-6 drop-shadow-[0_0_15px_rgba(74,222,128,0.5)]"></i><h1 className="text-5xl font-sports font-bold mb-8">ESQUEMA TÁTICO</h1><div className="grid grid-cols-2 gap-4 mb-10">{Object.keys(FORMATIONS).map(form => (<button key={form} onClick={()=>{SFX.click(); setMyFormation(form);}} className={`py-6 rounded-2xl font-sports text-4xl border-4 transition ${myFormation === form ? 'bg-green-700 border-green-400 shadow-[0_0_20px_rgba(74,222,128,0.6)]' : 'bg-black/60 border-green-900 text-gray-500 hover:border-green-500 hover:text-white'}`}>{form}</button>))}</div><button onClick={()=>{SFX.click(); setAppState('DRAFTING'); pullPacks(0);}} className="w-full bg-yellow-500 text-black font-sports text-3xl py-5 rounded-xl shadow-[0_0_20px_rgba(250,204,21,0.4)] hover:bg-yellow-400 transition">ABRIR PACOTES</button></div></div>
      );

      if (appState === 'DRAFTING') {
        const reqPos = FORMATIONS[myFormation][myTeam.length] || '---';
        return (
          <div className="min-h-screen pitch-bg flex flex-col lg:flex-row font-sans">
             {walkoutPlayer && <div className="fixed inset-0 z-50 bg-black/95 flex flex-col items-center justify-center animate-walkout"><PlayerCard player={walkoutPlayer} /><h1 className="text-yellow-400 font-sports text-6xl mt-8 animate-pulse tracking-widest">LENDA!</h1></div>}
             <div className="w-full lg:w-[350px] bg-black/80 border-r-2 border-green-800 p-6 flex flex-col z-20 shadow-2xl"><h2 className="text-3xl font-sports font-bold mb-6 flex justify-between border-b-2 border-green-800 pb-4 text-white"><span className="text-yellow-400">ESQUADRÃO</span><span className="bg-green-900 px-3 rounded text-green-300">{myFormation}</span></h2><div className="flex-1 overflow-y-auto space-y-2">{FORMATIONS[myFormation].map((pos, i) => { const p=myTeam[i]; const act = i===myTeam.length && myTeam.length<11; return (<div key={i} className={`flex items-center p-3 rounded-lg border-2 ${act ? 'border-yellow-400 bg-green-800 shadow-[0_0_15px_rgba(250,204,21,0.4)] scale-105 z-10' : p ? 'border-green-600 bg-green-900/50' : 'border-green-900/30 border-dashed bg-black/40'}`}><span className={`w-12 text-center font-sports text-xl rounded ${act?'bg-yellow-500 text-black':p?'bg-black/60 text-green-400':'text-gray-600'}`}>{pos}</span><span className={`ml-4 font-bold truncate ${p?'text-white':'text-gray-600'}`}>{p?p.name:'Aguardando...'}</span></div>) })}</div></div>
             <div className="flex-1 flex items-center justify-center p-6 relative">
                {myTeam.length < 11 ? (
                  <div className="text-center w-full max-w-4xl animate-slide-up"><span className="bg-yellow-500 text-black font-sports text-xl px-6 py-1 rounded-full shadow-[0_0_15px_rgba(250,204,21,0.5)]">PICK {myTeam.length + 1}/11</span><h1 className="text-6xl font-sports font-bold mt-6 mb-12 text-white">PROCURANDO <span className="text-green-400 underline decoration-yellow-500">{reqPos}</span></h1><div className="flex justify-center gap-8 perspective-1000">{draftOptions.map(p => <PlayerCard key={p.id} player={p} onClick={pickPlayer} />)}</div></div>
                ) : (
                  <div className="glass p-16 rounded-[3rem] border border-green-500 text-center animate-slide-up max-w-2xl"><i className="fa-solid fa-check-double text-8xl text-green-400 mb-6 drop-shadow-[0_0_30px_rgba(74,222,128,0.6)]"></i><h2 className="text-5xl font-sports font-bold text-white mb-4">DRAFT FINALIZADO!</h2><p className="text-2xl text-gray-300 font-medium mb-8">OVR Final (c/ Entrosamento): <span className="text-yellow-400 font-black text-6xl block mt-2">{myPlayerStatus?.overall||'--'}</span></p><div className="bg-black/50 p-6 rounded-xl border border-white/10 mb-8">{Object.entries(roomData.players).map(([uid, p]) => (<div key={uid} className="flex justify-between items-center py-2 border-b border-white/5 last:border-0 font-bold"><span className="text-gray-300">{p.name}</span>{p.isReady ? <span className="text-green-400">Pronto</span> : <span className="text-yellow-500 animate-pulse">Draftando...</span>}</div>))}</div>{isHost && allReady ? <button onClick={()=>db.ref(`games/${APP_ID}/${roomId}`).update({status:'tactics'})} className="w-full bg-yellow-500 text-black font-sports text-3xl py-5 rounded-xl shadow-[0_0_30px_rgba(250,204,21,0.5)] hover:scale-105 transition">DEFINIR POSTURA TÁTICA</button> : isHost ? <div className="text-gray-500 font-bold">Aguardando os outros...</div> : <div className="text-yellow-400 font-sports text-2xl animate-pulse">Aguardando o Host...</div>}</div>
                )}
             </div>
          </div>
        )
      }

      if (appState === 'TACTICS') return (
        <div className="min-h-screen pitch-bg flex flex-col items-center justify-center p-6"><div className="glass p-12 rounded-[2rem] w-full max-w-4xl text-center shadow-2xl border border-blue-600"><i className="fa-solid fa-chess-knight text-8xl text-blue-400 mb-6 drop-shadow-[0_0_20px_rgba(59,130,246,0.6)]"></i><h1 className="text-6xl font-sports font-bold mb-10 text-white">POSTURA TÁTICA</h1><div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">{Object.entries(TACTICS).map(([n, d]) => (<div key={n} onClick={()=>{SFX.click(); setTactic(n);}} className={`p-8 rounded-2xl cursor-pointer border-4 transition-all ${tactic===n?'bg-blue-900 border-blue-400 shadow-[0_0_30px_rgba(59,130,246,0.6)] scale-105':'bg-black/60 border-blue-950 text-gray-500 hover:border-blue-500 hover:text-white'}`}><h3 className="font-sports text-4xl mb-4">{n}</h3><p className="font-bold text-sm opacity-80 leading-tight">{d.desc}</p></div>))}</div>{!myPlayerStatus?.isReady ? <button onClick={confirmTactic} className="w-full bg-blue-500 text-white font-sports text-3xl py-5 rounded-xl shadow-[0_0_30px_rgba(59,130,246,0.5)] hover:bg-blue-400 transition">TRAVAR MENTALIDADE</button> : isHost && allReady ? <button onClick={generateTournament} className="w-full bg-yellow-500 text-black font-sports text-3xl py-5 rounded-xl shadow-[0_0_30px_rgba(250,204,21,0.5)] hover:scale-105 transition">INICIAR PARTIDA</button> : <div className="text-yellow-400 font-sports text-2xl animate-pulse">Aguardando definição dos técnicos...</div>}</div></div>
      );

      if (appState === 'TOURNAMENT') {
        const stKey = roomData.stage === 1 ? 'quarters' : roomData.stage === 2 ? 'semis' : 'final';
        const matches = roomData.bracket?.[stKey] || [];
        const myMatch = matches.find(m => m.p1.uid === user.uid || m.p2.uid === user.uid);

        return (
          <div className="min-h-screen bg-[#010602] p-4 md:p-8 relative">
            <div className="max-w-7xl mx-auto">
              <div className="flex justify-between items-center mb-6 glass p-6 rounded-2xl border border-green-800/50">
                <div><h1 className="text-4xl font-sports font-bold text-yellow-400 uppercase"><i className="fa-solid fa-trophy mr-3"></i>{roomData.mode === '1v1'?'Duelo X1':'Copa Resenha'}</h1><p className="text-green-500 font-bold uppercase tracking-widest mt-1">Fase: {stKey}</p></div>
                {isHost && roomData.stage < 4 && !matches[0]?.played && <button onClick={simulateMatches} className="bg-red-600 hover:bg-red-500 text-white font-sports text-2xl py-3 px-8 rounded-xl shadow-[0_0_30px_rgba(220,38,38,0.5)] transition hover:scale-105">SIMULAR RODADA</button>}
                {!isHost && roomData.stage < 4 && !matches[0]?.played && <div className="text-yellow-400 font-sports text-xl animate-pulse">Aguardando Juiz...</div>}
              </div>

              {roomData.stage === 4 ? (
                <div className="text-center mt-32"><i className="fa-solid fa-crown text-[150px] text-yellow-400 drop-shadow-[0_0_60px_rgba(250,204,21,0.8)] animate-bounce"></i><h1 className="text-7xl font-sports font-bold text-white mt-8 uppercase">{roomData.bracket.final[0].winner.name} CAMPEÃO!</h1></div>
              ) : (
                <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                  <div className="lg:col-span-3">{myMatch ? <MatchViewer3D match={myMatch}/> : matches[0] ? <MatchViewer3D match={matches[0]}/> : null}</div>
                  <div className="flex flex-col gap-4">
                    <h3 className="bg-green-900/50 p-4 rounded-xl border border-green-800 text-center font-sports text-2xl text-green-400">PLACAR GERAL</h3>
                    <div className="space-y-4">
                      {matches.map((m, i) => {
                         const over = m.played && (Date.now() - m.startTime > 30000);
                         return (
                          <div key={i} className="glass p-4 rounded-xl border border-green-800/50 shadow-lg relative overflow-hidden">
                            <div className="flex justify-between items-center mb-3 border-b border-white/5 pb-2"><span className={`font-bold text-sm truncate ${over&&m.winner.uid===m.p1.uid?'text-yellow-400':'text-gray-300'}`}>{m.p1.name}</span><span className="font-sports text-2xl bg-black/60 px-3 rounded">{over?m.s1:'-'}</span></div>
                            <div className="flex justify-between items-center"><span className={`font-bold text-sm truncate ${over&&m.winner.uid===m.p2.uid?'text-yellow-400':'text-gray-300'}`}>{m.p2.name}</span><span className="font-sports text-2xl bg-black/60 px-3 rounded">{over?m.s2:'-'}</span></div>
                          </div>
                         )
                      })}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
