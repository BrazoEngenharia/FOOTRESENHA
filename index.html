    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null, errorInfo: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { 
        console.error("CRASH PREVENTED:", error, errorInfo); 
        this.setState({ errorInfo });
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-bgBase text-white flex flex-col items-center justify-center p-8 font-sans">
              <i className="fa-solid fa-triangle-exclamation text-6xl text-red-500 mb-6"></i>

              <p className="text-gray-400 mb-6 max-w-lg text-center">A engine colidiu com um estado inválido. A tela preta foi evitada.</p>
              <div className="bg-cardDark p-6 rounded-xl border border-red-900/50 w-full max-w-3xl overflow-auto text-xs font-mono text-red-400">
                {this.state.error && this.state.error.toString()}<br/><br/>
                {this.state.errorInfo && this.state.errorInfo.componentStack}
              </div>
              <button onClick={() => window.location.reload()} className="mt-8 bg-brandGreen text-bgBase font-black px-8 py-4 rounded-xl hover:scale-105 transition">REINICIAR ENGINE</button>
            </div>
          );
        }
        return this.props.children; 
      }
    }

    function generateSchedule(playersObj) {
      let uids = Object.keys(playersObj);
      if (uids.length % 2 !== 0) uids.push('BYE');
      
      const numTeams = uids.length;
      const numRounds = numTeams - 1;
      const half = numTeams / 2;
      const schedule = [];
      let tournamentUids = [...uids];

      // Turno
      for (let round = 0; round < numRounds; round++) {
        const roundMatches = [];
        for (let i = 0; i < half; i++) {
          const p1 = tournamentUids[i];
          const p2 = tournamentUids[numTeams - 1 - i];
          if (p1 !== 'BYE' && p2 !== 'BYE') {
            roundMatches.push({ p1, p2, s1: 0, s2: 0, played: false });
          }
        }
        schedule.push(roundMatches);
        tournamentUids.splice(1, 0, tournamentUids.pop());
      }
      
      // Returno
      const returno = schedule.map(r => r.map(m => ({ p1: m.p2, p2: m.p1, s1: 0, s2: 0, played: false })));
      return [...schedule, ...returno]; // 38 Rodadas perfeitas
    }

    const computeStandings = (standingsObj, p1, p2, s1, s2) => {
      const st = { ...standingsObj };
      if(!st[p1]) st[p1] = { uid: p1, pts: 0, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0, streak: 0 };
      if(!st[p2]) st[p2] = { uid: p2, pts: 0, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0, streak: 0 };

      st[p1].j++; st[p2].j++;
      st[p1].gp += s1; st[p1].gc += s2; st[p1].sg = st[p1].gp - st[p1].gc;
      st[p2].gp += s2; st[p2].gc += s1; st[p2].sg = st[p2].gp - st[p2].gc;

      if (s1 > s2) { 
        st[p1].pts += 3; st[p1].v++; st[p2].d++; 
        st[p1].streak = (st[p1].streak > 0 ? st[p1].streak + 1 : 1);
        st[p2].streak = (st[p2].streak < 0 ? st[p2].streak - 1 : -1);
      }
      else if (s1 < s2) { 
        st[p2].pts += 3; st[p2].v++; st[p1].d++; 
        st[p2].streak = (st[p2].streak > 0 ? st[p2].streak + 1 : 1);
        st[p1].streak = (st[p1].streak < 0 ? st[p1].streak - 1 : -1);
      }
      else { 
        st[p1].pts += 1; st[p2].pts += 1; st[p1].e++; st[p2].e++; 
        st[p1].streak = 0; st[p2].streak = 0;
      }
      return st;
    }

    function App() {
      const [user, setUser] = useState(null);
      const [playerName, setPlayerName] = useState('');
      const [roomId, setRoomId] = useState('');
      const [roomData, setRoomData] = useState(null);
      const [appState, setAppState] = useState('MENU'); // MENU, LOBBY, DRAFTING, TOURNAMENT
      const [error, setError] = useState('');
      
      const [myFormation, setMyFormation] = useState('4-3-3');
      const [myTeam, setMyTeam] = useState([]);
      const [draftOptions, setDraftOptions] = useState([]);
      const [isSimulating, setIsSimulating] = useState(false);

      useEffect(() => {
        auth.signInAnonymously().catch(e => setError("Erro ao conectar."));
        const unsub = auth.onAuthStateChanged(u => setUser(u));
        return () => unsub();
      }, []);

      useEffect(() => {
        if(!user || !roomId || appState === 'MENU') return;
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const listener = roomRef.on('value', snap => {
          if(snap.exists()) {
            const data = snap.val();
            setRoomData(data);
            
            // Sync Master
            if(data.status === 'drafting' && appState === 'LOBBY') {
              setAppState('DRAFTING');
              pullPacks(0);
            }
            if(data.status === 'tournament' && appState !== 'TOURNAMENT') {
              setAppState('TOURNAMENT');
            }
          } else {
            setAppState('MENU');
            setError('A sala não existe mais.');
          }
        });
        return () => roomRef.off('value', listener);
      }, [user, roomId, appState]);

      const handleCreateRoom = async () => {
        if(!playerName || !roomId) return setError("Preencha Nome e Sala.");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(snap.exists()) return setError("Sala já existe.");

        await roomRef.set({
          hostUid: user.uid, status: 'lobby', currentRound: 0,
          players: { [user.uid]: { name: playerName, team: [], overall: 0, isReady: false } },
          standings: {}, artilharia: {}
        });
        setAppState('LOBBY');
      };

      const handleJoinRoom = async () => {
        if(!playerName || !roomId) return setError("Preencha Nome e Sala.");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(!snap.exists()) return setError("Sala não encontrada.");
        if(snap.val().status !== 'lobby') return setError("A partida já começou.");
        
        await roomRef.update({ [`players/${user.uid}`]: { name: playerName, team: [], overall: 0, isReady: false } });
        setAppState('LOBBY');
      };

      const startDraftAndFillBots = async () => {
        if (user.uid !== roomData?.hostUid) return;
        
        const currentPlayers = Object.keys(roomData.players || {});
        const botsNeeded = 20 - currentPlayers.length; // Completa até 20 times pro Brasileirão
        const updates = { status: 'drafting' };
        
        for(let i=0; i<botsNeeded; i++) {
            const botName = CPU_TEAMS[i % CPU_TEAMS.length];
            const botTeam = [
               { id: `b${i}_1`, name: 'Atacante 9', pos: 'ATA', team: botName },
               { id: `b${i}_2`, name: 'Meia 10', pos: 'MEI', team: botName }
            ]; // Simplificado pro bot pontuar na artilharia
            const botOvr = 75 + Math.floor(Math.random()*15);
            updates[`players/bot_${i}`] = { name: botName, team: botTeam, overall: botOvr, isReady: true, isBot: true };
        }
        await db.ref(`games/${APP_ID}/${roomId}`).update(updates);
      };

      const pullPacks = (currentTeamLength) => {
        if (currentTeamLength >= 11) return;
        const reqPos = FORMATIONS[myFormation][currentTeamLength];
        let pool = RAW_DB.filter(p => p.pos === reqPos);
        let options = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
        
        // Anti-Crash: Se não tiver carta, cria uma da base
        while(options.length < 3) {
           options.push({ id: `gen_${Date.now()}_${options.length}`, name: "Jogador da Base", year: 2024, team: "Academy", overall: 70, pos: reqPos });
        }
        setDraftOptions(options);
      };

      const pickPlayer = async (player) => {
        const newTeam = [...myTeam, player];
        setMyTeam(newTeam);
        
        if (newTeam.length < 11) {
          pullPacks(newTeam.length);
        } else {
          setDraftOptions([]);
          const finalOvr = Math.round(newTeam.reduce((acc, p) => acc + p.overall, 0) / 11);
          await db.ref(`games/${APP_ID}/${roomId}/players/${user.uid}`).update({ team: newTeam, overall: finalOvr, isReady: true });
        }
      };

      const startTournament = async () => {
        if (user.uid !== roomData?.hostUid) return;
        const schedule = generateSchedule(roomData.players);
        
        let initialStandings = {};
        Object.keys(roomData.players).forEach(uid => {
           initialStandings[uid] = { uid, pts: 0, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0, streak: 0 };
        });

        await db.ref(`games/${APP_ID}/${roomId}`).update({ status: 'tournament', schedule, standings: initialStandings, artilharia: {}, currentRound: 0 });
      };

      const simulateRound = async () => {
        if (user.uid !== roomData?.hostUid || roomData.currentRound >= 38 || isSimulating) return;
        setIsSimulating(true);

        const currentRoundIdx = roomData.currentRound;
        const matches = roomData.schedule[currentRoundIdx];
        let newStandings = { ...(roomData.standings || {}) };
        let newArtilharia = { ...(roomData.artilharia || {}) };

        const updatedMatches = matches.map(match => {
            const t1 = roomData.players[match.p1];
            const t2 = roomData.players[match.p2];
            const ovr1 = (t1?.overall || 75) + (Math.random() * 8 - 4);
            const ovr2 = (t2?.overall || 75) + (Math.random() * 8 - 4);
            
            let s1 = 0, s2 = 0;
            const power1 = ovr1 / (ovr1 + ovr2);
            const chances = 3 + Math.floor(Math.random() * 5); // 3 a 7 chances no jogo
            
            for(let i=0; i<chances; i++) {
                if(Math.random() < power1) s1++; else s2++;
            }

            // Atribui gols pra Artilharia
            if (s1 > 0 && t1 && t1.team) {
                for(let g=0; g<s1; g++) {
                    const scorer = t1.team[Math.floor(Math.random() * t1.team.length)];
                    if(!newArtilharia[scorer.id]) newArtilharia[scorer.id] = { name: scorer.name, team: t1.name, goals: 0 };
                    newArtilharia[scorer.id].goals++;
                }
            }
            if (s2 > 0 && t2 && t2.team) {
                for(let g=0; g<s2; g++) {
                    const scorer = t2.team[Math.floor(Math.random() * t2.team.length)];
                    if(!newArtilharia[scorer.id]) newArtilharia[scorer.id] = { name: scorer.name, team: t2.name, goals: 0 };
                    newArtilharia[scorer.id].goals++;
                }
            }

            newStandings = computeStandings(newStandings, match.p1, match.p2, s1, s2);
            return { ...match, s1, s2, played: true };
        });

        await db.ref(`games/${APP_ID}/${roomId}`).update({
            [`schedule/${currentRoundIdx}`]: updatedMatches,
            standings: newStandings,
            artilharia: newArtilharia,
            currentRound: currentRoundIdx + 1
        });
        
        setTimeout(() => setIsSimulating(false), 500); // Cooldown visual
      };

      if (!user) return <div className="min-h-screen bg-bgBase flex items-center justify-center font-black text-brandGreen">Conectando...</div>;

      if (appState === 'MENU') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-bgBase p-4">
             <div className="bg-cardDark p-10 w-full max-w-md animate-slide-up text-center rounded-2xl border border-white/5 shadow-2xl">
                <h1 className="text-4xl font-black text-white tracking-tight mb-8">DRAFT KINGS</h1>
                <div className="space-y-4">
                  <input className="w-full p-4 bg-bgBase rounded-xl text-white outline-none border border-white/10 focus:border-brandGreen font-bold" placeholder="Nome do Treinador" value={playerName} onChange={e=>setPlayerName(e.target.value)} />
                  <input className="w-full p-4 bg-bgBase rounded-xl text-white outline-none border border-white/10 focus:border-brandGreen font-black uppercase text-center" placeholder="CÓDIGO DA SALA" value={roomId} onChange={e=>setRoomId(e.target.value.toUpperCase())} />
                  {error && <div className="text-red-400 text-sm font-bold bg-red-900/30 p-3 rounded-lg">{error}</div>}
                  <button onClick={handleCreateRoom} className="w-full bg-brandGreen text-bgBase font-black py-4 rounded-xl hover:scale-[1.02] transition">CRIAR LIGA (HOST)</button>
                  <button onClick={handleJoinRoom} className="w-full bg-transparent border border-brandGreen text-brandGreen font-black py-4 rounded-xl hover:bg-brandGreen/10 transition">ENTRAR NA LIGA</button>
                </div>
             </div>
          </div>
        );
      }

      if (appState === 'LOBBY') {
         const isHost = roomData?.hostUid === user?.uid;
         return (
           <div className="min-h-screen flex items-center justify-center bg-bgBase p-4">
             <div className="bg-cardDark p-10 text-center max-w-lg w-full animate-slide-up rounded-2xl border border-white/5">
                <h2 className="text-3xl font-black mb-2 text-white">Lobby da Liga</h2>
                <p className="text-brandGreen font-mono mb-8 text-xl">SALA: {roomId}</p>
                <div className="bg-bgBase p-4 rounded-xl border border-white/5 mb-8">
                   {Object.entries(roomData?.players || {}).map(([uid, p]) => (
                     <div key={uid} className="text-white font-bold py-2 border-b border-white/5 last:border-0">{p.name} {uid === user.uid && <span className="text-brandGreen text-xs">(Você)</span>}</div>
                   ))}
                </div>
                {isHost ? (
                  <button onClick={startDraftAndFillBots} className="w-full bg-brandGreen text-bgBase font-black py-4 rounded-xl hover:scale-105 transition">INICIAR DRAFT (Preencher 20 Times)</button>
                ) : (
                  <div className="text-brandGreen font-bold animate-pulse">Aguardando o Host...</div>
                )}
             </div>
           </div>
         );
      }

      if (appState === 'DRAFTING') {
         const isHost = roomData?.hostUid === user?.uid;
         const allReady = Object.values(roomData?.players || {}).every(p => p.isReady);
         const isMyDraftDone = myTeam.length === 11;
         const reqPos = isMyDraftDone ? '' : FORMATIONS[myFormation][myTeam.length];

         return (
           <div className="min-h-screen bg-bgBase p-8 flex flex-col items-center">
             {!isMyDraftDone ? (
               <div className="text-center w-full max-w-4xl animate-slide-up mt-10">
                 <h1 className="text-4xl font-black mb-2">Escolha seu <span className="text-brandGreen underline">{reqPos}</span></h1>
                 <p className="text-gray-400 font-bold text-xs uppercase tracking-widest mb-10">Jogador {myTeam.length + 1} de 11</p>
                 <div className="flex flex-wrap justify-center gap-6">
                   {draftOptions.map(p => (
                     <div key={p.id} onClick={() => pickPlayer(p)} className="bg-cardDark border border-white/10 w-48 p-6 rounded-2xl cursor-pointer hover:border-brandGreen hover:-translate-y-2 transition-all flex flex-col items-center text-center group">
                       <div className="font-black text-5xl text-brandGreen mb-4 drop-shadow-md">{p.overall}</div>
                       <div className="font-black text-xl text-white leading-tight mb-2 group-hover:text-brandGreen transition">{p.name}</div>
                       <div className="text-[10px] bg-bgBase border border-white/10 px-3 py-1 rounded font-bold uppercase tracking-widest mb-2">{p.pos}</div>
                       <div className="text-xs text-gray-500 font-semibold">{p.team}</div>
                     </div>
                   ))}
                 </div>
               </div>
             ) : (
               <div className="bg-cardDark p-12 text-center max-w-md w-full animate-slide-up mt-20 rounded-2xl border border-white/5">
                 <i className="fa-solid fa-circle-check text-7xl text-brandGreen mb-6"></i>
                 <h2 className="text-3xl font-black text-white mb-2">Esquadrão Assinado!</h2>
                 <p className="text-gray-400 font-bold mb-8 text-lg">Overall Final: <span className="text-brandGreen">{roomData?.players?.[user?.uid]?.overall}</span></p>
                 {isHost && allReady ? (
                   <button onClick={startTournament} className="w-full bg-brandGreen text-bgBase font-black py-4 rounded-xl hover:scale-105 transition text-lg">GERAR TABELA DO BRASILEIRÃO</button>
                 ) : (
                   <div className="text-brandGreen font-bold animate-pulse">Aguardando os outros managers...</div>
                 )}
               </div>
             )}
           </div>
         )
      }

      if (appState === 'TOURNAMENT') {
         if(!roomData?.schedule || !roomData?.standings) return <div className="min-h-screen flex items-center justify-center bg-bgBase text-brandGreen font-black">Sincronizando Tabela...</div>;

         const currentRoundIndex = roomData.currentRound || 0;
         const isLeagueOver = currentRoundIndex >= 38;
         const currentMatches = isLeagueOver ? [] : roomData.schedule[currentRoundIndex];

         // Sorting Standings
         const standingsArr = Object.values(roomData.standings).sort((a,b) => {
            if(b.pts !== a.pts) return b.pts - a.pts;
            if(b.v !== a.v) return b.v - a.v;
            if(b.sg !== a.sg) return b.sg - a.sg;
            return b.gp - a.gp;
         });

         const myStats = roomData.standings[user.uid] || {pts:0, j:0, v:0, e:0, d:0, gp:0, gc:0, sg:0, streak:0};
         const myPos = standingsArr.findIndex(s => s.uid === user.uid) + 1;
         const topScorers = Object.values(roomData.artilharia || {}).sort((a,b) => b.goals - a.goals).slice(0, 10);

         // Find Next Opponent
         let nextOppName = "---";
         if (!isLeagueOver) {
             const myMatch = currentMatches.find(m => m.p1 === user.uid || m.p2 === user.uid);
             if (myMatch) {
                 const oppId = myMatch.p1 === user.uid ? myMatch.p2 : myMatch.p1;
                 nextOppName = roomData.players[oppId]?.name || "---";
             }
         }

         const getBadge = (myUid, match) => {
             if (!match.played) return null;
             const isP1 = match.p1 === myUid;
             const myScore = isP1 ? match.s1 : match.s2;
             const oppScore = isP1 ? match.s2 : match.s1;
             if (myScore > oppScore) return <div className="w-8 h-8 rounded-full bg-[#00E676] text-[#0B1319] flex items-center justify-center font-black text-sm">V</div>;
             if (myScore < oppScore) return <div className="w-8 h-8 rounded-full bg-red-500 text-white flex items-center justify-center font-black text-sm">D</div>;
             return <div className="w-8 h-8 rounded-full bg-yellow-400 text-[#0B1319] flex items-center justify-center font-black text-sm">E</div>;
         }

         return (
            <div className="min-h-screen bg-bgBase p-4 md:p-8 font-sans text-gray-200">
               <div className="max-w-[1600px] mx-auto flex flex-col xl:flex-row gap-6">
                  
                  {/* COLUNA ESQUERDA: SUA CAMPANHA */}
                  <div className="w-full xl:w-[300px] flex flex-col gap-6 shrink-0">
                     <button className="bg-cardDark px-6 py-4 rounded-xl border border-white/5 font-bold text-gray-300 hover:text-white transition w-fit">
                        <i className="fa-solid fa-arrow-left mr-3"></i> Voltar ao Menu
                     </button>

                     <div className="bg-cardDark rounded-2xl p-6 border border-white/5 shadow-lg">
                        <h3 className="text-brandGreen text-xs font-black tracking-widest uppercase mb-6">Sua Campanha</h3>
                        <div className="flex justify-between items-end mb-6">
                           <div>
                              <div className="text-5xl font-black text-brandGreen">{myPos}</div>
                              <div className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Posição</div>
                           </div>
                           <div className="text-right">
                              <div className="text-5xl font-black text-white">{myStats.pts}</div>
                              <div className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Pontos</div>
                           </div>
                        </div>

                        <div className="border-t border-white/10 pt-4 mb-4">
                           <div className="font-black text-xl">{myStats.v}V {myStats.e}E {myStats.d}D</div>
                           <div className="text-xs text-gray-400 font-medium mt-1">GP {myStats.gp} / GC {myStats.gc} / SG {myStats.sg}</div>
                        </div>

                        <div className="border-t border-white/10 pt-4">
                           <div className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-1">Sequência</div>
                           <div className="font-black text-xl text-white">{Math.abs(myStats.streak)} {myStats.streak > 0 ? 'Vitórias' : myStats.streak < 0 ? 'Derrotas' : 'Empates'}</div>
                        </div>
                     </div>
                  </div>

                  {/* COLUNA CENTRAL: JOGO A JOGO */}
                  <div className="flex-1 bg-cardDark rounded-2xl p-6 md:p-8 border border-white/5 shadow-lg flex flex-col min-w-0">
                     <h3 className="text-brandGreen text-xs font-black tracking-widest uppercase mb-2">Brasileirão Jogo a Jogo</h3>
                     <h1 className="text-4xl md:text-5xl font-black text-white mb-2">Campanha</h1>
                     <p className="text-gray-400 font-medium mb-8">Rodada {Math.min(38, currentRoundIndex + 1)}/38</p>

                     <div className="bg-bgBase rounded-xl p-4 flex flex-col md:flex-row justify-between items-center mb-8 border border-white/5">
                         <div className="flex gap-6 text-sm mb-4 md:mb-0">
                             <span className="font-bold text-gray-300">{myStats.v}V {myStats.e}E {myStats.d}D</span>
                             <span className="font-bold text-gray-300">GP {myStats.gp} / GC {myStats.gc}</span>
                             <span className="font-bold text-gray-300">Próximo: <span className="text-white">{nextOppName}</span></span>
                         </div>
                         {isHost && !isLeagueOver && (
                             <button onClick={simulateRound} disabled={isSimulating} className="bg-brandGreen text-bgBase font-black px-6 py-2 rounded-lg hover:scale-105 transition disabled:opacity-50">
                                 {isSimulating ? 'Simulando...' : <><i className="fa-solid fa-rotate mr-2"></i> Simular Rodada</>}
                             </button>
                         )}
                         {isLeagueOver && <div className="text-brandGreen font-black text-xl">FIM DA LIGA</div>}
                     </div>

                     <div className="flex-1 overflow-y-auto space-y-3 pr-2">
                        {roomData.schedule.slice(0, currentRoundIndex).reverse().map((round, rIdx) => {
                           const myMatch = round.find(m => m.p1 === user.uid || m.p2 === user.uid);
                           if(!myMatch) return null;
                           const isHome = myMatch.p1 === user.uid;
                           const p1Name = isHome ? 'Seu Esquadrão' : roomData.players[myMatch.p1]?.name;
                           const p2Name = !isHome ? 'Seu Esquadrão' : roomData.players[myMatch.p2]?.name;

                           return (
                              <div key={rIdx} className="bg-bgBase rounded-xl p-4 border border-white/5 flex flex-col md:flex-row items-center justify-between gap-4">
                                 <div className="w-full md:w-auto">
                                    <div className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-1 text-center md:text-left">RODADA {roomData.schedule.indexOf(round) + 1}/38</div>
                                 </div>
                                 <div className="flex-1 flex items-center justify-center w-full">
                                    <div className={`flex-1 font-black text-sm md:text-lg truncate text-right ${isHome ? 'text-brandGreen' : 'text-gray-300'}`}>{p1Name}</div>
                                    <div className="mx-2 md:mx-4 flex items-center gap-2">
                                       <span className="bg-cardDark text-white px-3 py-1 md:px-4 md:py-2 rounded-lg font-black text-lg border border-white/10">{myMatch.s1}</span>
                                       <span className="text-gray-600 font-black">X</span>
                                       <span className="bg-cardDark text-white px-3 py-1 md:px-4 md:py-2 rounded-lg font-black text-lg border border-white/10">{myMatch.s2}</span>
                                    </div>
                                    <div className={`flex-1 font-black text-sm md:text-lg truncate text-left ${!isHome ? 'text-brandGreen' : 'text-gray-300'}`}>{p2Name}</div>
                                 </div>
                                 <div className="shrink-0">{getBadge(user.uid, myMatch)}</div>
                              </div>
                           )
                        })}
                     </div>
                  </div>

                  {/* COLUNA DIREITA: ARTILHARIA */}
                  <div className="w-full xl:w-[350px] bg-cardDark rounded-2xl p-6 border border-white/5 shadow-lg flex flex-col shrink-0">
                     <h3 className="text-brandGreen text-xs font-black tracking-widest uppercase mb-6">Artilharia</h3>
                     <div className="space-y-3 overflow-y-auto pr-2">
                        {topScorers.length === 0 && <div className="text-gray-500 font-bold text-center mt-10">Nenhum gol na liga.</div>}
                        {topScorers.map((scorer, i) => (
                           <div key={i} className="bg-brandGreen text-[#0B1319] rounded-xl p-3 flex items-center gap-4 hover:-translate-y-1 transition-transform cursor-default shadow-md">
                              <div className="w-8 h-8 rounded-full bg-[#0B1319]/20 flex items-center justify-center font-black text-sm">{i+1}</div>
                              <div className="flex-1 min-w-0">
                                 <div className="font-black text-base truncate leading-tight">{scorer.name}</div>
                                 <div className="text-[10px] font-bold uppercase tracking-widest opacity-70 truncate">{scorer.team}</div>
                              </div>
                              <div className="w-10 h-10 rounded-full bg-[#0B1319] flex items-center justify-center font-black text-white text-lg shadow-inner">{scorer.goals}</div>
                           </div>
                        ))}
                     </div>
                  </div>

               </div>
            </div>
         );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
