  <style>

    ::-webkit-scrollbar-thumb { background: #13212C; border-radius: 10px; }
    
    .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>

                {this.state.error?.toString()}
              </div>

        }
        return this.props.children; 
      }
    }

    //    firebase.initializeApp({

    const auth = firebase.auth();

    // Banco de Dados super comprimido para não estourar o limite de linhas do bot

      pele|Pelé|1970|Santos|99|ATA
      zico|Zico|1981|Flamengo|98|MEI
      romario|Romário|2000|Vasco|97|ATA
      ronaldo|Ronaldo|1996|Cruzeiro|97|ATA

    `.trim().split('\n').map(line => {

    });

    const CPU_TEAMS = [
      "Palmeiras 1999", "São Paulo 2005", "Flamengo 2019", "Corinthians 2012", 
      "Vasco 2000", "Cruzeiro 2003", "Santos 2011", "Grêmio 2017", 
      "Atlético-MG 2013", "Internacional 2006", "Fluminense 2012", "Athletico-PR 2001",
      "Botafogo 1995", "Sport 1987", "Guarani 1978", "Coritiba 1985",
      "Bahia 1988", "Goiás 2005", "São Caetano 2002", "Paysandu 2002"
    ];

    const FORMATIONS = {
      '4-3-3': ['GOL', 'LAT', 'ZAG', 'ZAG', 'LAT', 'VOL', 'MEI', 'MEI', 'PON', 'ATA', 'PON'],
      '4-4-2': ['GOL', 'LAT', 'ZAG', 'ZAG', 'LAT', 'VOL', 'VOL', 'MEI', 'MEI', 'ATA', 'ATA'],
      '3-5-2': ['GOL', 'ZAG', 'ZAG', 'ZAG', 'VOL', 'VOL', 'LAT', 'LAT', 'MEI', 'ATA', 'ATA']
    };

    //    function generateBrasileiraoSchedule(playersObj) {
      let uids = Object.keys(playersObj);
      // Se por algum acaso for ímpar, adiciona um dummy pra não quebrar a matemática
      if (uids.length % 2 !== 0) uids.push('BYE'); 
      
      const numRounds = uids.length - 1;
      const half = uids.length / 2;
      const schedule = [];

      let tournamentUids = [...uids];

      // Turno
      for (let round = 0; round < numRounds; round++) {
        const roundMatches = [];
        for (let i = 0; i < half; i++) {
          const p1 = tournamentUids[i];
          const p2 = tournamentUids[uids.length - 1 - i];
          if (p1 !== 'BYE' && p2 !== 'BYE') {
            roundMatches.push({ p1: p1, p2: p2, s1: 0, s2: 0, played: false });
          }
        }
        schedule.push(roundMatches);
        tournamentUids.splice(1, 0, tournamentUids.pop());
      }

      // Returno (Inverte mandante/visitante)
      const returno = schedule.map(round => round.map(match => ({ p1: match.p2, p2: match.p1, s1: 0, s2: 0, played: false })));
      
      return [...schedule, ...returno]; // Array de 38 posições, cada uma com 10 jogos
    }

    //    function App() {
      const [user, setUser] = useState(null);
      const [playerName, setPlayerName] = useState('');
      const [roomId, setRoomId] = useState('');
      const [roomData, setRoomData] = useState(null);
      const [appState, setAppState] = useState('MENU'); // MENU, LOBBY, DRAFT_SETUP, DRAFTING, TOURNAMENT
      const [error, setError] = useState('');
      
      // Estado Local do Draft
      const [myFormation, setMyFormation] = useState('4-3-3');
      const [myTeam, setMyTeam] = useState([]);
      const [draftOptions, setDraftOptions] = useState([]);

      // Autenticação Silenciosa
      useEffect(() => {
        auth.signInAnonymously().catch(e => setError("Erro ao conectar no Servidor."));
        const unsub = auth.onAuthStateChanged(u => setUser(u));
        return () => unsub();
      }, []);

      // Sincronização em Tempo Real da Sala
      useEffect(() => {
        if(!user || !roomId || appState === 'MENU') return;
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const listener = roomRef.on('value', snap => {
          if(snap.exists()) {
            const data = snap.val();
            setRoomData(data);
            
            // Máquina de Estados Guiada pelo Host
            if(data.status === 'draft_setup' && appState === 'LOBBY') setAppState('DRAFT_SETUP');
            if(data.status === 'drafting' && appState === 'DRAFT_SETUP') setAppState('DRAFTING');
            if(data.status === 'tournament' && appState !== 'TOURNAMENT') setAppState('TOURNAMENT');
          } else {
            setAppState('MENU');
            setError('A sala não existe mais.');
          }
        });
        return () => roomRef.off('value', listener);
      }, [user, roomId, appState]);

      //      const handleCreateRoom = async () => {
        if(!playerName || !roomId) return setError("Digite seu Nome e a Sala.");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(snap.exists()) return setError("Esta sala já está em uso.");

        await roomRef.set({
          hostUid: user.uid, status: 'lobby', currentRound: 0,
          players: { [user.uid]: { name: playerName, team: [], overall: 0, isReady: false, isBot: false } },
          standings: {}, artilharia: {}
        });
        setAppState('LOBBY');
        setError('');
      };

      const handleJoinRoom = async () => {
        if(!playerName || !roomId) return setError("Digite seu Nome e a Sala.");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(!snap.exists()) return setError("Sala não encontrada.");
        if(snap.val().status !== 'lobby') return setError("A partida já começou nesta sala.");
        
        await roomRef.update({ [`players/${user.uid}`]: { name: playerName, team: [], overall: 0, isReady: false, isBot: false } });
        setAppState('LOBBY');
        setError('');
      };

      // Host clica para iniciar o setup do Draft. Injeta 19 bots se estiver sozinho, ou completa até 20.
      const handleStartDraftSetup = async () => {
        if (user.uid !== roomData?.hostUid) return;
        
        const currentPlayers = Object.keys(roomData.players || {});
        const botsNeeded = 20 - currentPlayers.length; 
        const updates = { status: 'draft_setup' };
        
        for(let i=0; i<botsNeeded; i++) {
            const botName = CPU_TEAMS[i % CPU_TEAMS.length];
            // Gera um time falso pro bot para a artilharia e cálculo
            const botTeam = FORMATIONS['4-4-2'].map((pos, idx) => ({
               id: `bot_${i}_${idx}`, name: `Jogador ${idx+1}`, team: botName, pos: pos, overall: 75 + Math.floor(Math.random()*15)
            }));
            const botOvr = Math.round(botTeam.reduce((acc, p) => acc + p.overall, 0) / 11);
            updates[`players/bot_${i}`] = { name: botName, team: botTeam, overall: botOvr, isReady: true, isBot: true };
        }
        await db.ref(`games/${APP_ID}/${roomId}`).update(updates);
      };

      //      const generatePacks = (currentTeamLength) => {
         if (currentTeamLength >= 11) return;
         const reqPos = FORMATIONS[myFormation][currentTeamLength];
         
         let pool = RAW_DB.filter(p => p.pos === reqPos);
         let options = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
         
         // Fallback se faltar carta
         while(options.length < 3) {
            options.push({ id: `gen_${Date.now()}_${options.length}`, name: "Base", team: "Academy", year: 2024, overall: 75, pos: reqPos });
         }
         setDraftOptions(options);
      };

      const handleConfirmFormation = () => {
         setAppState('DRAFTING');
         generatePacks(0);
         if(user.uid === roomData?.hostUid) db.ref(`games/${APP_ID}/${roomId}`).update({status: 'drafting'});
      };

      const pickPlayer = async (player) => {
         const newTeam = [...myTeam, player];
         setMyTeam(newTeam); // Sync local imediato
         
         if (newTeam.length < 11) {
            generatePacks(newTeam.length);
         } else {
            setDraftOptions([]);
            const finalOvr = Math.round(newTeam.reduce((acc, p) => acc + p.overall, 0) / 11);
            // Salva no banco e declara pronto
            await db.ref(`games/${APP_ID}/${roomId}/players/${user.uid}`).update({
               team: newTeam, overall: finalOvr, isReady: true
            });
         }
      };

      const startBrasileirao = async () => {
         if (user.uid !== roomData?.hostUid) return;
         
         const schedule = generateBrasileiraoSchedule(roomData.players);
         const standings = {};
         Object.keys(roomData.players).forEach(uid => {
            standings[uid] = { uid, name: roomData.players[uid].name, pts: 0, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0 };
         });

         await db.ref(`games/${APP_ID}/${roomId}`).update({
            status: 'tournament', schedule, standings, artilharia: {}, currentRound: 0
         });
      };

      //      if (!user) return <div className="min-h-screen bg-bgBase flex items-center justify-center text-brandGreen font-black">Conectando...</div>;

      if (appState === 'MENU') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-bgBase p-4">
             <div className="glass-panel p-10 w-full max-w-md animate-slide-up text-center">
                <i className="fa-solid fa-futbol text-6xl text-brandGreen mb-4"></i>
                <h1 className="text-4xl font-black text-white tracking-tight mb-2">DRAFT KINGS</h1>
                <p className="text-brandGreen font-bold text-xs tracking-widest uppercase mb-8">Brasileirão Manager</p>
                
                <div className="space-y-4">
                  <input className="w-full p-4 bg-black/40 rounded-xl text-white outline-none border border-white/10 focus:border-brandGreen font-bold transition" placeholder="Nome do Treinador" value={playerName} onChange={e=>setPlayerName(e.target.value)} />
                  <input className="w-full p-4 bg-black/40 rounded-xl text-white outline-none border border-white/10 focus:border-brandGreen font-black uppercase text-center transition" placeholder="CÓDIGO DA SALA" value={roomId} onChange={e=>setRoomId(e.target.value.toUpperCase())} />
                  
                  {error && <div className="text-red-400 text-sm font-bold bg-red-900/30 p-3 rounded-lg border border-red-500/50">{error}</div>}
                  
                  <div className="flex flex-col gap-3 pt-4">
                     <button onClick={handleCreateRoom} className="w-full bg-brandGreen text-black font-black py-4 rounded-xl hover:bg-brandGreenDark transition shadow-lg">CRIAR LIGA (HOST)</button>
                     <button onClick={handleJoinRoom} className="w-full bg-transparent border border-brandGreen text-brandGreen font-black py-4 rounded-xl hover:bg-brandGreen/10 transition">ENTRAR NA LIGA</button>
                  </div>
                </div>
             </div>
          </div>
        );
      }

      if (appState === 'LOBBY') {
         const isHost = roomData?.hostUid === user?.uid;
         return (
           <div className="min-h-screen flex items-center justify-center bg-bgBase p-4">
             <div className="glass-panel p-10 text-center max-w-lg w-full animate-slide-up">
                <h2 className="text-3xl font-black mb-2 text-white">Lobby do Campeonato</h2>
                <p className="text-brandGreen font-mono mb-8 text-xl">SALA: {roomId}</p>
                
                <div className="bg-black/30 p-4 rounded-xl border border-white/5 mb-8">
                   <h3 className="text-xs text-gray-400 uppercase tracking-widest mb-3">Treinadores Conectados</h3>
                   {Object.entries(roomData?.players || {}).map(([uid, p]) => (
                     <div key={uid} className="text-white font-bold py-2 border-b border-white/5 last:border-0">{p.name} {uid === user.uid && <span className="text-brandGreen text-xs">(Você)</span>}</div>
                   ))}
                </div>

                {isHost ? (
                  <button onClick={handleStartDraftSetup} className="w-full bg-brandGreen text-black font-black py-4 rounded-xl shadow-lg">INICIAR DRAFT (PREENCHER 20 TIMES)</button>
                ) : (
                  <div className="text-yellow-500 font-bold animate-pulse">Aguardando o Host iniciar...</div>
                )}
             </div>
           </div>
         );
      }

      if (appState === 'DRAFT_SETUP') {
         return (
            <div className="min-h-screen bg-bgBase p-6 flex flex-col items-center justify-center">
               <div className="glass-panel p-10 text-center max-w-2xl w-full animate-slide-up">
                  <h1 className="text-4xl font-black mb-6">Escolha sua Formação</h1>
                  <div className="grid grid-cols-3 gap-4 mb-8">
                     {Object.keys(FORMATIONS).map(f => (
                        <button key={f} onClick={()=>setMyFormation(f)} className={`py-6 rounded-xl font-black text-2xl border-2 transition ${myFormation === f ? 'bg-brandGreen border-brandGreen text-black' : 'bg-black/40 border-white/10 text-gray-400 hover:border-brandGreen'}`}>{f}</button>
                     ))}
                  </div>
                  <button onClick={handleConfirmFormation} className="w-full bg-brandGreen text-black font-black py-4 rounded-xl text-xl">CONFIRMAR E ABRIR PACOTES</button>
               </div>
            </div>
         );
      }

      if (appState === 'DRAFTING') {
         const isHost = roomData?.hostUid === user?.uid;
         const allReady = Object.values(roomData?.players || {}).every(p => p.isReady);
         const isMyDraftDone = myTeam.length === 11;
         const reqPos = isMyDraftDone ? '' : FORMATIONS[myFormation][myTeam.length];

         return (
           <div className="min-h-screen bg-bgBase p-8 flex flex-col items-center">
             {!isMyDraftDone ? (
               <div className="text-center w-full max-w-4xl animate-slide-up mt-10">
                 <h1 className="text-4xl font-black mb-2">Escolha seu <span className="text-brandGreen underline">{reqPos}</span></h1>
                 <p className="text-brandGreen font-bold text-xs uppercase tracking-widest mb-10">Jogador {myTeam.length + 1} de 11</p>
                 
                 <div className="flex flex-wrap justify-center gap-6">
                   {draftOptions.map(p => (
                     <div key={p.id} onClick={() => pickPlayer(p)} className="glass-panel w-48 p-6 cursor-pointer hover:border-brandGreen hover:-translate-y-2 transition-all flex flex-col items-center text-center group">
                       <div className="font-black text-5xl text-brandGreen mb-4 drop-shadow-md">{p.overall}</div>
                       <div className="font-black text-xl text-white leading-tight mb-2 group-hover:text-brandGreen transition">{p.name}</div>
                       <div className="text-[10px] bg-black/50 border border-white/10 px-3 py-1 rounded font-bold uppercase tracking-widest mb-2">{p.pos}</div>
                       <div className="text-xs text-gray-500 font-semibold">{p.team}</div>
                     </div>
                   ))}
                 </div>
               </div>
             ) : (
               <div className="glass-panel p-12 text-center max-w-md w-full animate-slide-up mt-20">
                 <i className="fa-solid fa-circle-check text-7xl text-brandGreen mb-6"></i>
                 <h2 className="text-3xl font-black text-white mb-2">Esquadrão Assinado!</h2>
                 <p className="text-gray-400 font-bold mb-8 text-lg">Overall Final: <span className="text-brandGreen">{roomData?.players?.[user?.uid]?.overall}</span></p>
                 
                 {isHost && allReady ? (
                   <button onClick={startBrasileirao} className="w-full bg-brandGreen text-black font-black py-4 rounded-xl shadow-lg hover:scale-105 transition text-lg">GERAR TABELA DO BRASILEIRÃO</button>
                 ) : (
                   <div className="text-yellow-500 font-bold text-sm animate-pulse border border-yellow-500/30 bg-yellow-500/10 p-4 rounded-xl">
                      Aguardando os outros managers terminarem o Draft...
                   </div>
                 )}
               </div>
             )}
           </div>
         )
      }

      //      if (appState === 'TOURNAMENT') {
         if(!roomData?.schedule || !roomData?.standings) return <div className="min-h-screen flex items-center justify-center bg-bgBase text-brandGreen font-black">Montando Campeonato...</div>;

         const currentRoundIndex = roomData.currentRound || 0;
         const isLeagueOver = currentRoundIndex >= 38;
         const currentMatches = isLeagueOver ? [] : roomData.schedule[currentRoundIndex];

         // Ordenação da Tabela (Pontos > Vitórias > Saldo > Gols Pró)
         const standingsArr = Object.values(roomData.standings).sort((a,b) => {
            if(b.pts !== a.pts) return b.pts - a.pts;
            if(b.v !== a.v) return b.v - a.v;
            if(b.sg !== a.sg) return b.sg - a.sg;
            return b.gp - a.gp;
         });

         const myStats = roomData.standings[user.uid] || {pts:0, j:0, v:0, e:0, d:0, gp:0, gc:0, sg:0};
         const myPos = standingsArr.findIndex(s => s.uid === user.uid) + 1;

         // Artilharia Formatada
         const topScorers = Object.values(roomData.artilharia || {}).sort((a,b) => b.goals - a.goals).slice(0, 10);

         // Lógica de Simulação de Rodada
         const handleSimulateRound = async () => {
            if(user.uid !== roomData?.hostUid || isLeagueOver) return;

            const roundMatches = roomData.schedule[currentRoundIndex];
            const newStandings = JSON.parse(JSON.stringify(roomData.standings));
            let newArtilharia = roomData.artilharia ? JSON.parse(JSON.stringify(roomData.artilharia)) : {};

            const updatedMatches = roundMatches.map(match => {
               const t1 = roomData.players[match.p1];
               const t2 = roomData.players[match.p2];
               
               // Fator Casa e Aleatoriedade
               const ovr1 = (t1?.overall || 75) + 3 + (Math.random()*10 - 5);
               const ovr2 = (t2?.overall || 75) + (Math.random()*10 - 5);
               
               let s1 = 0, s2 = 0;
               const power1 = ovr1 / (ovr1 + ovr2);
               const chances = 4 + Math.floor(Math.random() * 4); // 4 a 7 chances no jogo
               
               for(let i=0; i<chances; i++) {
                 if(Math.random() < 0.3) continue; // Chance errada
                 if(Math.random() < power1) s1++; else s2++;
               }

               // Atualiza Classificação
               const updateStats = (uid, gf, gs) => {
                  newStandings[uid].j++;
                  newStandings[uid].gp += gf;
                  newStandings[uid].gc += gs;
                  newStandings[uid].sg = newStandings[uid].gp - newStandings[uid].gc;
                  if(gf > gs) { newStandings[uid].pts += 3; newStandings[uid].v++; }
                  else if(gf === gs) { newStandings[uid].pts += 1; newStandings[uid].e++; }
                  else { newStandings[uid].d++; }
               };
               updateStats(match.p1, s1, s2);
               updateStats(match.p2, s2, s1);

               // Atualiza Artilharia (Escolhe jogador aleatório do time)
               const assignGoals = (teamObj, goals) => {
                  if(!teamObj || !teamObj.team || goals === 0) return;
                  for(let g=0; g<goals; g++) {
                     // Prioriza atacantes e meias
                     const scorers = teamObj.team.filter(p => ['ATA', 'PON', 'MEI'].includes(p.pos));
                     const p = scorers.length > 0 ? scorers[Math.floor(Math.random() * scorers.length)] : teamObj.team[0];
                     
                     if(!newArtilharia[p.id]) newArtilharia[p.id] = { name: p.name, team: teamObj.name, goals: 0 };
                     newArtilharia[p.id].goals += 1;
                  }
               };
               assignGoals(t1, s1);
               assignGoals(t2, s2);

               return { ...match, s1, s2, played: true };
            });

            await db.ref(`games/${APP_ID}/${roomId}`).update({
               [`schedule/${currentRoundIndex}`]: updatedMatches,
               standings: newStandings,
               artilharia: newArtilharia,
               currentRound: currentRoundIndex + 1
            });
         };

         // Identifica o próximo jogo do Usuário
         const myNextMatch = currentMatches.find(m => m.p1 === user.uid || m.p2 === user.uid);
         const nextOpponentId = myNextMatch ? (myNextMatch.p1 === user.uid ? myNextMatch.p2 : myNextMatch.p1) : null;
         const nextOppName = nextOpponentId ? roomData.players[nextOpponentId]?.name : '---';

         // Renderização Principal do Dashboard
         return (
            <div className="min-h-screen bg-bgBase p-4 md:p-8 flex justify-center text-sm md:text-base">
               <div className="max-w-[1600px] w-full flex flex-col lg:flex-row gap-6">
                  
                  {/* COLUNA ESQUERDA: SUA CAMPANHA */}
                  <div className="w-full lg:w-[320px] flex flex-col gap-6 shrink-0">
                     <button className="glass-panel px-6 py-4 flex items-center font-bold text-gray-300 hover:text-white transition group w-fit">
                        <i className="fa-solid fa-arrow-left mr-3 group-hover:-translate-x-1 transition"></i> Voltar ao Menu
                     </button>

                     <div className="glass-panel p-6 flex flex-col gap-6">
                        <h3 className="text-brandGreen font-black text-xs tracking-widest uppercase">Sua Campanha</h3>
                        
                        <div className="flex justify-between items-end border-b border-white/5 pb-6">
                           <div>
                              <div className="text-5xl font-black text-brandGreen">{myPos}</div>
                              <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">Posição</div>
                           </div>
                           <div className="text-right">
                              <div className="text-5xl font-black text-white">{myStats.pts}</div>
                              <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">Pontos</div>
                           </div>
                        </div>

                        <div className="border-b border-white/5 pb-6 space-y-2">
                           <div className="font-black text-xl">{myStats.v}V {myStats.e}E {myStats.d}D</div>
                           <div className="text-xs text-gray-400 font-semibold tracking-wide">GP {myStats.gp} / GC {myStats.gc} / SG {myStats.sg}</div>
                        </div>

                        <div>
                           <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Próximo Jogo</div>
                           <div className="font-black text-xl text-white truncate">{nextOppName}</div>
                        </div>
                     </div>
                  </div>

                  {/* COLUNA CENTRAL: JOGO A JOGO E TABELA */}
                  <div className="flex-1 flex flex-col gap-6 min-w-0">
                     <div className="glass-panel p-6 md:p-8 flex flex-col">
                        <div className="flex justify-between items-start mb-6">
                           <div>
                              <h3 className="text-brandGreen font-black text-xs tracking-widest uppercase mb-2">Brasileirão Jogo a Jogo</h3>
                              <h1 className="text-4xl md:text-5xl font-black text-white">Campanha</h1>
                           </div>
                           {roomData.hostUid === user.uid && !isLeagueOver && (
                              <button onClick={handleSimulateRound} className="bg-transparent border border-white/20 text-white font-bold px-6 py-3 rounded-xl hover:bg-white/5 transition flex items-center gap-2">
                                 <i className="fa-solid fa-forward-step"></i> Simular Rodada
                              </button>
                           )}
                           {isLeagueOver && <div className="text-brandGreen font-black text-xl"><i className="fa-solid fa-trophy mr-2"></i> FIM DE TEMPORADA</div>}
                        </div>

                        <p className="text-gray-400 font-bold mb-6 text-lg">Rodada {Math.min(38, currentRoundIndex + 1)}/38</p>

                        <div className="bg-cardDark border border-white/5 rounded-2xl p-5 flex flex-col md:flex-row justify-between items-center gap-4">
                           <span className="font-bold text-gray-300">Classificação Atual (Top 8)</span>
                        </div>
                     </div>

                     {/* Histórico / Feed de Rodadas */}
                     <div className="flex-1 overflow-y-auto space-y-4 pb-10 pr-2">
                        {/* Renderiza a Tabela Simplificada no topo do feed para contexto */}
                        <div className="glass-panel p-4 overflow-x-auto">
                           <table className="w-full text-left text-sm whitespace-nowrap">
                              <thead className="text-gray-500 text-[10px] uppercase tracking-widest border-b border-white/10">
                                 <tr><th className="pb-3 pl-4">#</th><th className="pb-3">Clube</th><th className="pb-3 text-center">Pts</th><th className="pb-3 text-center">J</th><th className="pb-3 text-center">V</th><th className="pb-3 text-center">E</th><th className="pb-3 text-center">D</th><th className="pb-3 text-center">SG</th></tr>
                              </thead>
                              <tbody className="font-semibold text-gray-300">
                                 {standingsArr.slice(0,8).map((t, i) => (
                                    <tr key={t.uid} className={`border-b border-white/5 last:border-0 hover:bg-white/5 transition ${t.uid === user.uid ? 'bg-brandGreen/10 text-brandGreen' : ''}`}>
                                       <td className="py-3 pl-4">{i+1}</td>
                                       <td className="py-3 truncate max-w-[150px]">{t.uid === user.uid ? 'Seu Esquadrão' : t.name}</td>
                                       <td className="py-3 text-center font-black text-white">{t.pts}</td>
                                       <td className="py-3 text-center">{t.j}</td><td className="py-3 text-center">{t.v}</td><td className="py-3 text-center">{t.e}</td><td className="py-3 text-center">{t.d}</td><td className="py-3 text-center">{t.sg}</td>
                                    </tr>
                                 ))}
                              </tbody>
                           </table>
                        </div>

                        {/* Jogos passados do Usuário */}
                        {roomData.schedule.slice(0, currentRoundIndex).reverse().map((round, idx) => {
                           const myMatch = round.find(m => m.p1 === user.uid || m.p2 === user.uid);
                           if(!myMatch) return null;
                           
                           const isHome = myMatch.p1 === user.uid;
                           const oppName = roomData.players[isHome ? myMatch.p2 : myMatch.p1].name;
                           const myScore = isHome ? myMatch.s1 : myMatch.s2;
                           const oppScore = isHome ? myMatch.s2 : myMatch.s1;
                           const res = myScore > oppScore ? 'V' : myScore < oppScore ? 'D' : 'E';
                           const badgeColors = res === 'V' ? 'bg-brandGreen text-black' : res === 'E' ? 'bg-yellow-400 text-black' : 'bg-red-500 text-white';

                           return (
                              <div key={idx} className="glass-panel p-5 flex justify-between items-center group hover:border-white/10 transition">
                                 <div className="flex-1">
                                    <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">RODADA {roomData.schedule.indexOf(round) + 1}/38</div>
                                    <div className="font-black text-lg flex items-center gap-4">
                                       <span className={`truncate w-1/3 text-right ${isHome ? 'text-brandGreen' : 'text-gray-400'}`}>{isHome ? 'Seu Esquadrão' : oppName}</span>
                                       <span className="bg-black/50 px-4 py-1.5 rounded-lg border border-white/10">{myMatch.s1} x {myMatch.s2}</span>
                                       <span className={`truncate w-1/3 text-left ${!isHome ? 'text-brandGreen' : 'text-gray-400'}`}>{!isHome ? 'Seu Esquadrão' : oppName}</span>
                                    </div>
                                 </div>
                                 <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-lg shadow-lg shrink-0 ${badgeColors}`}>{res}</div>
                              </div>
                           )
                        })}
                     </div>
                  </div>

                  {/* COLUNA DIREITA: ARTILHARIA */}
                  <div className="w-full lg:w-[320px] flex flex-col gap-4 shrink-0">
                     <div className="glass-panel p-6 flex-1 flex flex-col">
                        <h3 className="text-brandGreen font-black text-xs tracking-widest uppercase mb-6">Artilharia</h3>
                        
                        <div className="space-y-3 overflow-y-auto pr-2">
                           {topScorers.length === 0 && <div className="text-gray-500 font-bold text-center mt-10">Nenhum gol na liga.</div>}
                           {topScorers.map((s, i) => (
                              <div key={i} className="bg-brandGreen rounded-2xl p-3 flex items-center gap-4 relative overflow-hidden group hover:scale-[1.02] transition">
                                 {/* Efeito visual no card da artilharia */}
                                 <div className="absolute -right-10 top-1/2 -translate-y-1/2 w-32 h-32 bg-white/20 blur-2xl rounded-full pointer-events-none"></div>
                                 
                                 <div className="w-8 h-8 rounded-full bg-black/20 flex items-center justify-center font-black text-black text-sm shrink-0">{i+1}</div>
                                 <div className="flex-1 min-w-0 z-10">
                                    <div className="font-black text-black text-base leading-tight truncate">{s.name}</div>
                                    <div className="text-[10px] font-bold text-black/60 uppercase tracking-widest truncate">{s.team}</div>
                                 </div>
                                 <div className="w-10 h-10 rounded-full bg-black flex items-center justify-center font-black text-white text-lg shadow-inner z-10">{s.goals}</div>
                              </div>
                           ))}
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
