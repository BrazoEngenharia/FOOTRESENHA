    // Componente de Carta Parallax
    const PlayerCard = ({ player, onClick, hidden = false }) => {
      if (!player) return <div className="w-32 h-48 border-2 border-dashed border-white/20 rounded-xl bg-black/30"></div>;

    // --- ENGINE DE PARTIDA (CLIENT-SIDE PLAYBACK) ---
    const MatchViewer = ({ match }) => {
      const [localMin, setLocalMin] = useState(0);
      const [events, setEvents] = useState([]);
      const feedRef = useRef(null);

      useEffect(() => {
        if (!match || !match.played) return;
        
        // 30 segundos = 90 min (333ms por min)
        const msPerMin = 333;
        
        // Play Whistle at start
        if(Date.now() - match.startTime < 1000) SFX.whistle();

        const timer = setInterval(() => {
          const elapsed = Date.now() - match.startTime;
          let min = Math.floor(elapsed / msPerMin);
          if (min > 90) { min = 90; clearInterval(timer); }
          setLocalMin(min);

          const currentEvents = match.events.filter(e => e.minute <= min);
          setEvents(currentEvents.reverse()); // Mais recentes no topo

          // Trigger Sound for new goals exactly when they happen
          const newGoals = match.events.filter(e => e.minute === min && e.type === 'goal');
          if(newGoals.length > 0) SFX.goal();

        }, 100);
        return () => clearInterval(timer);
      }, [match]);

      if (!match) return null;

      const isFinished = localMin === 90;
      const goals1 = events.filter(e => e.type === 'goal' && e.teamId === match.p1.uid).length;
      const goals2 = events.filter(e => e.type === 'goal' && e.teamId === match.p2.uid).length;
      const recentGoal = events.length > 0 && events[0].type === 'goal' && events[0].minute >= localMin - 2;

      return (
        <div className={`glass rounded-2xl flex flex-col h-[500px] overflow-hidden transition-all duration-300 ${recentGoal ? 'animate-shake border-yellow-500 shadow-[0_0_50px_rgba(250,204,21,0.5)]' : 'border-green-800'}`}>
          <div className="bg-gradient-to-b from-black/80 to-transparent p-4 border-b border-white/10 text-center relative">
            <div className="text-yellow-400 font-black text-xs tracking-widest mb-2 flex justify-center items-center gap-2">
              {isFinished ? <><i className="fa-solid fa-flag-checkered"></i> FIM DE JOGO</> : <><i className="fa-solid fa-satellite-dish animate-pulse-fast"></i> {localMin}' MINUTOS</>}
            </div>
            <div className="flex justify-between items-center px-4">
              <div className="flex-1 text-right font-black text-lg truncate text-gray-200">{match.p1.name}</div>
              <div className="mx-4 px-4 py-1 bg-black/60 rounded-xl border border-white/20 flex gap-3 text-3xl font-black">
                <span>{goals1}</span><span className="text-gray-600 text-lg self-center">x</span><span>{goals2}</span>
              </div>
              <div className="flex-1 text-left font-black text-lg truncate text-gray-200">{match.p2.name}</div>
            </div>
          </div>

          <div ref={feedRef} className="flex-1 overflow-y-auto p-4 space-y-2 bg-gradient-to-b from-transparent to-black/50">
            {events.length === 0 && <div className="text-center text-green-500/50 mt-10 font-bold italic animate-pulse">A bola está rolando...</div>}
            {events.map((ev, i) => {
              let bg = 'bg-black/50 border-white/10 text-gray-400';
              let icon = 'fa-info-circle';
              if(ev.type === 'goal') { bg = 'bg-yellow-500 text-black border-yellow-400 font-black text-lg scale-105 my-4 shadow-[0_0_15px_rgba(250,204,21,0.5)]'; icon = 'fa-futbol animate-spin'; }
              else if(ev.type === 'foul') { bg = 'bg-red-900/50 border-red-500 text-red-100'; icon = 'fa-square text-red-500'; }
              else if(ev.type === 'save') { bg = 'bg-blue-900/50 border-blue-500 text-blue-100'; icon = 'fa-hands'; }
              else if(ev.type === 'attack') { bg = 'bg-green-900/50 border-green-500 text-green-100'; icon = 'fa-bolt text-yellow-400'; }

              return (
                <div key={i} className={`p-3 rounded-lg border flex gap-3 items-center animate-slide-up ${bg}`}>
                  <span className="font-black opacity-75 min-w-[30px]">{ev.minute}'</span>
                  <i className={`fa-solid ${icon}`}></i>
                  <span className="leading-tight">{ev.text}</span>
                </div>
              )
            })}
          </div>
        </div>
      );
    };

    // --- APP PRINCIPAL ---
    function App() {
      const [user, setUser] = useState(null);
      const [playerName, setPlayerName] = useState('');
      const [appState, setAppState] = useState('INIT'); // INIT, MENU, LOBBY, DRAFT_SETUP, DRAFTING, TOURNAMENT
      const [roomData, setRoomData] = useState(null);
      const [roomId, setRoomId] = useState('');
      const [error, setError] = useState('');
      
      // Setup Room Config
      const [gameMode, setGameMode] = useState('eliminatoria'); // eliminatoria, liga, x1

      // Draft State Local
      const [myFormation, setMyFormation] = useState('4-3-3');
      const [draftStep, setDraftStep] = useState(0); // 0 a 10 (11 posições)
      const [draftOptions, setDraftOptions] = useState([]);
      const [myTeam, setMyTeam] = useState([]);
      const seenIds = useRef(new Set()); // Memória para não repetir cartas no pack

      useEffect(() => {
        auth.onAuthStateChanged(u => {
          if(!u) auth.signInAnonymously().catch(console.error);
          else setUser(u);
        });
      }, []);

      useEffect(() => {
        if(!user || !roomId || appState === 'INIT' || appState === 'MENU') return;
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const listener = roomRef.on('value', snap => {
          if(snap.exists()) {
            const data = snap.val();
            setRoomData(data);
            
            // State Machine transitions based on DB Status
            if(data.status === 'draft_setup' && appState === 'LOBBY') setAppState('DRAFT_SETUP');
            if(data.status === 'drafting' && appState === 'DRAFT_SETUP') setAppState('DRAFTING');
            if(data.status === 'tournament' && appState !== 'TOURNAMENT') setAppState('TOURNAMENT');
          } else {
            setAppState('MENU');
            setError('Sala foi encerrada.');
          }
        });
        return () => roomRef.off('value', listener);
      }, [user, roomId, appState]);

      const initEngine = async () => {
        await SFX.init();
        SFX.click();
        setAppState('MENU');
      };

      const handleCreateRoom = async () => {
        SFX.click();
        if(!playerName || !roomId) return setError("Preencha Nome e Sala");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(snap.exists()) return setError("Sala já existe");

        await roomRef.set({
          hostUid: user.uid, status: 'lobby', mode: gameMode, stage: 0,
          players: { [user.uid]: { name: playerName, team: [], overall: 0, isReady: false, isBot: false } }
        });
        setAppState('LOBBY');
      };

      const handleJoinRoom = async () => {
        SFX.click();
        if(!playerName || !roomId) return setError("Preencha Nome e Sala");
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const snap = await roomRef.get();
        if(!snap.exists()) return setError("Sala não encontrada");
        const data = snap.val();
        if(data.status !== 'lobby') return setError("O Draft já começou");
        
        await roomRef.update({ [`players/${user.uid}`]: { name: playerName, team: [], overall: 0, isReady: false, isBot: false } });
        setAppState('LOBBY');
      };

      // --- DRAFT LOGIC ---
      const confirmFormation = () => {
        SFX.click();
        setAppState('DRAFTING');
        pullPacks(0); // Puxa pack pro primeiro slot da formação
      };

      const pullPacks = (step) => {
        const requiredPos = FORMATIONS[myFormation][step];
        const pool = PLAYER_DATABASE.filter(p => p.pos === requiredPos && !seenIds.current.has(p.baseId));
        
        // Se a pool secar (muito improvável, mas previne crash), puxa qualquer um que não foi visto
        let options = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
        if(options.length < 3) {
           const genericPool = PLAYER_DATABASE.filter(p => !seenIds.current.has(p.baseId)).sort(() => 0.5 - Math.random());
           options = [...options, ...genericPool.slice(0, 3 - options.length)];
        }

        options.forEach(p => seenIds.current.add(p.baseId));
        setDraftOptions(options);
      };

      const pickPlayer = async (player) => {
        SFX.click();
        const newTeam = [...myTeam, player];
        setMyTeam(newTeam);
        
        if (draftStep < 10) {
          setDraftStep(prev => prev + 1);
          pullPacks(draftStep + 1);
        } else {
          // Terminou o Draft!
          setDraftOptions([]);
          const avgOvr = Math.round(newTeam.reduce((acc, p) => acc + p.overall, 0) / 11);
          await db.ref(`games/${APP_ID}/${roomId}/players/${user.uid}`).update({
            team: newTeam, overall: avgOvr, isReady: true
          });
        }
      };

      // --- MATCH ENGINE & TOURNAMENT MATH ---
      const startTournament = async () => {
        SFX.click();
        const players = Object.entries(roomData.players).map(([uid, p]) => ({uid, ...p}));
        
        let targetSize = roomData.mode === 'x1' ? 2 : players.length > 4 ? 8 : 4;
        let bracketPlayers = [...players];
        
        let b = 0;
        while(bracketPlayers.length < targetSize) {
          bracketPlayers.push({ uid: `bot_${b}`, name: BOT_NAMES[b%4], overall: 70 + Math.floor(Math.random()*15), isBot: true });
          b++;
        }
        bracketPlayers.sort(() => 0.5 - Math.random());

        if (roomData.mode === 'pontos_corridos') {
          // Round Robin Gen (Simples)
          let matches = [];
          for(let i=0; i<bracketPlayers.length; i++) {
            for(let j=i+1; j<bracketPlayers.length; j++) {
              matches.push({ p1: bracketPlayers[i], p2: bracketPlayers[j], played: false, events: [] });
            }
          }
          matches.sort(() => 0.5 - Math.random()); // Mistura as rodadas
          
          let table = {};
          bracketPlayers.forEach(p => table[p.uid] = { name: p.name, pts:0, w:0, d:0, l:0, gf:0, ga:0, gd:0 });

          await db.ref(`games/${APP_ID}/${roomId}`).update({ status: 'tournament', mode: 'pontos_corridos', matches, table, currentMatchIndex: 0 });
        } else {
          // Eliminatoria / X1
          let matches = [];
          for(let i=0; i<targetSize; i+=2) {
             matches.push({ p1: bracketPlayers[i], p2: bracketPlayers[i+1], played: false, events: [] });
          }
          let stageName = targetSize === 8 ? 'quarters' : targetSize === 4 ? 'semis' : 'final';
          await db.ref(`games/${APP_ID}/${roomId}`).update({ status: 'tournament', stage: targetSize === 8 ? 1 : targetSize === 4 ? 2 : 3, [`bracket/${stageName}`]: matches });
        }
      };

      const simulateMatches = async () => {
        SFX.click();
        
        // Simulação Híbrida: O Host roda a matemática instantaneamente e joga pro banco.
        // Os clientes leem os eventos usando o startTime para animar suavemente (Playback).
        const startTime = Date.now() + 1000;
        
        let matchesToSim = [];
        let dbPath = '';

        if(roomData.mode === 'pontos_corridos') {
           // Simula apenas 1 partida por vez no painel principal
           matchesToSim = [roomData.matches[roomData.currentMatchIndex]];
           dbPath = `matches/${roomData.currentMatchIndex}`;
        } else {
           const stageKey = roomData.stage === 1 ? 'quarters' : roomData.stage === 2 ? 'semis' : 'final';
           matchesToSim = roomData.bracket[stageKey];
           dbPath = `bracket/${stageKey}`;
        }

        const simulatedMatches = matchesToSim.map(match => {
           let events = [];
           let s1=0, s2=0;
           
           // Fator Zebra Extremo (Variância Oculta de Jogo da Vida)
           const ovr1 = match.p1.overall + (Math.random() * 40 - 20); // -20 a +20
           const ovr2 = match.p2.overall + (Math.random() * 40 - 20);
           const prob1 = Math.max(0.2, Math.min(0.8, ovr1 / (ovr1 + ovr2))); // Nunca < 20%

           // Simulador de 90 Minutos Físicos
           for(let min=1; min<=90; min++) {
             if(Math.random() < 0.12) { // 12% chance de evento narrativo por min
               const isP1 = Math.random() < prob1;
               const att = isP1 ? match.p1 : match.p2;
               const def = isP1 ? match.p2 : match.p1;
               
               const roll = Math.random();
               if(roll < 0.25) {
                 s1 += isP1 ? 1 : 0; s2 += isP1 ? 0 : 1;
                 events.push({ minute: min, type: 'goal', teamId: att.uid, text: `GOLAÇO! ${att.name} balança a rede após bela jogada!` });
               } else if(roll < 0.6) {
                 events.push({ minute: min, type: 'save', teamId: def.uid, text: `ESPETACULAR! Goleiro do ${def.name} salva o time.` });
               } else if(roll < 0.75) {
                 events.push({ minute: min, type: 'foul', teamId: def.uid, text: `CARTÃO AMARELO para zagueiro do ${def.name}.` });
               } else {
                 events.push({ minute: min, type: 'attack', teamId: att.uid, text: `UHHH! Atacante do ${att.name} chuta tirando tinta da trave!` });
               }
             }
           }

           if (roomData.mode !== 'pontos_corridos' && s1 === s2) {
             events.push({ minute: 90, type: 'info', text: 'Empate! Decisão nos Pênaltis...' });
             if(Math.random() > 0.5) { s1++; events.push({ minute: 90, type: 'goal', teamId: match.p1.uid, text: `${match.p1.name} vence nos pênaltis!` }); }
             else { s2++; events.push({ minute: 90, type: 'goal', teamId: match.p2.uid, text: `${match.p2.name} vence nos pênaltis!` }); }
           }
           
           events.push({ minute: 90, type: 'info', text: 'Fim de Jogo.' });
           return { ...match, startTime, played: true, events, s1, s2, winner: s1>s2 ? match.p1 : s1<s2 ? match.p2 : null };
        });

        if (roomData.mode === 'pontos_corridos') {
          await db.ref(`games/${APP_ID}/${roomId}/${dbPath}`).set(simulatedMatches[0]);
          
          // Calcular nova tabela ao final dos 30s
          setTimeout(async () => {
             const m = simulatedMatches[0];
             const snap = await db.ref(`games/${APP_ID}/${roomId}/table`).get();
             let table = snap.val();
             
             table[m.p1.uid].gf += m.s1; table[m.p1.uid].ga += m.s2; table[m.p1.uid].gd = table[m.p1.uid].gf - table[m.p1.uid].ga;
             table[m.p2.uid].gf += m.s2; table[m.p2.uid].ga += m.s1; table[m.p2.uid].gd = table[m.p2.uid].gf - table[m.p2.uid].ga;
             
             if(m.s1 > m.s2) { table[m.p1.uid].w++; table[m.p1.uid].pts+=3; table[m.p2.uid].l++; }
             else if(m.s1 < m.s2) { table[m.p2.uid].w++; table[m.p2.uid].pts+=3; table[m.p1.uid].l++; }
             else { table[m.p1.uid].d++; table[m.p1.uid].pts+=1; table[m.p2.uid].d++; table[m.p2.uid].pts+=1; }
             
             await db.ref(`games/${APP_ID}/${roomId}`).update({ table, currentMatchIndex: roomData.currentMatchIndex + 1 });
          }, 32000);

        } else {
          await db.ref(`games/${APP_ID}/${roomId}/${dbPath}`).set(simulatedMatches);
          // Gerar próxima fase da copa
          setTimeout(async () => {
             const nextStage = roomData.stage === 1 ? 'semis' : roomData.stage === 2 ? 'final' : 'campeao';
             if (nextStage !== 'campeao') {
               let nextMatches = [];
               for(let i=0; i<simulatedMatches.length; i+=2) {
                 nextMatches.push({ p1: simulatedMatches[i].winner, p2: simulatedMatches[i+1].winner, played: false, events: [] });
               }
               await db.ref(`games/${APP_ID}/${roomId}`).update({ [`bracket/${nextStage}`]: nextMatches, stage: roomData.stage + 1 });
             } else {
               await db.ref(`games/${APP_ID}/${roomId}`).update({ stage: 4 });
             }
          }, 32000);
        }
      };

      // --- RENDERIZADORES ---
      if (appState === 'INIT') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-black">
            <button onClick={initEngine} className="glass p-10 rounded-3xl flex flex-col items-center hover:scale-105 transition-all shadow-[0_0_50px_rgba(250,204,21,0.2)]">
              <i className="fa-solid fa-power-off text-6xl text-yellow-500 mb-6 animate-pulse"></i>
              <h1 className="text-4xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600">INICIALIZAR ENGINE GOTY</h1>
              <p className="text-gray-400 mt-2 font-bold uppercase tracking-widest text-xs">Habilita WebAudio e Aceleração GPU</p>
            </button>
          </div>
        );
      }

      if (appState === 'MENU') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-green-950">
            <div className="glass p-8 rounded-3xl w-full max-w-md shadow-2xl animate-slide-up border border-green-500/30">
              <div className="text-center mb-8">
                <i className="fa-solid fa-trophy text-6xl text-yellow-400 drop-shadow-[0_0_20px_rgba(250,204,21,0.5)] mb-4"></i>
                <h1 className="text-4xl font-black italic tracking-tighter">DRAFT KINGS</h1>
                <p className="text-green-400 font-bold text-xs tracking-widest uppercase">Football Simulator</p>
              </div>
              <div className="space-y-4">
                <input className="w-full p-4 bg-black/40 rounded-xl text-white outline-none border border-green-800 focus:border-green-400 transition" placeholder="Nome do Treinador" value={playerName} onChange={e=>setPlayerName(e.target.value)} />
                <div className="flex gap-2">
                  <input className="w-2/3 p-4 bg-black/40 rounded-xl text-white outline-none border border-green-800 uppercase focus:border-green-400 transition" placeholder="CÓDIGO SALA" value={roomId} onChange={e=>setRoomId(e.target.value.toUpperCase())} />
                  <select className="w-1/3 p-4 bg-black/40 rounded-xl text-xs font-bold text-gray-300 outline-none border border-green-800" value={gameMode} onChange={e=>setGameMode(e.target.value)}>
                    <option value="eliminatoria">Copa</option>
                    <option value="pontos_corridos">Liga</option>
                    <option value="x1">X1 Online</option>
                  </select>
                </div>
                {error && <div className="text-red-400 font-bold text-sm text-center bg-red-900/20 p-2 rounded">{error}</div>}
                <div className="pt-4 space-y-3">
                  <button onClick={handleCreateRoom} className="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-black py-4 rounded-xl shadow-lg hover:scale-[1.02] transition"><i className="fa-solid fa-crown mr-2"></i> CRIAR SALA</button>
                  <button onClick={handleJoinRoom} className="w-full border-2 border-green-600 text-green-400 hover:bg-green-600/10 font-black py-4 rounded-xl transition"><i className="fa-solid fa-right-to-bracket mr-2"></i> ENTRAR</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (appState === 'LOBBY') {
        const isHost = roomData?.hostUid === user.uid;
        return (
          <div className="min-h-screen p-6 bg-green-950 flex flex-col items-center justify-center">
            <div className="glass p-8 rounded-3xl w-full max-w-4xl shadow-2xl animate-slide-up">
              <div className="flex justify-between items-center border-b border-green-800 pb-4 mb-8">
                <h2 className="text-3xl font-black">SALA <span className="text-yellow-400">{roomId}</span></h2>
                <span className="bg-green-900 px-4 py-1 rounded-full text-sm font-bold uppercase border border-green-600">Modo: {roomData?.mode}</span>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                {Object.entries(roomData?.players||{}).map(([uid, p]) => (
                  <div key={uid} className="bg-black/30 p-4 rounded-xl border border-green-800/50 flex flex-col items-center gap-2">
                    <div className="w-12 h-12 bg-green-900 rounded-full flex items-center justify-center shadow-inner text-xl">
                      {uid === roomData.hostUid ? <i className="fa-solid fa-crown text-yellow-400"></i> : <i className="fa-solid fa-user text-green-400"></i>}
                    </div>
                    <span className="font-bold truncate w-full text-center">{p.name}</span>
                  </div>
                ))}
              </div>
              <div className="text-center">
                {isHost ? (
                  <button onClick={()=>db.ref(`games/${APP_ID}/${roomId}`).update({status:'draft_setup'})} className="bg-yellow-500 text-black font-black px-12 py-4 rounded-full text-lg shadow-[0_0_20px_rgba(250,204,21,0.4)] hover:scale-105 transition">IR PARA PRANCHETA</button>
                ) : (
                  <div className="text-yellow-400 font-bold animate-pulse"><i className="fa-solid fa-spinner fa-spin mr-2"></i> Host configurando a sala...</div>
                )}
              </div>
            </div>
          </div>
        )
      }

      if (appState === 'DRAFT_SETUP') {
        return (
          <div className="min-h-screen bg-pitch p-6 flex flex-col items-center justify-center pitch-bg">
            <div className="glass p-10 rounded-3xl w-full max-w-xl text-center shadow-2xl border border-green-500">
              <i className="fa-solid fa-chess-board text-6xl text-green-400 mb-6"></i>
              <h1 className="text-4xl font-black mb-2">Prancheta Tática</h1>
              <p className="text-gray-400 mb-8">Escolha como seu time vai jogar. As cartas que você tirar no pack dependem da sua formação.</p>
              
              <div className="grid grid-cols-2 gap-4 mb-8">
                {Object.keys(FORMATIONS).map(form => (
                  <button key={form} onClick={()=>setMyFormation(form)} className={`py-4 rounded-xl font-black text-2xl border-2 transition ${myFormation === form ? 'bg-green-600 border-green-400 shadow-[0_0_15px_rgba(74,222,128,0.5)]' : 'bg-black/50 border-green-900 text-gray-500 hover:border-green-700'}`}>
                    {form}
                  </button>
                ))}
              </div>
              <button onClick={confirmFormation} className="w-full bg-yellow-500 text-black font-black py-4 rounded-xl text-xl shadow-lg hover:scale-105 transition"><i className="fa-solid fa-check mr-2"></i> CONFIRMAR E ABRIR PACKS</button>
            </div>
          </div>
        )
      }

      if (appState === 'DRAFTING') {
        const currentReqPos = FORMATIONS[myFormation][draftStep];
        const isFinished = draftStep >= 11;
        const myPlayerStatus = roomData?.players?.[user.uid];
        const allReady = Object.values(roomData?.players||{}).every(p => p.isReady);

        return (
          <div className="min-h-screen bg-green-950 flex flex-col lg:flex-row overflow-hidden">
             {/* Esquerda: O Campo */}
             <div className="w-full lg:w-1/3 pitch-bg border-r border-green-800 p-6 flex flex-col">
               <h2 className="text-xl font-black mb-4 flex items-center justify-between">
                 <span><i className="fa-solid fa-shield text-yellow-400"></i> Seu Esquadrão</span>
                 <span className="text-xs bg-black/50 px-2 py-1 rounded text-green-400">{myFormation}</span>
               </h2>
               <div className="flex-1 overflow-y-auto space-y-2 pr-2">
                 {FORMATIONS[myFormation].map((pos, i) => {
                   const p = myTeam[i];
                   const isActive = i === draftStep;
                   return (
                     <div key={i} className={`flex justify-between items-center p-3 rounded-lg border-2 transition-all ${isActive ? 'bg-green-800/80 border-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.5)] scale-105' : p ? 'bg-black/40 border-green-800' : 'bg-black/20 border-dashed border-gray-700 opacity-50'}`}>
                       <div className="flex items-center gap-3">
                         <span className={`w-10 text-center font-black text-xs px-1 py-1 rounded ${isActive ? 'bg-yellow-500 text-black' : 'bg-black/50'}`}>{pos}</span>
                         <span className="font-bold text-sm">{p ? p.name : 'Aguardando...'}</span>
                       </div>
                       {p && <i className="fa-solid fa-check text-green-500"></i>}
                     </div>
                   )
                 })}
               </div>
             </div>

             {/* Direita: Pack Opening */}
             <div className="flex-1 flex items-center justify-center p-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] relative">
                <div className="absolute inset-0 bg-gradient-to-t from-black to-transparent z-0"></div>
                
                {!isFinished ? (
                  <div className="z-10 text-center w-full max-w-4xl animate-slide-up">
                    <div className="mb-12">
                      <span className="bg-yellow-500 text-black font-black px-4 py-1 rounded-full text-xs tracking-widest uppercase shadow-lg">RODADA {draftStep+1}/11</span>
                      <h1 className="text-4xl font-black mt-4">Procurando <span className="text-green-400 underline decoration-yellow-500">{currentReqPos}</span></h1>
                      <p className="text-gray-400 mt-2 text-sm">Escolha 1 carta para alocar na posição ativa.</p>
                    </div>
                    <div className="flex justify-center gap-6 md:gap-12 flex-wrap">
                      {draftOptions.map(p => <PlayerCard key={p.id} player={p} onClick={pickPlayer} />)}
                    </div>
                  </div>
                ) : (
                  <div className="z-10 text-center glass p-12 rounded-3xl border border-green-500 animate-slide-up">
                    <i className="fa-solid fa-trophy text-8xl text-yellow-400 drop-shadow-[0_0_30px_rgba(250,204,21,0.6)] mb-6"></i>
                    <h2 className="text-4xl font-black mb-2">Equipe Fechada!</h2>
                    <p className="text-2xl text-green-400 font-bold mb-8">Overall Final: <span className="text-white">{myPlayerStatus?.overall}</span></p>
                    
                    <div className="bg-black/50 p-4 rounded-xl text-left mb-6 max-h-40 overflow-y-auto">
                      {Object.values(roomData?.players||{}).map((p,i) => (
                        <div key={i} className="flex justify-between items-center py-1 border-b border-white/5 last:border-0">
                          <span>{p.name}</span>
                          {p.isReady ? <i className="fa-solid fa-check text-green-500"></i> : <i className="fa-solid fa-spinner fa-spin text-yellow-500"></i>}
                        </div>
                      ))}
                    </div>

                    {isHost && allReady ? (
                      <button onClick={startTournament} className="w-full bg-yellow-500 text-black font-black py-4 rounded-xl text-xl shadow-[0_0_20px_rgba(250,204,21,0.4)] hover:scale-105 transition">IR PARA O CAMPEONATO</button>
                    ) : isHost ? (
                      <p className="text-sm text-gray-500 italic">Aguardando todos terminarem o draft...</p>
                    ) : (
                      <p className="text-yellow-400 font-bold animate-pulse">Aguardando o Host iniciar...</p>
                    )}
                  </div>
                )}
             </div>
          </div>
        )
      }

      if (appState === 'TOURNAMENT') {
        const isHost = roomData?.hostUid === user.uid;
        
        // Renderizador da Liga (Pontos Corridos)
        if (roomData.mode === 'pontos_corridos') {
          const tableArr = Object.entries(roomData.table||{}).map(([uid, d]) => ({uid, ...d})).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
          const currentMatch = roomData.matches?.[roomData.currentMatchIndex];
          const isLeagueOver = roomData.currentMatchIndex >= roomData.matches?.length;

          return (
            <div className="min-h-screen bg-green-950 p-4 md:p-8 text-white">
               <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                  {/* Classificação */}
                  <div className="lg:col-span-1 glass rounded-2xl p-6 h-fit border border-green-800">
                    <h3 className="font-black text-xl mb-4 text-yellow-400 uppercase tracking-widest border-b border-green-800 pb-2">Tabela</h3>
                    <div className="space-y-1">
                      <div className="flex text-xs text-gray-500 font-bold uppercase px-2 mb-2"><span className="flex-1">Time</span><span className="w-6 text-center">P</span><span className="w-6 text-center">V</span><span className="w-6 text-center">SG</span></div>
                      {tableArr.map((row, i) => (
                        <div key={i} className={`flex items-center text-sm font-bold px-2 py-2 rounded ${i===0 ? 'bg-yellow-500/20 text-yellow-400' : 'bg-black/30'}`}>
                          <span className="w-4 text-gray-500">{i+1}</span>
                          <span className="flex-1 truncate">{row.name}</span>
                          <span className="w-6 text-center">{row.pts}</span>
                          <span className="w-6 text-center text-gray-400">{row.w}</span>
                          <span className="w-6 text-center text-gray-400">{row.gd}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Tela de Partida */}
                  <div className="lg:col-span-2 flex flex-col">
                     <div className="flex justify-between items-center mb-6 glass p-4 rounded-xl border border-green-800">
                       <h2 className="text-xl font-black"><i className="fa-solid fa-tv text-green-400 mr-2"></i> Rodada {roomData.currentMatchIndex+1} de {roomData.matches?.length}</h2>
                       {isHost && !isLeagueOver && (!currentMatch?.played) && (
                         <button onClick={simulateMatches} className="bg-red-600 px-6 py-2 rounded font-black hover:bg-red-500 transition shadow-[0_0_15px_rgba(220,38,38,0.5)]">INICIAR PARTIDA</button>
                       )}
                     </div>

                     {isLeagueOver ? (
                       <div className="text-center glass p-12 rounded-3xl border border-yellow-500 flex-1 flex flex-col items-center justify-center">
                         <i className="fa-solid fa-trophy text-[120px] text-yellow-400 mb-8 drop-shadow-[0_0_50px_rgba(250,204,21,0.6)] animate-float"></i>
                         <h1 className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600">{tableArr[0].name}</h1>
                         <p className="text-2xl font-bold uppercase tracking-widest mt-4 text-gray-300">É o Campeão Brasileiro!</p>
                       </div>
                     ) : (
                       <MatchViewer match={currentMatch} />
                     )}
                  </div>
               </div>
            </div>
          )
        }

        // Renderizador Eliminatoria / X1
        const stageKey = roomData.stage === 1 ? 'quarters' : roomData.stage === 2 ? 'semis' : 'final';
        const activeMatches = roomData.bracket[stageKey] || [];
        const myMatch = activeMatches.find(m => m.p1.uid === user.uid || m.p2.uid === user.uid);

        return (
          <div className="min-h-screen bg-green-950 p-4 md:p-8 text-white">
            <div className="max-w-6xl mx-auto">
              <div className="flex justify-between items-center mb-8 glass p-4 rounded-xl border border-green-800">
                <h1 className="text-2xl font-black text-yellow-400 flex items-center gap-2 uppercase tracking-widest"><i className="fa-solid fa-sitemap"></i> FASE: {stageKey}</h1>
                {isHost && roomData.stage < 4 && !activeMatches[0]?.played && (
                  <button onClick={simulateMatches} className="bg-red-600 hover:bg-red-500 text-white font-black py-2 px-8 rounded shadow-[0_0_20px_rgba(220,38,38,0.4)] animate-pulse">INICIAR RODADA</button>
                )}
              </div>

              {roomData.stage === 4 ? (
                <div className="text-center mt-20">
                  <i className="fa-solid fa-crown text-[100px] text-yellow-400 block animate-bounce drop-shadow-[0_0_40px_rgba(250,204,21,0.6)]"></i>
                  <h1 className="text-6xl font-black text-yellow-400 mt-6">{roomData.bracket.final[0].winner.name} CAMPEÃO!</h1>
                </div>
              ) : (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                  <div className="lg:col-span-2">
                    {myMatch ? <MatchViewer match={myMatch} /> : activeMatches[0] ? <MatchViewer match={activeMatches[0]} /> : null}
                  </div>
                  <div>
                    <h3 className="text-green-400 font-bold mb-4 uppercase text-xs tracking-widest">Placares (Spoilers Ocultos)</h3>
                    <div className="space-y-4">
                      {activeMatches.map((m, i) => {
                         // Lógica de Anti-Spoiler: O placar só revela se o tempo de jogo passou de 30s.
                         const isMatchOver = m.played && (Date.now() - m.startTime > 30000);
                         return (
                          <div key={i} className="glass p-3 rounded-lg border border-green-800 flex flex-col justify-center shadow-lg relative overflow-hidden">
                            {isMatchOver && m.winner.uid === m.p1.uid && <div className="absolute top-0 left-0 w-1 h-full bg-yellow-500"></div>}
                            <div className="flex justify-between items-center mb-1">
                              <span className={`font-semibold text-sm ${isMatchOver && m.winner.uid===m.p1.uid ? 'text-yellow-400' : ''}`}>{m.p1.name}</span>
                              <span className="font-black bg-black/50 px-2 rounded text-lg">{isMatchOver ? m.s1 : '-'}</span>
                            </div>
                            {isMatchOver && m.winner.uid === m.p2.uid && <div className="absolute top-0 left-0 w-1 h-full bg-yellow-500"></div>}
                            <div className="flex justify-between items-center">
                              <span className={`font-semibold text-sm ${isMatchOver && m.winner.uid===m.p2.uid ? 'text-yellow-400' : ''}`}>{m.p2.name}</span>
                              <span className="font-black bg-black/50 px-2 rounded text-lg">{isMatchOver ? m.s2 : '-'}</span>
                            </div>
                          </div>
                         )
                      })}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
