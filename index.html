        if(SFX.ready) return;
        await Tone.start();
        SFX.synth = new Tone.PolySynth(Tone.Synth).toDestination();
        SFX.synth.volume.value = -8;
        SFX.kick = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 10, oscillator: { type: "sine" } }).toDestination();
        SFX.kick.volume.value = 6;
        const filter = new Tone.Filter(1000, "lowpass").toDestination();
        SFX.noise = new Tone.NoiseSynth({ noise: { type: "brown" }, envelope: { attack: 0.5, decay: 0.1, sustain: 1, release: 2 } }).connect(filter);
        SFX.noise.volume.value = -15;
        SFX.ready = true;
      },
      click: () => SFX.ready && SFX.synth.triggerAttackRelease(["C4"], "32n"),
      pick: () => SFX.ready && SFX.synth.triggerAttackRelease(["E4", "G4"], "16n"),
      walkout: () => {
        if(!SFX.ready) return;
        SFX.kick.triggerAttackRelease("C1", "1n");
        SFX.synth.triggerAttackRelease(["C3", "G3", "C4"], "1n");

    const MatchViewer = ({ match }) => {
      const [localMin, setLocalMin] = useState(0);
      const [events, setEvents] = useState([]);
      const [s1, setS1] = useState(0);
      const [s2, setS2] = useState(0);
      const [momentum, setMomentum] = useState(50);
      const [shake, setShake] = useState(false);

      useEffect(() => {
        if (!match || !match.played) return;
        if(Date.now() - match.startTime < 1000) SFX.whistle();

        const msPerMin = 333; 
        const timer = setInterval(() => {
          const elapsed = Date.now() - match.startTime;
          let min = Math.floor(elapsed / msPerMin);
          if (min > 90) { min = 90; clearInterval(timer); }
          setLocalMin(min);

          const currentEvents = match.events.filter(e => e.minute <= min);
          setEvents(currentEvents.reverse()); 

          const goals1 = currentEvents.filter(e => e.type === 'goal' && e.teamId === match.p1.uid).length;
          const goals2 = currentEvents.filter(e => e.type === 'goal' && e.teamId === match.p2.uid).length;
          
          if (goals1 > s1 || goals2 > s2) {
            SFX.goal();
            setShake(true);
            setTimeout(() => setShake(false), 500);
          }
          setS1(goals1); setS2(goals2);

          if (min < 90 && min % 3 === 0) {
            const lastMom = match.momentumData?.find(m => m.min <= min);
            let targetMom = lastMom ? lastMom.val : 50 + (Math.random() * 20 - 10);
            setMomentum(targetMom);
          }
        }, 100);
        return () => clearInterval(timer);
      }, [match]);

      if (!match) return null;
      const isFinished = localMin === 90;

      return (
        <div className={`glass rounded-2xl flex flex-col h-[600px] overflow-hidden transition-all duration-300 ${shake ? 'animate-shake border-yellow-500 shadow-[0_0_50px_rgba(250,204,21,0.5)]' : 'border-green-800'}`}>
          <div className={`p-4 border-b border-white/10 text-center relative transition-colors duration-500 ${shake ? 'bg-yellow-600 text-black' : 'bg-gradient-to-b from-black/80 to-transparent'}`}>
            <div className={`font-black text-xs tracking-widest mb-2 flex justify-center items-center gap-2 ${shake ? 'text-black' : 'text-yellow-400'}`}>
              {isFinished ? <><i className="fa-solid fa-flag-checkered"></i> FIM DE JOGO</> : <><i className="fa-solid fa-satellite-dish animate-pulse"></i> {localMin}' MINUTOS</>}
            </div>
            <div className="flex justify-between items-center px-2 md:px-8 relative z-10">
              <div className="flex-1 text-right font-black text-xl md:text-3xl truncate drop-shadow-lg">{match.p1.name}</div>
              <div className="mx-4 px-6 py-2 bg-black/80 rounded-xl border border-white/20 flex gap-4 text-4xl font-black text-white shadow-inner">
                <span>{s1}</span><span className="text-gray-600 text-2xl self-center">x</span><span>{s2}</span>
              </div>
              <div className="flex-1 text-left font-black text-xl md:text-3xl truncate drop-shadow-lg">{match.p2.name}</div>
            </div>
            
            <div className="absolute bottom-0 left-0 w-full h-2 bg-gray-900 overflow-hidden flex">
              <div className="h-full bg-blue-500 momentum-bar relative" style={{width: `${100 - momentum}%`}}>
                <div className="absolute right-0 top-0 w-10 h-full bg-gradient-to-l from-white/50 to-transparent"></div>
              </div>
              <div className="h-full bg-red-500 momentum-bar relative" style={{width: `${momentum}%`}}>
                 <div className="absolute left-0 top-0 w-10 h-full bg-gradient-to-r from-white/50 to-transparent"></div>
              </div>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-gradient-to-b from-black/20 to-black/80">
            {events.length === 0 && <div className="text-center text-green-500/50 mt-20 font-bold text-xl animate-pulse">A bola rola e o cronômetro dispara...</div>}
            {events.map((ev, i) => {
              let bg = 'bg-black/50 border-green-900/50 text-gray-300';
              let icon = 'fa-shoe-prints text-green-600';
              if(ev.type === 'goal') { bg = 'bg-yellow-500 text-black border-yellow-400 font-black text-xl scale-[1.02] shadow-[0_0_20px_rgba(250,204,21,0.4)]'; icon = 'fa-futbol animate-bounce'; }
              else if(ev.type === 'foul') { bg = 'bg-red-950/80 border-red-700 text-red-100 font-bold'; icon = 'fa-square text-red-500'; }
              else if(ev.type === 'save') { bg = 'bg-blue-950/80 border-blue-700 text-blue-100 font-bold'; icon = 'fa-hands text-blue-400'; }
              else if(ev.type === 'attack') { bg = 'bg-green-900/80 border-green-500 text-green-50 font-bold'; icon = 'fa-fire text-orange-500'; }
              else if(ev.type === 'info') { bg = 'bg-gray-800 border-gray-600 text-white font-black text-center justify-center'; icon = 'fa-info-circle text-gray-400'; }

              return (
                <div key={i} className={`p-4 rounded-xl border-2 flex gap-4 items-center animate-slide-up ${bg}`}>
                  {ev.type !== 'info' && <span className="font-black opacity-60 min-w-[35px] text-right">{ev.minute}'</span>}
                  <i className={`fa-solid ${icon} text-xl`}></i>
                  <span className="leading-tight flex-1">{ev.text}</span>
                </div>
              )
            })}
          </div>
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [playerName, setPlayerName] = useState('');
      const [appState, setAppState] = useState('INIT');
      const [roomData, setRoomData] = useState(null);
      const [roomId, setRoomId] = useState('');
      const [gameMode, setGameMode] = useState('knockout'); 
      const [error, setError] = useState('');
      
      const [myFormation, setMyFormation] = useState('4-3-3');
      const [draftOptions, setDraftOptions] = useState([]);
      const [myTeam, setMyTeam] = useState([]);
      const [walkoutPlayer, setWalkoutPlayer] = useState(null);
      const [tactic, setTactic] = useState('Equilibrado');
      
      // Armazena IDs que o jogador atual já viu
      const seenIds = useRef(new Set()); 

      useEffect(() => {
        auth.signInAnonymously().catch(err => {
          console.error("Auth Fail:", err);
          setError("Falha ao autenticar. Verifique a conexão.");
          setIsAuthLoading(false);
        });
        
        const unsub = auth.onAuthStateChanged(u => {
          setUser(u);
          setIsAuthLoading(false);
        });
        return () => unsub();
      }, []);

      useEffect(() => {
        if(!user || !roomId || appState === 'INIT' || appState === 'MENU') return;
        const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
        const listener = roomRef.on('value', snap => {
          if(snap.exists()) {
            const data = snap.val();
            setRoomData(data);
            
            // Sync Engine State
            if(data.status === 'draft_setup' && appState === 'LOBBY') setAppState('DRAFT_SETUP');
            if(data.status === 'drafting' && appState === 'DRAFT_SETUP') setAppState('DRAFTING');
            if(data.status === 'tactics' && appState === 'DRAFTING') setAppState('TACTICS');
            if(data.status === 'tournament' && appState !== 'TOURNAMENT') setAppState('TOURNAMENT');
          } else {
            setAppState('MENU');
            setError('A sala foi encerrada.');
          }
        });
        return () => roomRef.off('value', listener);
      }, [user, roomId, appState]);

      const initEngine = async () => {
        await SFX.init();
        SFX.click();
        setAppState('MENU');
      };

      const handleCreateRoom = async () => {
        SFX.click();
        if(!user) return setError("Erro de Autenticação. Recarregue a página.");
        if(!playerName || !roomId) return setError("Preencha Nome e Sala.");
        
        try {
          const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
          const snap = await roomRef.get();
          if(snap.exists()) return setError("Sala já existe. Escolha outro código.");

          await roomRef.set({
            hostUid: user.uid, 
            status: 'lobby', 
            stage: 0, 
            mode: gameMode,
            players: { 
              [user.uid]: { name: playerName, overall: 0, isReady: false, isBot: false, tactic: 'Equilibrado' } 
            }
          });
          setAppState('LOBBY');
          setError('');
        } catch (e) {
          console.error(e);
          setError("Erro ao criar sala. Verifique regras do Firebase.");
        }
      };

      const handleJoinRoom = async () => {
        SFX.click();
        if(!user) return setError("Erro de Autenticação. Recarregue a página.");
        if(!playerName || !roomId) return setError("Preencha Nome e Sala.");
        
        try {
          const roomRef = db.ref(`games/${APP_ID}/${roomId}`);
          const snap = await roomRef.get();
          if(!snap.exists()) return setError("Sala não encontrada.");
          const data = snap.val();
          if(data.status !== 'lobby') return setError("A partida já começou.");
          
          await roomRef.update({ 
            [`players/${user.uid}`]: { name: playerName, overall: 0, isReady: false, isBot: false, tactic: 'Equilibrado' } 
          });
          setAppState('LOBBY');
          setError('');
        } catch (e) {
          console.error(e);
          setError("Erro ao entrar na sala.");
        }
      };

      const generatePacks = (currentTeam) => {
        if (currentTeam.length >= 11) {
           setDraftOptions([]);
           return;
        }
        
        const requiredPos = FORMATIONS[myFormation][currentTeam.length];
        
        // Culling (Filtra jogadores corretos e que ainda não apareceram)
        let pool = PLAYER_DATABASE.filter(p => p.pos === requiredPos && !seenIds.current.has(p.baseId));
        
        // Procedural Fallback System (Se a database estourar, a engine gera bagres automaticamente para salvar o jogo)
        if (pool.length < 3) {
           const fallbacks = ["Promessa da Base", "Veterano Cansado", "Reforço Desconhecido"];
           while(pool.length < 3) {
             const fakeId = `gen_${Date.now()}_${pool.length}`;
             pool.push({
               id: fakeId, baseId: fakeId, name: fallbacks[pool.length % 3], 
               year: 2024, team: 'Agente Livre', overall: 65 + Math.floor(Math.random()*15), pos: requiredPos
             });
           }
        }
        
        let options = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
        options.forEach(p => seenIds.current.add(p.baseId));
        setDraftOptions(options);
      };

      const startDrafting = () => {
        SFX.click();
        setAppState('DRAFTING');
        generatePacks([]); 
      };

      const pickPlayer = async (player) => {
        if (myTeam.length >= 11) return; // Trava de segurança
        
        if (player.overall >= 93) {
          SFX.walkout();
          setWalkoutPlayer(player);
          setTimeout(() => setWalkoutPlayer(null), 3000);
        } else {
          SFX.pick();
        }
        
        const newTeam = [...myTeam, player];
        setMyTeam(newTeam); // Async React
        
        // Passamos newTeam DIRETAMENTE para não depender do delay do React
        if (newTeam.length < 11) {
          generatePacks(newTeam); 
        } else {
          // TIME FECHADO!
          setDraftOptions([]); 
          const baseOvr = newTeam.reduce((acc, p) => acc + p.overall, 0) / 11;
          const finalOvr = Math.min(99, Math.round(baseOvr));
          
          try {
            await db.ref(`games/${APP_ID}/${roomId}/players/${user.uid}`).update({
              overall: finalOvr, isReady: true
            });
          } catch(e) { console.error("Save error", e); }
        }
      };

      const confirmTactic = async () => {
        SFX.click();
        await db.ref(`games/${APP_ID}/${roomId}/players/${user.uid}`).update({ tactic, isReady: true });
      };

      const createTournamentBracket = async () => {
        SFX.click();
        const players = Object.entries(roomData?.players || {}).map(([uid, p]) => ({uid, ...p}));
        
        let targetSize = 8;
        if (roomData?.mode === '1v1') targetSize = 2;
        else if (players.length <= 4) targetSize = 4;
        
        let bracketPlayers = [...players];
        let b = 0;
        while(bracketPlayers.length < targetSize) {
          bracketPlayers.push({ uid: `bot_${b}`, name: BOT_NAMES[b%BOT_NAMES.length], overall: 75 + Math.floor(Math.random()*15), isBot: true, tactic: 'Equilibrado' });
          b++;
        }
        bracketPlayers.sort(() => 0.5 - Math.random());

        let matches = [];
        for(let i=0; i<targetSize; i+=2) {
           matches.push({ p1: bracketPlayers[i], p2: bracketPlayers[i+1], played: false, events: [] });
        }
        let stageName = targetSize === 8 ? 'quarters' : targetSize === 4 ? 'semis' : 'final';
        
        const updates = { status: 'tournament', stage: targetSize === 8 ? 1 : targetSize === 4 ? 2 : 3, [`bracket/${stageName}`]: matches };
        players.forEach(p => { updates[`players/${p.uid}/isReady`] = false; });
        await db.ref(`games/${APP_ID}/${roomId}`).update(updates);
      };

      const simulateMatches = async () => {
        SFX.click();
        const startTime = Date.now() + 1500; 
        const stageKey = roomData?.stage === 1 ? 'quarters' : roomData?.stage === 2 ? 'semis' : 'final';
        const matchesToSim = roomData?.bracket?.[stageKey] || [];

        if (matchesToSim.length === 0) return;

        const simulatedMatches = matchesToSim.map(match => {
           let events = [];
           let momentumData = [];
           let s1=0, s2=0;
           let currentMom = 50;
           
           const t1 = TACTICS[match.p1.tactic] || TACTICS['Equilibrado'];
           const t2 = TACTICS[match.p2.tactic] || TACTICS['Equilibrado'];

           // Fator Zebra Matemático (Imprevisibilidade)
           const luck1 = (Math.random() * 20 - 10);
           const luck2 = (Math.random() * 20 - 10);
           const ovr1 = (match.p1.overall * t1.atkMod) + luck1; 
           const ovr2 = (match.p2.overall * t2.atkMod) + luck2;
           
           const prob1 = Math.max(0.2, Math.min(0.8, ovr1 / (ovr1 + ovr2)));

           for(let min=1; min<=90; min++) {
             if(min % 5 === 0) {
                currentMom += (Math.random() > prob1 ? 15 : -15);
                currentMom = Math.max(10, Math.min(90, currentMom));
                momentumData.push({min, val: currentMom});
             }

             let actionProb = 0.12; 
             if (currentMom < 30) actionProb = 0.18; 
             if (currentMom > 70) actionProb = 0.18; 

             if(Math.random() < actionProb) { 
               const isP1 = Math.random() < (currentMom < 50 ? 0.7 : 0.3);
               const att = isP1 ? match.p1 : match.p2;
               const def = isP1 ? match.p2 : match.p1;
               
               const roll = Math.random();
               if(roll < 0.20) { 
                 s1 += isP1 ? 1 : 0; s2 += isP1 ? 0 : 1;
                 events.push({ minute: min, type: 'goal', teamId: att.uid, text: `GOLAÇO! ${att.name} balança as redes!` });
                 currentMom = 50;
               } else if(roll < 0.45) {
                 events.push({ minute: min, type: 'save', teamId: def.uid, text: `MILAGRE do goleiro do ${def.name}!` });
               } else if(roll < 0.65) {
                 events.push({ minute: min, type: 'foul', teamId: def.uid, text: `Falta dura da defesa do ${def.name}. Juiz dá o cartão.` });
               } else {
                 events.push({ minute: min, type: 'attack', teamId: att.uid, text: `UHH! O chute de ${att.name} passa raspando a trave.` });
               }
             }
           }

           if (s1 === s2) {
             events.push({ minute: 90, type: 'info', text: 'Tudo igual. Vamos para os pênaltis!' });
             if(Math.random() > 0.5) { s1++; events.push({ minute: 90, type: 'goal', teamId: match.p1.uid, text: `${match.p1.name} VENCE NOS PÊNALTIS!` }); }
             else { s2++; events.push({ minute: 90, type: 'goal', teamId: match.p2.uid, text: `${match.p2.name} VENCE NOS PÊNALTIS!` }); }
           }
           
           events.push({ minute: 90, type: 'info', text: 'Apita o árbitro! Fim de papo.' });
           return { ...match, startTime, played: true, events, momentumData, s1, s2, winner: s1>s2 ? match.p1 : match.p2 };
        });

        await db.ref(`games/${APP_ID}/${roomId}/bracket/${stageKey}`).set(simulatedMatches);
        
        setTimeout(async () => {
           const nextStage = roomData?.stage === 1 ? 'semis' : roomData?.stage === 2 ? 'final' : 'campeao';
           if (nextStage !== 'campeao') {
             let nextMatches = [];
             for(let i=0; i<simulatedMatches.length; i+=2) {
               nextMatches.push({ p1: simulatedMatches[i].winner, p2: simulatedMatches[i+1].winner, played: false, events: [] });
             }
             await db.ref(`games/${APP_ID}/${roomId}`).update({ [`bracket/${nextStage}`]: nextMatches, stage: (roomData?.stage || 1) + 1 });
           } else {
             await db.ref(`games/${APP_ID}/${roomId}`).update({ stage: 4 }); 
           }
        }, 32000); 
      };

      // --- RENDERS DA MÁQUINA DE ESTADO ---
      if (isAuthLoading) return <div className="min-h-screen flex items-center justify-center bg-black text-green-500 font-black text-2xl animate-pulse">Iniciando Engine GOTY...</div>;

      if (appState === 'INIT') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-black">
            <button onClick={initEngine} className="glass p-16 rounded-[3rem] flex flex-col items-center hover:scale-105 transition border-2 border-yellow-500/50">
              <i className="fa-solid fa-power-off text-8xl text-yellow-500 mb-8 animate-pulse"></i>
              <h1 className="text-6xl font-black text-yellow-400">INICIALIZAR ÁUDIO GOTY</h1>
            </button>
          </div>
        );
      }

      if (appState === 'MENU') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-pitch p-4">
            <div className="glass p-10 rounded-3xl w-full max-w-md shadow-2xl border border-green-500/30">
              <div className="text-center mb-10">
                <i className="fa-solid fa-trophy text-7xl text-yellow-400 mb-4 animate-pulse-fast"></i>
                <h1 className="text-5xl font-black text-white">DRAFT KINGS</h1>
              </div>
              <div className="space-y-5">
                <input className="w-full p-4 bg-black/60 rounded-xl text-white outline-none border border-green-900" placeholder="Nome do Treinador" value={playerName} onChange={e=>setPlayerName(e.target.value)} />
                <div className="flex gap-3">
                   <input className="w-full p-4 bg-black/60 rounded-xl text-white outline-none border border-green-900 uppercase" placeholder="SALA" value={roomId} onChange={e=>setRoomId(e.target.value.toUpperCase())} />
                   <select className="p-4 bg-black/60 rounded-xl text-white outline-none border border-green-900" value={gameMode} onChange={e=>setGameMode(e.target.value)}>
                     <option value="knockout">MATA-MATA</option>
                   </select>
                </div>
                {error && <div className="text-red-400 font-black text-center bg-red-900/40 border border-red-500 p-3 rounded-xl">{error}</div>}
                <div className="pt-4 space-y-3">
                  <button onClick={handleCreateRoom} className="w-full bg-yellow-500 text-black font-black py-4 rounded-xl hover:scale-[1.03] transition"><i className="fa-solid fa-crown mr-2"></i> FUNDAR LIGA</button>
                  <button onClick={handleJoinRoom} className="w-full border-2 border-green-600 text-green-400 hover:bg-green-600 hover:text-white font-black py-4 rounded-xl transition"><i className="fa-solid fa-play mr-2"></i> ENTRAR</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // SYNC GATE
      if (!roomData) return <div className="min-h-screen bg-black text-yellow-500 flex justify-center items-center font-black text-2xl">Sincronizando Rede...</div>;

      const isHost = roomData?.hostUid === user?.uid;
      const myPlayerStatus = roomData?.players?.[user?.uid];
      const allReady = roomData?.players && Object.values(roomData.players).every(p => p.isReady);

      if (appState === 'LOBBY') {
        return (
          <div className="min-h-screen p-10 bg-green-950 flex flex-col items-center justify-center">
            <div className="glass p-12 rounded-[2rem] w-full max-w-5xl border border-green-800">
              <h2 className="text-5xl font-black mb-10 text-white">LOBBY <span className="text-yellow-400">{roomId}</span></h2>
              <div className="grid grid-cols-4 gap-6 mb-12">
                {Object.entries(roomData?.players || {}).map(([uid, p]) => (
                  <div key={uid} className="bg-black/50 p-6 rounded-2xl border border-green-700 flex flex-col items-center text-white">
                    <i className={`fa-solid ${uid === roomData.hostUid ? 'fa-crown text-yellow-400' : 'fa-user text-green-400'} text-3xl mb-4`}></i>
                    <span className="font-black text-lg">{p.name}</span>
                  </div>
                ))}
              </div>
              <div className="text-center">
                {isHost ? (
                  <button onClick={()=>db.ref(`games/${APP_ID}/${roomId}`).update({status:'draft_setup'})} className="bg-yellow-500 text-black font-black px-12 py-5 rounded-xl text-2xl">PRANCHETA TÁTICA</button>
                ) : (
                  <div className="text-yellow-400 font-bold text-xl animate-pulse">Aguardando Host...</div>
                )}
              </div>
            </div>
          </div>
        )
      }

      if (appState === 'DRAFT_SETUP') {
        return (
          <div className="min-h-screen bg-pitch p-6 flex flex-col items-center justify-center">
            <div className="glass p-12 rounded-[2rem] w-full max-w-2xl text-center border border-green-600">
              <h1 className="text-5xl font-black mb-4 text-white">Esquema Tático</h1>
              <div className="grid grid-cols-2 gap-4 mb-10">
                {Object.keys(FORMATIONS).map(form => (
                  <button key={form} onClick={()=>{SFX.click(); setMyFormation(form);}} className={`py-6 rounded-2xl font-black text-3xl border-4 ${myFormation === form ? 'bg-green-700 border-green-400 text-white' : 'bg-black/60 border-green-900 text-gray-500'}`}>
                    {form}
                  </button>
                ))}
              </div>
              <button onClick={startDrafting} className="w-full bg-yellow-500 text-black font-black py-5 rounded-xl text-2xl">INICIAR DRAFT</button>
            </div>
          </div>
        )
      }

      if (appState === 'DRAFTING') {
        const isDraftFinished = myTeam.length >= 11;
        const currentReqPos = !isDraftFinished ? FORMATIONS[myFormation][myTeam.length] : null;

        return (
          <div className="min-h-screen bg-green-950 flex font-sans">
             {walkoutPlayer && (
               <div className="fixed inset-0 z-50 bg-black/90 flex items-center justify-center animate-walkout backdrop-blur-md">
                 <div className="scale-150 relative z-10"><PlayerCard player={walkoutPlayer} /></div>
                 <div className="absolute bottom-20 text-yellow-400 font-black text-5xl animate-pulse uppercase">LENDA DRAFTADA!</div>
               </div>
             )}

             <div className="w-[350px] pitch-bg border-r-2 border-green-800 p-6 flex flex-col shadow-2xl relative">
                 <h2 className="text-2xl font-black mb-6 flex justify-between border-b-2 border-green-800 pb-4 text-white">
                   <span>Esquadrão</span> <span className="text-yellow-400">{myFormation}</span>
                 </h2>
                 <div className="flex-1 overflow-y-auto space-y-2">
                   {FORMATIONS[myFormation].map((pos, i) => {
                     const p = myTeam[i];
                     const isActive = i === myTeam.length && !isDraftFinished; 
                     return (
                       <div key={i} className={`flex justify-between items-center p-3 rounded-xl border-2 ${isActive ? 'bg-green-800 border-yellow-400' : p ? 'bg-green-900/40 border-green-700 text-white' : 'bg-black/30 border-dashed border-green-900/50 text-gray-500'}`}>
                         <div className="flex items-center gap-4">
                           <span className={`w-12 text-center font-black text-sm px-1 py-1 rounded ${isActive ? 'bg-yellow-500 text-black' : p ? 'bg-black/60 text-green-400' : 'bg-black/40'}`}>{pos}</span>
                           <span className="font-bold text-sm truncate max-w-[150px]">{p ? p.name : 'Aguardando...'}</span>
                         </div>
                         {p && <i className="fa-solid fa-check text-green-500"></i>}
                       </div>
                     )
                   })}
                 </div>
             </div>

             <div className="flex-1 flex items-center justify-center p-6 pitch-bg relative">
                {!isDraftFinished ? (
                  <div className="text-center w-full max-w-4xl">
                    <div className="mb-14">
                      <span className="bg-yellow-500 text-black font-black px-6 py-2 rounded-full shadow-lg">RODADA {myTeam.length + 1}/11</span>
                      <h1 className="text-6xl font-black mt-6 text-white">Procurando <span className="text-green-400 underline decoration-yellow-500">{currentReqPos}</span></h1>
                    </div>
                    <div className="flex justify-center gap-12 flex-wrap">
                      {draftOptions.map(p => <PlayerCard key={p.id} player={p} onClick={pickPlayer} />)}
                    </div>
                  </div>
                ) : (
                  <div className="text-center glass p-16 rounded-[3rem] border border-green-500 max-w-2xl w-full text-white">
                    <i className="fa-solid fa-circle-check text-8xl text-green-400 mb-8"></i>
                    <h2 className="text-5xl font-black mb-4">Equipe Assinada!</h2>
                    <p className="text-2xl text-gray-300 font-medium mb-10">OVR Médio: <span className="text-yellow-400 font-black text-5xl">{myPlayerStatus?.overall || '--'}</span></p>

                    <div className="bg-black/40 p-6 rounded-2xl mb-8 text-left border border-white/10">
                       <h3 className="text-green-500 font-bold uppercase mb-4">Status da Sala</h3>
                       {Object.entries(roomData?.players||{}).map(([uid, p]) => (
                         <div key={uid} className="flex justify-between border-b border-white/5 py-2">
                           <span>{p.name}</span>
                           {p.isReady ? <span className="text-green-400 font-bold"><i className="fa-solid fa-check"></i> Pronto</span> : <span className="text-yellow-500 animate-pulse">Draftando...</span>}
                         </div>
                       ))}
                    </div>

                    {isHost && allReady ? (
                      <button onClick={()=>db.ref(`games/${APP_ID}/${roomId}`).update({status:'tactics'})} className="w-full bg-yellow-500 text-black font-black py-5 rounded-xl text-2xl">DEFINIR TÁTICA</button>
                    ) : (
                      <div className="text-yellow-400 font-bold text-xl animate-pulse">Aguardando todos finalizarem...</div>
                    )}
                  </div>
                )}
             </div>
          </div>
        )
      }

      if (appState === 'TACTICS') {
        return (
          <div className="min-h-screen bg-pitch p-6 flex flex-col items-center justify-center">
            <div className="glass p-12 rounded-[2rem] w-full max-w-3xl text-center border border-blue-600 text-white">
              <i className="fa-solid fa-chess-knight text-7xl text-blue-400 mb-6"></i>
              <h1 className="text-5xl font-black mb-4">Postura do Treinador</h1>
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                {Object.entries(TACTICS).map(([name, data]) => (
                  <div key={name} onClick={()=>{SFX.click(); setTactic(name);}} className={`p-6 rounded-2xl cursor-pointer border-4 ${tactic === name ? 'bg-blue-900 border-blue-400' : 'bg-black/60 border-blue-950'}`}>
                    <h3 className="font-black text-2xl mb-2">{name}</h3>
                    <p className="text-xs">{data.desc}</p>
                  </div>
                ))}
              </div>
              
              {!myPlayerStatus?.isReady ? (
                <button onClick={confirmTactic} className="w-full bg-blue-500 text-white font-black py-5 rounded-xl text-2xl">TRAVAR TÁTICA</button>
              ) : isHost && allReady ? (
                <button onClick={createTournamentBracket} className="w-full bg-yellow-500 text-black font-black py-5 rounded-xl text-2xl">INICIAR CAMPEONATO</button>
              ) : (
                <div className="text-yellow-400 font-bold mt-6 animate-pulse">Aguardando Trava...</div>
              )}
            </div>
          </div>
        )
      }

      if (appState === 'TOURNAMENT') {
        const stageKey = roomData?.stage === 1 ? 'quarters' : roomData?.stage === 2 ? 'semis' : 'final';
        const activeMatches = roomData?.bracket ? roomData?.bracket[stageKey] || [] : [];
        const myMatch = activeMatches.find(m => m.p1.uid === user.uid || m.p2.uid === user.uid);

        return (
          <div className="min-h-screen bg-[#020803] p-8 text-white">
            <div className="max-w-7xl mx-auto">
              <div className="flex justify-between items-center mb-8 glass p-6 rounded-2xl border border-green-800/50">
                <div>
                  <h1 className="text-3xl font-black text-yellow-400">COPA DRAFT KINGS</h1>
                  <p className="text-green-500 font-bold mt-1 uppercase">FASE: {stageKey}</p>
                </div>
                {isHost && roomData?.stage < 4 && !activeMatches[0]?.played && (
                  <button onClick={simulateMatches} className="bg-red-600 text-white font-black py-4 px-10 rounded-xl border border-red-400">INICIAR SIMULAÇÃO</button>
                )}
              </div>

              {roomData?.stage === 4 ? (
                <div className="text-center mt-32">
                  <i className="fa-solid fa-crown text-[150px] text-yellow-400 animate-bounce"></i>
                  <h1 className="text-7xl font-black text-yellow-400 mt-8">{roomData.bracket.final[0].winner.name}</h1>
                  <h2 className="text-3xl mt-4">CAMPEÃO!</h2>
                </div>
              ) : (
                <div className="grid grid-cols-4 gap-8">
                  <div className="col-span-3">
                    {myMatch ? <MatchViewer match={myMatch} /> : activeMatches[0] ? <MatchViewer match={activeMatches[0]} /> : null}
                  </div>
                  <div className="space-y-4">
                    {activeMatches.map((m, i) => {
                      const isOver = m.played && (Date.now() - m.startTime > 30000);
                      return (
                       <div key={i} className="glass p-4 rounded-xl border border-green-800/50">
                         <div className="flex justify-between mb-2">
                           <span className={isOver && m.winner.uid===m.p1.uid ? 'text-yellow-400 font-bold' : ''}>{m.p1.name}</span>
                           <span className="font-black bg-black px-2">{isOver ? m.s1 : '-'}</span>
                         </div>
                         <div className="flex justify-between">
                           <span className={isOver && m.winner.uid===m.p2.uid ? 'text-yellow-400 font-bold' : ''}>{m.p2.name}</span>
                           <span className="font-black bg-black px-2">{isOver ? m.s2 : '-'}</span>
                         </div>
                       </div>
                      )
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
